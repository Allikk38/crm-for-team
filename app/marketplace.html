<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: app/marketplace.html
    РОЛЬ: Маркетплейс модулей и виджетов (НОВАЯ ВЕРСИЯ)
    
    ОСОБЕННОСТИ:
      - Выбор типа лицензии (личная, командная 3/10/безлимит)
      - Покупка для себя или для команды
      - Отображение уже купленных модулей
      - Интеграция с marketplace-service.js
    
    ИСТОРИЯ:
      - 30.03.2026: Создание страницы
      - 31.03.2026: Упрощение до каталога
      - 10.04.2026: ПОЛНАЯ ПЕРЕРАБОТКА под новую систему лицензий
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    document.documentElement.classList.add('theme-light');
                    document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    document.documentElement.classList.add('theme-dark');
                    document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Маркетплейс - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        .marketplace-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .marketplace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .marketplace-header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .marketplace-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 12px;
        }
        
        .tab-btn {
            padding: 10px 24px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
            border-radius: 40px;
            transition: all 0.2s;
        }
        
        .tab-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }
        
        .tab-btn.active {
            background: var(--accent);
            color: white;
        }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }
        
        .item-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 24px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.3s ease backwards;
            display: flex;
            flex-direction: column;
        }
        
        .item-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
        }
        
        .item-card.purchased {
            border-left: 4px solid #4caf50;
        }
        
        .item-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .item-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .item-icon i {
            font-size: 28px;
            color: white;
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .item-badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--hover-bg);
            color: var(--text-muted);
        }
        
        .item-badge.free {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }
        
        .item-badge.purchased {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }
        
        .item-type {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .item-description {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 20px;
            flex: 1;
        }
        
        .license-options {
            margin-bottom: 20px;
        }
        
        .license-option {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--card-border);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .license-option:last-child {
            border-bottom: none;
        }
        
        .license-option:hover {
            background: var(--hover-bg);
            margin: 0 -8px;
            padding: 12px 8px;
            border-radius: 8px;
        }
        
        .license-option input[type="radio"] {
            margin-right: 12px;
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
        }
        
        .license-info {
            flex: 1;
        }
        
        .license-name {
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .license-desc {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        .license-price {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.1rem;
        }
        
        .license-price small {
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-muted);
        }
        
        .item-footer {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .buy-btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            font-size: 0.9rem;
        }
        
        .buy-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .buy-btn.purchased {
            background: #4caf50;
        }
        
        .buy-btn.team {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-primary);
        }
        
        .buy-btn.team:hover {
            background: var(--hover-bg);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
        
        .company-selector {
            margin-bottom: 24px;
            padding: 16px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
        }
        
        .company-selector label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .company-selector select {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        
        @media (max-width: 768px) {
            .marketplace-container {
                padding: 16px;
            }
            
            .items-grid {
                grid-template-columns: 1fr;
            }
            
            .item-footer {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="marketplace-container">
                <div class="marketplace-header">
                    <h1>
                        <i class="fas fa-store"></i>
                        Маркетплейс
                    </h1>
                    <a href="my-modules.html" class="btn" style="text-decoration: none;">
                        <i class="fas fa-puzzle-piece"></i>
                        Мои модули
                    </a>
                </div>
                
                <div class="marketplace-tabs">
                    <button class="tab-btn active" data-type="all">Все</button>
                    <button class="tab-btn" data-type="module">Модули</button>
                    <button class="tab-btn" data-type="widget">Виджеты</button>
                </div>
                
                <div id="companySelector" class="company-selector" style="display: none;">
                    <label><i class="fas fa-users"></i> Купить для команды</label>
                    <select id="companySelect">
                        <option value="">Выберите компанию</option>
                    </select>
                </div>
                
                <div id="itemsGrid" class="items-grid">
                    <div class="loading-state">
                        <i class="fas fa-spinner fa-pulse fa-2x"></i>
                        <p>Загрузка маркетплейса...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно подтверждения покупки -->
    <div id="purchaseModal" class="modal">
        <div class="modal-content" style="max-width: 450px;">
            <h3><i class="fas fa-shopping-cart"></i> Подтверждение покупки</h3>
            <div id="purchaseDetails" style="margin: 20px 0;"></div>
            <div class="modal-buttons">
                <button class="btn" onclick="closePurchaseModal()">Отмена</button>
                <button class="btn btn-primary" id="confirmPurchaseBtn">Купить</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { getCurrentSupabaseUser, requireSupabaseAuth, updateSupabaseUserInterface } from '../js/core/supabase-session.js';
        import { supabase } from '../js/core/supabase.js';
        import * as marketplace from '../js/services/marketplace-service.js';
        import * as sidebar from '../layout.js';
        
        window.sidebar = sidebar;
        
        let currentUser = null;
        let catalog = [];
        let userLicenses = { personal: [], team: [] };
        let companies = [];
        let selectedCompanyId = null;
        let currentType = 'all';
        let pendingPurchase = null;
        
        // ========== ЗАГРУЗКА ДАННЫХ ==========
        
        async function loadCatalog() {
            catalog = await marketplace.getCatalog(currentType);
        }
        
        async function loadUserLicenses() {
            userLicenses = await marketplace.getUserLicenses();
        }
        
        async function loadCompanies() {
            const { data, error } = await supabase
                .from('companies')
                .select('id, name')
                .eq('owner_id', currentUser.id)
                .order('created_at', { ascending: false });
            
            if (!error && data) {
                companies = data;
                renderCompanySelector();
            }
        }
        
        // ========== ПРОВЕРКА ДОСТУПА ==========
        
        function isItemPurchased(itemIdentifier) {
            return userLicenses.personal.some(l => l.item?.identifier === itemIdentifier) ||
                   userLicenses.team.some(l => l.item?.identifier === itemIdentifier);
        }
        
        function getLicenseTypeForItem(itemIdentifier) {
            const personal = userLicenses.personal.find(l => l.item?.identifier === itemIdentifier);
            if (personal) return 'personal';
            
            const team = userLicenses.team.find(l => l.item?.identifier === itemIdentifier);
            if (team) return team.license_type;
            
            return null;
        }
        
        // ========== РЕНДЕРИНГ ==========
        
        function renderCompanySelector() {
            const container = document.getElementById('companySelector');
            const select = document.getElementById('companySelect');
            
            if (companies.length === 0) {
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'block';
            select.innerHTML = '<option value="">Выберите компанию</option>';
            
            for (const company of companies) {
                select.innerHTML += `<option value="${company.id}">${escapeHtml(company.name)}</option>`;
            }
            
            select.onchange = () => {
                selectedCompanyId = select.value || null;
            };
        }
        
        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            
            if (catalog.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-store-slash"></i>
                        <p>Нет доступных товаров</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = catalog.map(item => {
                const isPurchased = isItemPurchased(item.identifier);
                const licenseType = getLicenseTypeForItem(item.identifier);
                const isFree = item.price_personal === 0;
                
                return `
                    <div class="item-card ${isPurchased ? 'purchased' : ''}" data-item-id="${item.id}">
                        <div class="item-header">
                            <div class="item-icon">
                                <i class="fas ${item.icon || 'fa-puzzle-piece'}"></i>
                            </div>
                            <div class="item-info">
                                <div class="item-name">
                                    ${escapeHtml(item.name)}
                                    ${isFree ? '<span class="item-badge free">Бесплатно</span>' : ''}
                                    ${isPurchased ? '<span class="item-badge purchased">✓ Куплено</span>' : ''}
                                </div>
                                <div class="item-type">
                                    ${item.type === 'module' ? '📦 Модуль' : '🧩 Виджет'}
                                </div>
                            </div>
                        </div>
                        
                        <div class="item-description">
                            ${escapeHtml(item.description || '')}
                        </div>
                        
                        ${!isPurchased ? renderLicenseOptions(item) : renderPurchasedInfo(licenseType)}
                        
                        ${renderItemFooter(item, isPurchased, isFree)}
                    </div>
                `;
            }).join('');
            
            attachItemEvents();
        }
        
        function renderLicenseOptions(item) {
            const options = [];
            
            if (item.price_personal !== null) {
                options.push({
                    type: 'personal',
                    name: '👤 Личная лицензия',
                    desc: 'Только для вас',
                    price: item.price_personal
                });
            }
            
            if (item.price_team_3 !== null) {
                options.push({
                    type: 'team_3',
                    name: '👥 Командная (до 3 мест)',
                    desc: 'Для небольшой команды',
                    price: item.price_team_3
                });
            }
            
            if (item.price_team_10 !== null) {
                options.push({
                    type: 'team_10',
                    name: '👥 Командная (до 10 мест)',
                    desc: 'Для растущей команды',
                    price: item.price_team_10
                });
            }
            
            if (item.price_team_unlimited !== null) {
                options.push({
                    type: 'team_unlimited',
                    name: '🏢 Командная (безлимит)',
                    desc: 'Для большой компании',
                    price: item.price_team_unlimited
                });
            }
            
            if (options.length === 0) return '';
            
            return `
                <div class="license-options">
                    ${options.map((opt, index) => `
                        <div class="license-option" data-license-type="${opt.type}">
                            <input type="radio" 
                                   name="license_${item.id}" 
                                   value="${opt.type}" 
                                   ${index === 0 ? 'checked' : ''}>
                            <div class="license-info">
                                <div class="license-name">${opt.name}</div>
                                <div class="license-desc">${opt.desc}</div>
                            </div>
                            <div class="license-price">
                                ${opt.price === 0 ? 'Бесплатно' : (opt.price / 100).toLocaleString() + ' ₽'}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderPurchasedInfo(licenseType) {
            const labels = {
                'personal': '👤 Личная лицензия',
                'team_3': '👥 Командная (до 3 мест)',
                'team_10': '👥 Командная (до 10 мест)',
                'team_unlimited': '🏢 Командная (безлимит)'
            };
            
            return `
                <div class="license-options">
                    <div class="license-option" style="cursor: default; opacity: 0.8;">
                        <div class="license-info">
                            <div class="license-name">${labels[licenseType] || 'Лицензия активна'}</div>
                            <div class="license-desc">✓ У вас есть доступ</div>
                        </div>
                        <div class="license-price" style="color: #4caf50;">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderItemFooter(item, isPurchased, isFree) {
            if (isPurchased) {
                return `
                    <div class="item-footer">
                        <button class="buy-btn purchased" disabled>
                            <i class="fas fa-check"></i> Уже куплено
                        </button>
                    </div>
                `;
            }
            
            if (isFree) {
                return `
                    <div class="item-footer">
                        <button class="buy-btn" data-action="buy-personal" data-item-id="${item.id}" data-identifier="${item.identifier}">
                            <i class="fas fa-download"></i> Активировать бесплатно
                        </button>
                    </div>
                `;
            }
            
            return `
                <div class="item-footer">
                    <button class="buy-btn" data-action="buy-personal" data-item-id="${item.id}" data-identifier="${item.identifier}">
                        <i class="fas fa-user"></i> Для себя
                    </button>
                    <button class="buy-btn team" data-action="buy-team" data-item-id="${item.id}" data-identifier="${item.identifier}">
                        <i class="fas fa-users"></i> Для команды
                    </button>
                </div>
            `;
        }
        
        function attachItemEvents() {
            document.querySelectorAll('[data-action="buy-personal"]').forEach(btn => {
                btn.onclick = () => {
                    const itemId = btn.dataset.itemId;
                    const identifier = btn.dataset.identifier;
                    const item = catalog.find(i => i.id === itemId);
                    const selectedOption = document.querySelector(`input[name="license_${itemId}"]:checked`);
                    const licenseType = selectedOption?.value || 'personal';
                    
                    openPurchaseModal(item, licenseType, null);
                };
            });
            
            document.querySelectorAll('[data-action="buy-team"]').forEach(btn => {
                btn.onclick = () => {
                    const itemId = btn.dataset.itemId;
                    const identifier = btn.dataset.identifier;
                    const item = catalog.find(i => i.id === itemId);
                    const selectedOption = document.querySelector(`input[name="license_${itemId}"]:checked`);
                    const licenseType = selectedOption?.value || 'team_3';
                    
                    if (companies.length === 0) {
                        alert('У вас нет компании. Создайте компанию в разделе "Команда".');
                        return;
                    }
                    
                    document.getElementById('companySelector').style.display = 'block';
                    document.getElementById('companySelector').scrollIntoView({ behavior: 'smooth' });
                    
                    pendingPurchase = { item, licenseType };
                };
            });
        }
        
        // ========== МОДАЛЬНОЕ ОКНО ==========
        
        function openPurchaseModal(item, licenseType, companyId) {
            const priceField = `price_${licenseType}`;
            const price = item[priceField] || 0;
            const priceRub = price / 100;
            
            const labels = {
                'personal': 'Личная лицензия',
                'team_3': 'Командная лицензия (до 3 мест)',
                'team_10': 'Командная лицензия (до 10 мест)',
                'team_unlimited': 'Командная лицензия (безлимит)'
            };
            
            document.getElementById('purchaseDetails').innerHTML = `
                <p><strong>${escapeHtml(item.name)}</strong></p>
                <p>${labels[licenseType]}</p>
                <p style="font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-top: 12px;">
                    ${price === 0 ? 'Бесплатно' : priceRub.toLocaleString() + ' ₽'}
                </p>
                ${companyId ? `<p style="margin-top: 12px; color: var(--text-muted);">Для компании</p>` : ''}
            `;
            
            pendingPurchase = { item, licenseType, companyId };
            
            document.getElementById('purchaseModal').classList.add('active');
        }
        
        window.closePurchaseModal = function() {
            document.getElementById('purchaseModal').classList.remove('active');
            pendingPurchase = null;
        };
        
        async function confirmPurchase() {
            if (!pendingPurchase) return;
            
            const { item, licenseType, companyId } = pendingPurchase;
            
            try {
                const result = await marketplace.purchaseLicense(
                    item.identifier,
                    licenseType,
                    companyId
                );
                
                if (result) {
                    closePurchaseModal();
                    await loadUserLicenses();
                    renderItems();
                    
                    // Показываем уведомление
                    alert(`✅ Модуль "${item.name}" успешно активирован!`);
                }
            } catch (error) {
                alert('❌ Ошибка покупки: ' + error.message);
            }
        }
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        
        async function init() {
            const isAuth = await requireSupabaseAuth('../auth-supabase.html');
            if (!isAuth) return;
            
            currentUser = getCurrentSupabaseUser();
            updateSupabaseUserInterface();
            
            await sidebar.initSidebar();
            
            await Promise.all([
                loadCatalog(),
                loadUserLicenses(),
                loadCompanies()
            ]);
            
            renderItems();
            
            // Обработчики вкладок
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = async () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentType = btn.dataset.type;
                    await loadCatalog();
                    renderItems();
                };
            });
            
            // Обработчик подтверждения покупки
            document.getElementById('confirmPurchaseBtn').onclick = confirmPurchase;
            
            // Обработчик выбора компании
            document.getElementById('companySelect').onchange = async (e) => {
                const companyId = e.target.value;
                if (companyId && pendingPurchase) {
                    openPurchaseModal(pendingPurchase.item, pendingPurchase.licenseType, companyId);
                }
            };
            
            console.log('[marketplace] Страница загружена');
        }
        
        init();
    </script>
</body>
</html>
