<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 
    ============================================
    ФАЙЛ: app/marketplace.html
    РОЛЬ: Маркетплейс модулей и виджетов - только каталог
    
    ОСОБЕННОСТИ:
      - Каталог доступных модулей
      - Покупка модулей для команды
      - Автоматическое обновление навигации после покупки
    
    ИСТОРИЯ:
      - 30.03.2026: Создание страницы маркетплейса
      - 31.03.2026: Упрощение - только каталог, без лишних вкладок
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Маркетплейс - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        .marketplace-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .marketplace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            animation: fadeInUp 0.4s ease;
        }
        
        .marketplace-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        
        .module-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 24px;
            transition: all 0.3s ease;
            animation: fadeInScale 0.3s ease backwards;
        }
        
        .module-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
        }
        
        .module-card.purchased {
            border-left: 4px solid #4caf50;
        }
        
        .module-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        
        .module-icon i {
            font-size: 24px;
            color: white;
        }
        
        .module-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .module-description {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        
        .module-features {
            list-style: none;
            margin: 16px 0;
            padding: 0;
        }
        
        .module-features li {
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .module-features i {
            font-size: 0.75rem;
        }
        
        .module-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--card-border);
        }
        
        .module-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .module-price small {
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-muted);
        }
        
        .module-btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .module-btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
        }
        
        .module-btn.purchased {
            background: #4caf50;
            color: white;
            cursor: default;
        }
        
        .module-btn:hover:not(.purchased) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.3);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        @media (max-width: 768px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="marketplace-container">
                <div class="marketplace-header">
                    <h1><i class="fas fa-store"></i> Маркетплейс модулей</h1>
                    <div id="companyBadge" style="background: var(--hover-bg); padding: 8px 16px; border-radius: 40px; font-size: 0.85rem;">
                        <i class="fas fa-building"></i> <span id="companyName">Моя компания</span>
                    </div>
                </div>
                
                <div id="modulesGrid" class="modules-grid">
                    <div class="loading-state">
                        <i class="fas fa-spinner fa-pulse"></i>
                        <p>Загрузка модулей...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- ========== ИНИЦИАЛИЗАЦИЯ СТРАНИЦЫ ========== -->
    <script type="module">
        import { initMarketplacePage } from '../js/pages/marketplace.js';
        initMarketplacePage();
    </script>
    
    <!-- Инициализация бокового меню -->
    <script type="module">
        import * as sidebar from '../layout.js';
        window.sidebar = sidebar;
        sidebar.initSidebar();
    </script>
</body>
</html>
