<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 
    ============================================
    ФАЙЛ: app/my-modules.html
    РОЛЬ: Страница управления личными модулями
    
    ОСОБЕННОСТИ:
      - Список доступных модулей
      - Активация/покупка модулей
      - Разделение на базовые, личные и командные модули
    
    ИСТОРИЯ:
      - 30.03.2026: Создание страницы
      - 30.03.2026: Перенос в папку app, исправление путей
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Мои модули - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        .modules-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .page-header {
            margin-bottom: 32px;
            animation: fadeInUp 0.4s ease;
        }
        
        .page-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .page-header p {
            color: var(--text-muted);
        }
        
        .team-badge {
            display: inline-block;
            background: var(--hover-bg);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            margin-top: 16px;
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 32px 0 20px;
        }
        
        .section-title i {
            font-size: 24px;
            color: var(--accent);
        }
        
        .section-title h2 {
            font-size: 1.3rem;
        }
        
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        
        .module-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 24px;
            transition: all 0.3s ease;
            animation: fadeInScale 0.3s ease backwards;
            position: relative;
        }
        
        .module-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }
        
        .module-card.team-module {
            border-left: 4px solid var(--accent);
        }
        
        .module-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        
        .module-icon i {
            font-size: 24px;
            color: white;
        }
        
        .module-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .module-badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--hover-bg);
            color: var(--text-muted);
        }
        
        .module-badge.team {
            background: rgba(108, 108, 255, 0.2);
            color: var(--accent);
        }
        
        .module-description {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        
        .module-features {
            list-style: none;
            margin: 16px 0;
            padding: 0;
        }
        
        .module-features li {
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .module-features i {
            font-size: 0.75rem;
            width: 18px;
        }
        
        .module-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--card-border);
        }
        
        .module-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }
        
        .status-active {
            color: #4caf50;
        }
        
        .status-pending {
            color: #ffc107;
        }
        
        .module-actions {
            display: flex;
            gap: 12px;
        }
        
        .module-btn {
            padding: 6px 16px;
            border-radius: 40px;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .module-btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
        }
        
        .module-btn.secondary {
            background: var(--hover-bg);
            color: var(--text-primary);
            border: 1px solid var(--card-border);
        }
        
        .module-btn:hover {
            transform: translateY(-2px);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }
            .module-footer {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="modules-container">
                <div class="page-header">
                    <h1><i class="fas fa-puzzle-piece"></i> Мои модули</h1>
                    <p>Управляйте доступными вам модулями и расширениями</p>
                    <div class="team-badge" id="teamBadge">
                        <i class="fas fa-users"></i> <span id="teamInfo">Загрузка...</span>
                    </div>
                </div>
                
                <div id="modulesContent">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-pulse"></i>
                        <p>Загрузка модулей...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module">
        import { getCurrentSupabaseUser, requireSupabaseAuth, updateSupabaseUserInterface } from '../js/core/supabase-session.js';
        
        // Каталог модулей
        const MODULES_CATALOG = {
            productivity: {
                id: 'productivity',
                name: 'Продуктивность',
                icon: 'fa-rocket',
                description: 'Базовые инструменты для организации работы',
                features: ['Задачи', 'Календарь', 'Заметки', 'Привычки'],
                type: 'free'
            },
            real_estate: {
                id: 'real_estate',
                name: 'Недвижимость',
                icon: 'fa-building',
                description: 'Полноценный CRM для агентов недвижимости',
                features: ['Объекты недвижимости', 'Сделки', 'Контрагенты', 'Ипотечный калькулятор'],
                type: 'team'
            },
            finance: {
                id: 'finance',
                name: 'Финансы',
                icon: 'fa-coins',
                description: 'Управление личными и семейными финансами',
                features: ['Бюджет', 'Расходы/Доходы', 'Отчеты', 'Категории'],
                type: 'personal'
            },
            education: {
                id: 'education',
                name: 'Образование',
                icon: 'fa-graduation-cap',
                description: 'Для студентов, учителей и родителей',
                features: ['Расписание', 'Оценки', 'Домашние задания', 'Успеваемость'],
                type: 'personal'
            },
            health: {
                id: 'health',
                name: 'Здоровье',
                icon: 'fa-heartbeat',
                description: 'Трекер здоровья и физической активности',
                features: ['Тренировки', 'Питание', 'Замеры тела', 'Водный баланс'],
                type: 'personal'
            }
        };
        
        let currentUser = null;
        
        // Демо-данные: какие модули доступны пользователю
        let userModules = [];
        
        // Демо-данные: командные модули
        let teamModules = [];
        
        function loadUserModules() {
            const saved = localStorage.getItem('my_modules');
            if (saved) {
                userModules = JSON.parse(saved);
            } else {
                userModules = [
                    { id: 'productivity', name: 'Продуктивность', type: 'free', status: 'active', installedAt: '2026-01-01' }
                ];
            }
            
            const savedTeam = localStorage.getItem('team_modules');
            if (savedTeam) {
                teamModules = JSON.parse(savedTeam);
            } else {
                teamModules = [
                    { id: 'real_estate', name: 'Недвижимость', type: 'team', status: 'active', users: ['admin', 'anna', 'dmitry'], maxUsers: 10 }
                ];
            }
            
            saveModules();
        }
        
        function saveModules() {
            localStorage.setItem('my_modules', JSON.stringify(userModules));
            localStorage.setItem('team_modules', JSON.stringify(teamModules));
        }
        
        function isModuleActive(moduleId) {
            return userModules.some(m => m.id === moduleId && m.status === 'active') ||
                   teamModules.some(m => m.id === moduleId && m.status === 'active');
        }
        
        function getModuleType(moduleId) {
            const module = MODULES_CATALOG[moduleId];
            if (!module) return 'unknown';
            
            if (module.type === 'free') return 'free';
            if (module.type === 'team') return 'team';
            return 'personal';
        }
        
        function activateModule(moduleId) {
            const module = MODULES_CATALOG[moduleId];
            if (!module) return;
            
            if (module.type === 'free') {
                if (!userModules.some(m => m.id === moduleId)) {
                    userModules.push({
                        id: moduleId,
                        name: module.name,
                        type: 'free',
                        status: 'active',
                        installedAt: new Date().toISOString().split('T')[0]
                    });
                    saveModules();
                    renderModules();
                    showToast(`Модуль "${module.name}" активирован`, 'success');
                }
            } else if (module.type === 'personal') {
                // Личный модуль (покупка)
                if (confirm(`Купить модуль "${module.name}" за 300 ₽? (демо-режим)`)) {
                    if (!userModules.some(m => m.id === moduleId)) {
                        userModules.push({
                            id: moduleId,
                            name: module.name,
                            type: 'personal',
                            status: 'active',
                            purchasedAt: new Date().toISOString().split('T')[0]
                        });
                        saveModules();
                        renderModules();
                        showToast(`Модуль "${module.name}" приобретен!`, 'success');
                    }
                }
            } else if (module.type === 'team') {
                // Командный модуль (для админа)
                if (currentUser?.role === 'admin') {
                    if (confirm(`Купить модуль "${module.name}" для команды за 500 ₽/мес? (демо-режим)`)) {
                        if (!teamModules.some(m => m.id === moduleId)) {
                            teamModules.push({
                                id: moduleId,
                                name: module.name,
                                type: 'team',
                                status: 'active',
                                users: [currentUser.github_username],
                                maxUsers: 10,
                                purchasedAt: new Date().toISOString().split('T')[0]
                            });
                            saveModules();
                            renderModules();
                            showToast(`Модуль "${module.name}" приобретен для команды!`, 'success');
                        }
                    }
                } else {
                    showToast('Только администратор может покупать командные модули', 'warning');
                }
            }
        }
        
        function openModule(moduleId) {
            const routes = {
                'productivity': 'tasks.html',
                'real_estate': 'deals.html',
                'finance': '#',
                'education': '#',
                'health': '#'
            };
            const url = routes[moduleId];
            if (url && url !== '#') {
                window.location.href = url;
            } else {
                showToast('Модуль в разработке', 'info');
            }
        }
        
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${escapeHtml(message)}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function renderModules() {
            const container = document.getElementById('modulesContent');
            if (!container) return;
            
            // Группируем модули
            const freeModules = [];
            const personalModules = [];
            const teamModulesList = [];
            
            for (const [id, module] of Object.entries(MODULES_CATALOG)) {
                const isActive = isModuleActive(id);
                const moduleType = getModuleType(id);
                
                const moduleData = {
                    ...module,
                    isActive,
                    moduleType
                };
                
                if (module.type === 'free') {
                    freeModules.push(moduleData);
                } else if (module.type === 'personal') {
                    personalModules.push(moduleData);
                } else if (module.type === 'team') {
                    moduleData.teamData = teamModules.find(t => t.id === id);
                    teamModulesList.push(moduleData);
                }
            }
            
            let html = '';
            
            // Бесплатные модули
            if (freeModules.length > 0) {
                html += `
                    <div class="section-title">
                        <i class="fas fa-gift"></i>
                        <h2>Базовые модули</h2>
                    </div>
                    <div class="modules-grid">
                        ${freeModules.map((module, index) => renderModuleCard(module, index)).join('')}
                    </div>
                `;
            }
            
            // Личные модули
            if (personalModules.length > 0) {
                html += `
                    <div class="section-title">
                        <i class="fas fa-user"></i>
                        <h2>Личные модули</h2>
                    </div>
                    <div class="modules-grid">
                        ${personalModules.map((module, index) => renderModuleCard(module, index)).join('')}
                    </div>
                `;
            }
            
            // Командные модули
            if (teamModulesList.length > 0) {
                html += `
                    <div class="section-title">
                        <i class="fas fa-users"></i>
                        <h2>Командные модули</h2>
                    </div>
                    <div class="modules-grid">
                        ${teamModulesList.map((module, index) => renderModuleCard(module, index)).join('')}
                    </div>
                `;
            }
            
            if (html === '') {
                html = `
                    <div class="empty-state">
                        <i class="fas fa-puzzle-piece"></i>
                        <p>У вас пока нет модулей</p>
                        <button onclick="window.location.href='marketplace.html'" style="margin-top: 16px; padding: 10px 24px; background: var(--accent); border: none; border-radius: 40px; color: white; cursor: pointer;">
                            Перейти в Маркетплейс
                        </button>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        function renderModuleCard(module, index) {
            const isActive = module.isActive;
            const teamData = module.teamData;
            
            let statusHtml = '';
            let actionsHtml = '';
            
            if (isActive) {
                statusHtml = `
                    <div class="module-status">
                        <i class="fas fa-check-circle status-active"></i>
                        <span>Активен</span>
                    </div>
                `;
                actionsHtml = `
                    <div class="module-actions">
                        <button class="module-btn primary" onclick="window.openModule('${module.id}')">
                            <i class="fas fa-external-link-alt"></i> Открыть
                        </button>
                    </div>
                `;
            } else {
                statusHtml = `
                    <div class="module-status">
                        <i class="fas fa-clock status-pending"></i>
                        <span>Не активирован</span>
                    </div>
                `;
                actionsHtml = `
                    <div class="module-actions">
                        <button class="module-btn primary" onclick="window.activateModule('${module.id}')">
                            <i class="fas fa-download"></i> Активировать
                        </button>
                    </div>
                `;
            }
            
            let teamInfo = '';
            if (module.type === 'team' && teamData) {
                teamInfo = `<div class="module-badge team"><i class="fas fa-users"></i> Команда: ${teamData.users.length}/${teamData.maxUsers} лицензий</div>`;
            }
            
            const badgeClass = module.type === 'team' ? 'team' : '';
            
            return `
                <div class="module-card ${module.type === 'team' ? 'team-module' : ''}" style="animation-delay: ${index * 0.05}s">
                    <div class="module-icon">
                        <i class="fas ${module.icon}"></i>
                    </div>
                    <div class="module-name">
                        ${module.name}
                        <span class="module-badge ${badgeClass}">
                            ${module.type === 'free' ? 'Бесплатный' : module.type === 'team' ? 'Для команды' : 'Личный'}
                        </span>
                        ${teamInfo}
                    </div>
                    <div class="module-description">${module.description}</div>
                    <ul class="module-features">
                        ${module.features.map(f => `<li><i class="fas fa-check-circle" style="color: #4caf50;"></i> ${f}</li>`).join('')}
                    </ul>
                    <div class="module-footer">
                        ${statusHtml}
                        ${actionsHtml}
                    </div>
                </div>
            `;
        }
        
        // Глобальные функции
        window.activateModule = activateModule;
        window.openModule = openModule;
        
        async function init() {
            const isAuth = await requireSupabaseAuth('../auth-supabase.html');
            if (!isAuth) return;
            
            currentUser = getCurrentSupabaseUser();
            updateSupabaseUserInterface();
            
            loadUserModules();
            renderModules();
            
            // Обновляем информацию о команде
            const teamInfoSpan = document.getElementById('teamInfo');
            if (teamInfoSpan) {
                const teamSize = teamModules.reduce((sum, m) => sum + (m.users?.length || 0), 0);
                teamInfoSpan.textContent = `В команде ${teamSize + 1} человек (включая вас)`;
            }
            
            const sidebar = document.getElementById('sidebar');
            if (sidebar && localStorage.getItem('sidebar_collapsed') === 'true') {
                sidebar.classList.add('collapsed');
            }
            
            console.log('[my-modules] Страница загружена');
        }
        
        init();
    </script>
    
    <!-- Инициализация бокового меню -->
    <script type="module">
        import * as sidebar from '../layout.js';
        window.sidebar = sidebar;
        sidebar.initSidebar();
    </script>
</body>
</html>
