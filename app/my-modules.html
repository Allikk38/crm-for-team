<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: app/my-modules.html
    РОЛЬ: Управление купленными модулями и лицензиями (НОВАЯ ВЕРСИЯ)
    
    ОСОБЕННОСТИ:
      - Просмотр личных и командных лицензий
      - Назначение/отзыв доступа для участников команды
      - Отображение использования мест в лицензиях
      - Быстрый переход к модулям
    
    ИСТОРИЯ:
      - 30.03.2026: Создание страницы
      - 10.04.2026: ПОЛНАЯ ПЕРЕРАБОТКА под новую систему лицензий
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    document.documentElement.classList.add('theme-light');
                    document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    document.documentElement.classList.add('theme-dark');
                    document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Мои модули - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">

    <style>
        .modules-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .page-header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .section-header i {
            font-size: 24px;
            color: var(--accent);
        }
        
        .section-header h2 {
            font-size: 1.3rem;
            flex: 1;
        }
        
        .section-count {
            background: var(--accent);
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .licenses-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .license-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            transition: all 0.3s ease;
            animation: fadeInUp 0.3s ease backwards;
        }
        
        .license-card:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }
        
        .license-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            background: var(--hover-bg);
            border-bottom: 1px solid var(--card-border);
        }
        
        .license-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
        }
        
        .license-info {
            flex: 1;
        }
        
        .license-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .license-badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .license-badge.personal {
            background: rgba(108, 108, 255, 0.15);
            color: var(--accent);
        }
        
        .license-badge.team {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }
        
        .license-meta {
            display: flex;
            gap: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .license-actions {
            display: flex;
            gap: 8px;
        }
        
        .license-actions .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .license-actions .btn-icon:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        .license-body {
            padding: 20px 24px;
        }
        
        .seats-info {
            margin-bottom: 20px;
        }
        
        .seats-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        
        .seats-progress {
            height: 8px;
            background: var(--input-bg);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .seats-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .assignments-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .assignment-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: var(--input-bg);
            border-radius: 10px;
        }
        
        .assignment-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar-small {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }
        
        .user-info-small {
            font-size: 0.9rem;
        }
        
        .user-email-small {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        .assignment-actions {
            display: flex;
            gap: 4px;
        }
        
        .btn-small {
            padding: 6px 10px;
            border-radius: 8px;
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }
        
        .btn-small:hover {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            border-color: #ff6b6b;
        }
        
        .assign-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--card-border);
        }
        
        .assign-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        .assign-select {
            flex: 1;
        }
        
        .assign-select label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        
        .assign-select select {
            width: 100%;
            padding: 10px 12px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-primary);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px dashed var(--card-border);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .loading-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 40px;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-primary);
        }
        
        .btn-outline:hover {
            background: var(--hover-bg);
            box-shadow: none;
        }
        
        @media (max-width: 768px) {
            .modules-container {
                padding: 16px;
            }
            
            .license-header {
                flex-wrap: wrap;
            }
            
            .license-actions {
                width: 100%;
                justify-content: flex-end;
            }
            
            .assign-form {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">

        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">

                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>

            <div class="modules-container">
                <div class="page-header">
                    <h1>
                        <i class="fas fa-puzzle-piece"></i>
                        Мои модули

                    <a href="marketplace.html" class="btn">

                <!-- Личные модули -->
                <div class="section">

                    </div>
                    <div id="personalLicenses" class="licenses-list">

    <script type="module">
        import { getCurrentSupabaseUser, requireSupabaseAuth, updateSupabaseUserInterface } from '../js/core/supabase-session.js';
        import { supabase } from '../js/core/supabase.js';
        import * as marketplace from '../js/services/marketplace-service.js';
        import * as sidebar from '../layout.js';
        
        window.sidebar = sidebar;
        
        let currentUser = null;
        let userLicenses = { personal: [], team: [] };
        let companies = [];
        let companyMembers = [];
        
        // ========== ЗАГРУЗКА ДАННЫХ ==========
        
        async function loadData() {
            userLicenses = await marketplace.getUserLicenses();
            
            // Загружаем компании пользователя
            const { data: companiesData } = await supabase
                .from('companies')
                .select('id, name')
                .eq('owner_id', currentUser.id);
            
            companies = companiesData || [];
            
            // Загружаем участников компаний
            if (companies.length > 0) {
                const companyIds = companies.map(c => c.id);
                const { data: members } = await supabase
                    .from('profiles')
                    .select('id, name, email, company_id')
                    .in('company_id', companyIds);
                
                companyMembers = members || [];
            }
        }
        
        // ========== РЕНДЕРИНГ ==========
        
        function renderPersonalLicenses() {
            const container = document.getElementById('personalLicenses');
            const licenses = userLicenses.personal;
            
            document.getElementById('personalCount').textContent = licenses.length;
            
            if (licenses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-user"></i>
                        <p>У вас нет личных модулей</p>
                        <a href="marketplace.html" class="btn" style="margin-top: 20px;">
                            <i class="fas fa-store"></i> Перейти в маркетплейс
                        </a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = licenses.map(license => {
                const item = license.item || {};
                
                return `
                    <div class="license-card">
                        <div class="license-header">
                            <div class="license-icon">
                                <i class="fas ${item.icon || 'fa-puzzle-piece'}"></i>
                            </div>
                            <div class="license-info">
                                <div class="license-name">
                                    ${escapeHtml(item.name || 'Модуль')}
                                    <span class="license-badge personal">👤 Личная</span>
                                </div>
                                <div class="license-meta">
                                    <span><i class="fas fa-calendar"></i> Куплено: ${formatDate(license.purchased_at)}</span>
                                    ${license.expires_at ? `<span><i class="fas fa-clock"></i> До: ${formatDate(license.expires_at)}</span>` : ''}
                                </div>
                            </div>
                            <div class="license-actions">
                                <button class="btn-icon" onclick="openModule('${item.identifier}')" title="Открыть модуль">
                                    <i class="fas fa-external-link-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderTeamLicenses() {
            const container = document.getElementById('teamLicenses');
            const licenses = userLicenses.team;
            
            document.getElementById('teamCount').textContent = licenses.length;
            
            if (licenses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <p>У вас нет командных модулей</p>
                        <a href="marketplace.html" class="btn" style="margin-top: 20px;">
                            <i class="fas fa-store"></i> Перейти в маркетплейс
                        </a>
                    </div>
                `;
                return;
            }
            
            // Группируем лицензии по компании
            const licensesByCompany = {};
            for (const license of licenses) {
                const companyId = license.company_id;
                if (!licensesByCompany[companyId]) {
                    const company = companies.find(c => c.id === companyId);
                    licensesByCompany[companyId] = {
                        company: company || { id: companyId, name: 'Компания' },
                        licenses: []
                    };
                }
                licensesByCompany[companyId].licenses.push(license);
            }
            
            let html = '';
            
            for (const [companyId, group] of Object.entries(licensesByCompany)) {
                html += `
                    <div style="margin-bottom: 24px;">
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                            <i class="fas fa-building" style="color: var(--accent);"></i>
                            <span style="font-weight: 600;">${escapeHtml(group.company.name)}</span>
                        </div>
                `;
                
                for (const license of group.licenses) {
                    html += renderTeamLicenseCard(license, companyId);
                }
                
                html += `</div>`;
            }
            
            container.innerHTML = html;
            
            // Загружаем назначения для каждой лицензии
            for (const license of licenses) {
                loadAssignments(license.id);
                loadAvailableMembers(license.id, license.company_id);
            }
        }
        
        function renderTeamLicenseCard(license, companyId) {
            const item = license.item || {};
            const maxSeats = getMaxSeats(license.license_type);
            
            const licenseTypeLabels = {
                'team_3': '👥 До 3 мест',
                'team_10': '👥 До 10 мест',
                'team_unlimited': '🏢 Безлимит'
            };
            
            return `
                <div class="license-card" style="margin-bottom: 16px;" data-license-id="${license.id}">
                    <div class="license-header">
                        <div class="license-icon">
                            <i class="fas ${item.icon || 'fa-puzzle-piece'}"></i>
                        </div>
                        <div class="license-info">
                            <div class="license-name">
                                ${escapeHtml(item.name || 'Модуль')}
                                <span class="license-badge team">${licenseTypeLabels[license.license_type] || 'Командная'}</span>
                            </div>
                            <div class="license-meta">
                                <span><i class="fas fa-calendar"></i> Куплено: ${formatDate(license.purchased_at)}</span>
                            </div>
                        </div>
                        <div class="license-actions">
                            <button class="btn-icon" onclick="openModule('${item.identifier}')" title="Открыть модуль">
                                <i class="fas fa-external-link-alt"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="license-body">
                        <div class="seats-info">
                            <div class="seats-header">
                                <span>Использовано мест</span>
                                <span><span id="seats-used-${license.id}">0</span> / ${maxSeats === 999999 ? '∞' : maxSeats}</span>
                            </div>
                            <div class="seats-progress">
                                <div class="seats-fill" id="seats-fill-${license.id}" style="width: 0%"></div>
                            </div>
                        </div>
                        
                        <div id="assignments-${license.id}" class="assignments-list">
                            <div class="loading-state" style="padding: 20px;">
                                <i class="fas fa-spinner fa-pulse"></i>
                            </div>
                        </div>
                        
                        <div class="assign-section">
                            <div class="assign-form">
                                <div class="assign-select">
                                    <label>Назначить пользователю</label>
                                    <select id="select-${license.id}" data-license-id="${license.id}">
                                        <option value="">Выберите пользователя</option>
                                    </select>
                                </div>
                                <button class="btn-small" style="background: var(--accent); color: white;" onclick="assignUser('${license.id}')">
                                    <i class="fas fa-plus"></i> Назначить
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        async function loadAssignments(licenseId) {
            const { data, error } = await supabase
                .from('license_assignments')
                .select(`
                    user_id,
                    assigned_at,
                    user:user_id(id, name, email)
                `)
                .eq('license_id', licenseId);
            
            if (error) {
                console.error('Ошибка загрузки назначений:', error);
                return;
            }
            
            const assignments = data || [];
            const container = document.getElementById(`assignments-${licenseId}`);
            
            if (!container) return;
            
            if (assignments.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 16px; color: var(--text-muted); font-size: 0.85rem;">
                        <i class="fas fa-users-slash"></i> Нет назначенных пользователей
                    </div>
                `;
            } else {
                container.innerHTML = assignments.map(a => {
                    const user = a.user || {};
                    const initials = (user.name || '?').split(' ').map(n => n[0]).join('').toUpperCase();
                    
                    return `
                        <div class="assignment-item">
                            <div class="assignment-user">
                                <div class="user-avatar-small">${initials}</div>
                                <div class="user-info-small">
                                    <div>${escapeHtml(user.name || '—')}</div>
                                    <div class="user-email-small">${escapeHtml(user.email || '')}</div>
                                </div>
                            </div>
                            <div class="assignment-actions">
                                <button class="btn-small" onclick="revokeAccess('${licenseId}', '${a.user_id}')">
                                    <i class="fas fa-times"></i> Отозвать
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            // Обновляем прогресс мест
            const license = userLicenses.team.find(l => l.id === licenseId);
            if (license) {
                const maxSeats = getMaxSeats(license.license_type);
                const used = assignments.length;
                const percent = maxSeats === 999999 ? Math.min(100, used * 10) : (used / maxSeats) * 100;
                
                document.getElementById(`seats-used-${licenseId}`).textContent = used;
                document.getElementById(`seats-fill-${licenseId}`).style.width = percent + '%';
            }
        }
        
        async function loadAvailableMembers(licenseId, companyId) {
            const select = document.getElementById(`select-${licenseId}`);
            if (!select) return;
            
            // Получаем уже назначенных пользователей
            const { data: assigned } = await supabase
                .from('license_assignments')
                .select('user_id')
                .eq('license_id', licenseId);
            
            const assignedIds = new Set((assigned || []).map(a => a.user_id));
            
            // Фильтруем доступных пользователей
            const availableMembers = companyMembers.filter(m => 
                m.company_id === companyId && !assignedIds.has(m.id)
            );
            
            if (availableMembers.length === 0) {
                select.innerHTML = '<option value="">Нет доступных пользователей</option>';
                return;
            }
            
            select.innerHTML = '<option value="">Выберите пользователя</option>';
            for (const member of availableMembers) {
                select.innerHTML += `<option value="${member.id}">${escapeHtml(member.name)} (${escapeHtml(member.email || '')})</option>`;
            }
        }
        
        // ========== ДЕЙСТВИЯ ==========
        
        window.openModule = function(identifier) {
            const routes = {
                'tasks': 'tasks.html',
                'deals': 'deals.html',
                'finance': 'finance.html',
                'calendar': 'calendar.html',
                'complexes': 'complexes.html',
                'counterparties': 'counterparties.html',
                'team': 'team.html',
                'manager': 'manager.html',
                'admin': 'admin.html'
            };
            
            const url = routes[identifier];
            if (url) {
                window.location.href = url;
            } else {
                alert('Модуль в разработке');
            }
        };
        
        window.assignUser = async function(licenseId) {
            const select = document.getElementById(`select-${licenseId}`);
            const userId = select.value;
            
            if (!userId) {
                alert('Выберите пользователя');
                return;
            }
            
            try {
                await marketplace.assignLicenseToUser(licenseId, userId);
                await loadData();
                renderTeamLicenses();
                alert('✅ Доступ предоставлен');
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        };
        
        window.revokeAccess = async function(licenseId, userId) {
            if (!confirm('Отозвать доступ у пользователя?')) return;
            
            try {
                await marketplace.revokeLicenseFromUser(licenseId, userId);
                await loadData();
                renderTeamLicenses();
                alert('✅ Доступ отозван');
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        };
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
        
        function getMaxSeats(licenseType) {
            switch (licenseType) {
                case 'team_3': return 3;
                case 'team_10': return 10;
                case 'team_unlimited': return 999999;
                default: return 1;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU');
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        
        async function init() {
            const isAuth = await requireSupabaseAuth('../auth-supabase.html');
            if (!isAuth) return;
            
            currentUser = getCurrentSupabaseUser();
            updateSupabaseUserInterface();
            
            await sidebar.initSidebar();
            
            await loadData();
            renderPersonalLicenses();
            renderTeamLicenses();
            
            console.log('[my-modules] Страница загружена');
        }
        
        init();
    </script>
</body>
</html>
