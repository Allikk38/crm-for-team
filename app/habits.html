<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 
    ============================================
    ФАЙЛ: app/habits.html
    РОЛЬ: Трекер привычек (личный модуль)
    
    ОСОБЕННОСТИ:
      - Ежедневный трекер привычек
      - Отметка выполнения
      - Статистика за неделю
      - Сохранение в localStorage (демо)
    
    ИСТОРИЯ:
      - 30.03.2026: Создание страницы
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    document.documentElement.classList.add('theme-light');
                    document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    document.documentElement.classList.add('theme-dark');
                    document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Привычки - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        .habits-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .page-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .page-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .add-habit-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .add-habit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .habits-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .habit-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .habit-card:hover {
            transform: translateX(4px);
            border-color: var(--accent);
        }
        
        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .habit-name {
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .habit-streak {
            font-size: 0.75rem;
            background: var(--hover-bg);
            padding: 4px 8px;
            border-radius: 20px;
            color: var(--accent);
        }
        
        .habit-week {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }
        
        .day-cell {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--hover-bg);
            font-size: 0.7rem;
        }
        
        .day-cell.completed {
            background: var(--accent);
            color: white;
        }
        
        .day-cell.today {
            border: 2px solid var(--accent);
        }
        
        .day-cell:hover {
            transform: scale(1.05);
        }
        
        .habit-footer {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
        }
        
        .delete-habit {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 8px;
        }
        
        .delete-habit:hover {
            background: rgba(255, 107, 107, 0.2);
        }
        
        .stats-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 20px;
            text-align: center;
        }
        
        .stats-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stats-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .modal-content {
            max-width: 400px;
        }
        
        .modal-content input {
            width: 100%;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="habits-container">
                <div class="page-header">
                    <h1><i class="fas fa-calendar-check"></i> Привычки</h1>
                    <button class="add-habit-btn" id="addHabitBtn">
                        <i class="fas fa-plus"></i> Добавить привычку
                    </button>
                </div>
                
                <div id="habitsList" class="habits-list">
                    <div class="empty-state">
                        <i class="fas fa-calendar-check"></i>
                        <p>У вас пока нет привычек</p>
                        <button class="add-habit-btn" style="margin-top: 16px;" onclick="document.getElementById('addHabitBtn').click()">
                            Добавить привычку
                        </button>
                    </div>
                </div>
                
                <div class="stats-card">
                    <div class="stats-value" id="totalCompletions">0</div>
                    <div class="stats-label">всего выполнено</div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно -->
    <div id="habitModal" class="modal">
        <div class="modal-content">
            <h3>Новая привычка</h3>
            <input type="text" id="habitName" placeholder="Название привычки (например: Утренняя зарядка)">
            <div class="modal-buttons">
                <button onclick="closeHabitModal()">Отмена</button>
                <button class="primary" onclick="saveHabit()">Сохранить</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { getCurrentSupabaseUser, requireSupabaseAuth, updateSupabaseUserInterface } from '../js/core/supabase-session.js';
        
        let currentUser = null;
        let habits = [];
        
        const HABITS_KEY = 'crm_habits';
        
        function getTodayKey() {
            return new Date().toISOString().split('T')[0];
        }
        
        function getWeekDays() {
            const days = [];
            const today = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(today.getDate() - i);
                days.push({
                    key: date.toISOString().split('T')[0],
                    label: date.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric' })
                });
            }
            return days;
        }
        
        function loadHabits() {
            const saved = localStorage.getItem(HABITS_KEY);
            if (saved) {
                habits = JSON.parse(saved);
            } else {
                habits = [];
            }
            renderHabits();
        }
        
        function saveHabits() {
            localStorage.setItem(HABITS_KEY, JSON.stringify(habits));
        }
        
        function toggleDay(habitId, dayKey) {
            const habit = habits.find(h => h.id === habitId);
            if (!habit) return;
            
            if (!habit.completions) habit.completions = {};
            
            if (habit.completions[dayKey]) {
                delete habit.completions[dayKey];
            } else {
                habit.completions[dayKey] = true;
            }
            
            saveHabits();
            renderHabits();
        }
        
        function calculateStreak(habit) {
            if (!habit.completions) return 0;
            
            let streak = 0;
            const today = getTodayKey();
            let currentDate = new Date();
            
            for (let i = 0; i < 30; i++) {
                const dateKey = currentDate.toISOString().split('T')[0];
                if (habit.completions[dateKey]) {
                    streak++;
                    currentDate.setDate(currentDate.getDate() - 1);
                } else {
                    break;
                }
            }
            return streak;
        }
        
        function calculateTotalCompletions() {
            let total = 0;
            habits.forEach(habit => {
                if (habit.completions) {
                    total += Object.keys(habit.completions).length;
                }
            });
            return total;
        }
        
        function renderHabits() {
            const container = document.getElementById('habitsList');
            if (!container) return;
            
            const weekDays = getWeekDays();
            const todayKey = getTodayKey();
            const totalCompletions = calculateTotalCompletions();
            document.getElementById('totalCompletions').textContent = totalCompletions;
            
            if (habits.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar-check"></i>
                        <p>У вас пока нет привычек</p>
                        <button class="add-habit-btn" style="margin-top: 16px;" onclick="document.getElementById('addHabitBtn').click()">
                            Добавить привычку
                        </button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = habits.map(habit => `
                <div class="habit-card">
                    <div class="habit-header">
                        <span class="habit-name">${escapeHtml(habit.name)}</span>
                        <span class="habit-streak"><i class="fas fa-fire"></i> ${calculateStreak(habit)} дней</span>
                    </div>
                    <div class="habit-week">
                        ${weekDays.map(day => `
                            <div class="day-cell ${habit.completions?.[day.key] ? 'completed' : ''} ${day.key === todayKey ? 'today' : ''}"
                                 data-habit-id="${habit.id}"
                                 data-day="${day.key}">
                                ${day.label}
                            </div>
                        `).join('')}
                    </div>
                    <div class="habit-footer">
                        <button class="delete-habit" data-habit-id="${habit.id}">
                            <i class="fas fa-trash"></i> Удалить
                        </button>
                    </div>
                </div>
            `).join('');
            
            // Обработчики для дней
            document.querySelectorAll('.day-cell').forEach(cell => {
                cell.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const habitId = cell.dataset.habitId;
                    const day = cell.dataset.day;
                    toggleDay(habitId, day);
                });
            });
            
            // Обработчики удаления
            document.querySelectorAll('.delete-habit').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const habitId = btn.dataset.habitId;
                    if (confirm('Удалить привычку?')) {
                        habits = habits.filter(h => h.id !== habitId);
                        saveHabits();
                        renderHabits();
                    }
                });
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function openHabitModal() {
            document.getElementById('habitName').value = '';
            document.getElementById('habitModal').classList.add('active');
        }
        
        window.closeHabitModal = function() {
            document.getElementById('habitModal').classList.remove('active');
        };
        
        window.saveHabit = function() {
            const name = document.getElementById('habitName').value.trim();
            if (!name) {
                alert('Введите название привычки');
                return;
            }
            
            habits.push({
                id: Date.now().toString(),
                name: name,
                completions: {}
            });
            
            saveHabits();
            renderHabits();
            closeHabitModal();
        };
        
        async function init() {
            const isAuth = await requireSupabaseAuth('auth-supabase.html');
            if (!isAuth) return;
            
            currentUser = getCurrentSupabaseUser();
            updateSupabaseUserInterface();
            
            loadHabits();
            
            document.getElementById('addHabitBtn').addEventListener('click', openHabitModal);
            
            console.log('[habits] Страница загружена');
        }
        
        init();
    </script>
    
    <!-- Инициализация бокового меню -->
    <script type="module">
        import * as sidebar from '../layout.js';
        window.sidebar = sidebar;
        sidebar.initSidebar();
    </script>
</body>
</html>
