<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: app/credit-detail.html
    РОЛЬ: Детальная страница кредита
    
    ОСОБЕННОСТИ:
      - График платежей (таблица)
      - Калькулятор досрочного погашения
      - Расчёт экономии и сокращения срока
      - Кнопка «Внести досрочно» с выбором счёта и категории
      - Поддержка URL параметра prepayment
    
    ЗАВИСИМОСТИ:
      - js/pages/credit-detail.js
      - js/services/finance-supabase.js
    
    ИСТОРИЯ:
      2026-04-08: Создание страницы
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Детали кредита - Финансы - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        .credit-detail-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .page-header h1 i {
            color: var(--accent);
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 12px 20px;
            border-radius: 40px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn:hover {
            background: rgba(108, 108, 255, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.3);
        }
        
        .btn-danger {
            background: rgba(255, 107, 107, 0.15);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        
        .btn-danger:hover {
            background: rgba(255, 107, 107, 0.25);
        }
        
        /* Карточка с информацией */
        .credit-info-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .credit-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .info-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .info-value.highlight {
            color: var(--accent);
        }
        
        .progress-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--card-border);
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .progress-bar-large {
            height: 12px;
            background: var(--card-border);
            border-radius: 6px;
            overflow: hidden;
        }
        
        .progress-fill-large {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            border-radius: 6px;
            transition: width 0.3s;
        }
        
        /* Калькулятор досрочного погашения */
        .prepayment-calculator {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .calculator-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .calculator-title i {
            color: var(--accent);
        }
        
        .calculator-input-group {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        
        .calculator-input {
            flex: 2;
            min-width: 200px;
        }
        
        .calculator-input label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        
        .calculator-input input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1.1rem;
        }
        
        .calculator-input input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .calculator-actions {
            flex: 1;
            display: flex;
            gap: 8px;
        }
        
        .calculator-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            padding: 20px;
            background: var(--hover-bg);
            border-radius: 16px;
        }
        
        .result-item {
            text-align: center;
        }
        
        .result-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        .result-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .result-value.positive {
            color: #4caf50;
        }
        
        .result-value.negative {
            color: #ff6b6b;
        }
        
        /* График платежей */
        .payment-schedule {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 24px;
            overflow: hidden;
        }
        
        .schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .schedule-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .schedule-controls {
            display: flex;
            gap: 8px;
        }
        
        .schedule-table-wrapper {
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        
        .schedule-table th {
            text-align: left;
            padding: 12px 16px;
            background: var(--hover-bg);
            color: var(--text-muted);
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        
        .schedule-table td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .schedule-table tbody tr:hover {
            background: rgba(108, 108, 255, 0.05);
        }
        
        .schedule-table .amount {
            text-align: right;
        }
        
        /* Модальное окно */
        .modal-content {
            max-width: 500px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        /* Загрузка */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .loading-state i {
            font-size: 32px;
            margin-bottom: 16px;
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .credit-detail-page {
                padding: 16px;
            }
            
            .page-header h1 {
                font-size: 1.5rem;
            }
            
            .credit-info-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            
            .info-value {
                font-size: 1.2rem;
            }
            
            .calculator-input-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            .calculator-actions {
                width: 100%;
            }
            
            .calculator-actions .btn {
                flex: 1;
                justify-content: center;
            }
            
            .calculator-results {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .schedule-table {
                font-size: 0.75rem;
            }
            
            .schedule-table th,
            .schedule-table td {
                padding: 8px 10px;
            }
        }
        
        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Боковая панель -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <!-- Основной контент -->
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="credit-detail-page">
                <!-- Заголовок -->
                <div class="page-header">
                    <h1>
                        <i class="fas fa-credit-card"></i>
                        <span id="creditName">Загрузка...</span>
                    </h1>
                    <div class="header-actions">
                        <button class="btn" id="backToCreditsBtn">
                            <i class="fas fa-arrow-left"></i>
                            Назад
                        </button>
                        <button class="btn btn-primary" id="makePaymentBtn">
                            <i class="fas fa-money-bill"></i>
                            Внести платёж
                        </button>
                    </div>
                </div>
                
                <!-- Информация о кредите -->
                <div class="credit-info-card" id="creditInfo">
                    <div class="loading-state">
                        <i class="fas fa-spinner fa-pulse"></i>
                        <p>Загрузка данных...</p>
                    </div>
                </div>
                
                <!-- Калькулятор досрочного погашения -->
                <div class="prepayment-calculator">
                    <div class="calculator-title">
                        <i class="fas fa-calculator"></i>
                        Калькулятор досрочного погашения
                    </div>
                    
                    <div class="calculator-input-group">
                        <div class="calculator-input">
                            <label>Сумма досрочного погашения</label>
                            <input type="number" id="prepaymentAmount" placeholder="0" min="0" step="1000">
                        </div>
                        <div class="calculator-actions">
                            <button class="btn btn-primary" id="calculatePrepaymentBtn">
                                <i class="fas fa-calculator"></i>
                                Рассчитать
                            </button>
                            <button class="btn" id="applyPrepaymentBtn">
                                <i class="fas fa-check"></i>
                                Внести
                            </button>
                        </div>
                    </div>
                    
                    <div class="calculator-results" id="prepaymentResults">
                        <div class="result-item">
                            <div class="result-label">Новый остаток</div>
                            <div class="result-value" id="newBalance">— ₽</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">Экономия на процентах</div>
                            <div class="result-value positive" id="interestSaved">— ₽</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">Сокращение срока</div>
                            <div class="result-value" id="monthsReduced">— мес.</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">Новый срок</div>
                            <div class="result-value" id="newTerm">— мес.</div>
                        </div>
                    </div>
                </div>
                
                <!-- График платежей -->
                <div class="payment-schedule">
                    <div class="schedule-header">
                        <div class="schedule-title">
                            <i class="fas fa-table"></i>
                            График платежей
                        </div>
                        <div class="schedule-controls">
                            <button class="btn" id="exportScheduleBtn">
                                <i class="fas fa-download"></i>
                                Экспорт
                            </button>
                        </div>
                    </div>
                    
                    <div class="schedule-table-wrapper">
                        <table class="schedule-table" id="scheduleTable">
                            <thead>
                                <tr>
                                    <th>№</th>
                                    <th>Дата</th>
                                    <th class="amount">Платёж</th>
                                    <th class="amount">Проценты</th>
                                    <th class="amount">Осн. долг</th>
                                    <th class="amount">Остаток</th>
                                </tr>
                            </thead>
                            <tbody id="scheduleTableBody">
                                <tr>
                                    <td colspan="6">
                                        <div class="loading-state">
                                            <i class="fas fa-spinner fa-pulse"></i>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно внесения платежа -->
    <div id="paymentModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>
                <i class="fas fa-money-bill"></i>
                Внести досрочное погашение
            </h3>
            
            <div class="form-group">
                <label>Сумма</label>
                <input type="number" class="form-control" id="modalPrepaymentAmount" placeholder="0" min="0.01" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label>Счёт списания</label>
                <select class="form-control" id="modalAccount" required>
                    <option value="">Выберите счёт</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Категория расхода</label>
                <select class="form-control" id="modalCategory" required>
                    <option value="">Выберите категорию</option>
                </select>
            </div>
            
            <div class="modal-buttons">
                <button class="btn" id="cancelPaymentModalBtn">Отмена</button>
                <button class="btn btn-primary" id="confirmPaymentBtn">Подтвердить</button>
            </div>
        </div>
    </div>
    
    <!-- Универсальный загрузчик модулей -->
    <script type="module" src="../js/core/moduleLoader.js"></script>
    
    <!-- Инициализация страницы -->
    <script type="module">
        import { initCreditDetailPage } from '../js/pages/credit-detail.js';
        initCreditDetailPage();
    </script>
    
    <!-- Боковое меню -->
    <script type="module">
        import * as sidebar from '../layout.js';
        window.sidebar = sidebar;
        sidebar.initSidebar();
    </script>
</body>
</html>
