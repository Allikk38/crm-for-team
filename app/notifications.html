<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: app/notifications.html
    РОЛЬ: Центр уведомлений
    
    ОСОБЕННОСТИ:
      - Просмотр всех уведомлений
      - Отметка прочитанных/непрочитанных
      - Удаление уведомлений
      - Переход к связанным объектам (задачи, сделки)
      - Автоматическое обновление счетчика
    
    ЗАВИСИМОСТИ:
      - js/pages/notifications.js
      - layout.js
    
    ИСТОРИЯ:
      - 27.03.2026: Создание supabase-версии уведомлений
      - 27.03.2026: Рефакторинг — логика вынесена в js/pages/notifications.js
      - 31.03.2026: Перенос в папку app, исправление путей
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Уведомления - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/kanban.css">
    <link rel="stylesheet" href="../css/manager.css">
    <link rel="stylesheet" href="../css/calendar.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        /* Стили (без изменений) */
        .notifications-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
            animation: fadeInUp 0.4s ease;
        }
        
        .notifications-header h2 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .notifications-header h2 .badge {
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
        }
        
        .mark-all-read, .clear-all {
            background: rgba(108, 108, 255, 0.15);
            border: 1px solid var(--card-border);
            padding: 10px 20px;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.85rem;
        }
        
        .mark-all-read:hover, .clear-all:hover {
            background: rgba(108, 108, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .clear-all {
            background: rgba(255, 107, 107, 0.15);
        }
        
        .clear-all:hover {
            background: rgba(255, 107, 107, 0.3);
        }
        
        .notification-item {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid var(--card-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            animation: fadeInScale 0.3s ease backwards;
            position: relative;
        }
        
        .notification-item:hover {
            transform: translateX(8px) translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        .notification-item.unread {
            border-left: 3px solid var(--accent);
            background: rgba(108, 108, 255, 0.05);
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .notification-type {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .notification-type.task_assigned { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .notification-type.deadline { background: rgba(255, 193, 68, 0.2); color: #ffc107; }
        .notification-type.overdue { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .notification-type.mention { background: rgba(108, 108, 255, 0.2); color: #6c6cff; }
        .notification-type.deal_status { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
        
        .notification-date {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .notification-message {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 12px;
        }
        
        .notification-actions {
            display: flex;
            gap: 12px;
        }
        
        .notification-actions button {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        
        .notification-actions button:hover {
            background: rgba(108, 108, 255, 0.15);
        }
        
        .notification-actions .delete-btn {
            color: #ff6b6b;
        }
        
        .notification-actions .delete-btn:hover {
            background: rgba(255, 107, 107, 0.15);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .notification-removing {
            animation: fadeOutScale 0.2s ease forwards;
        }
        
        @keyframes fadeOutScale {
            from {
                opacity: 1;
                transform: scale(1);
            }
            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }
        
        @media (max-width: 768px) {
            .notifications-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .mark-all-read, .clear-all {
                text-align: center;
            }
            
            .notification-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="top-bar-actions">
                    <!-- Здесь могут быть дополнительные кнопки -->
                </div>
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="notifications-container">
                <div class="notifications-header">
                    <h2>
                        <i class="fas fa-bell"></i> Уведомления
                        <span id="unreadBadge" class="badge" style="display: none;">0</span>
                    </h2>
                    <div style="display: flex; gap: 12px;">
                        <button id="markAllReadBtn" class="mark-all-read">
                            <i class="fas fa-check-double"></i> Отметить все
                        </button>
                        <button id="clearAllBtn" class="clear-all">
                            <i class="fas fa-trash"></i> Очистить всё
                        </button>
                    </div>
                </div>
                <div id="notificationsList">
                    <div class="loading-state">
                        <i class="fas fa-spinner fa-pulse"></i>
                        <p>Загрузка уведомлений...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- ========== ИНИЦИАЛИЗАЦИЯ СТРАНИЦЫ ========== -->
    <script type="module">
        import { getCurrentSupabaseUser, requireSupabaseAuth, updateSupabaseUserInterface } from '../js/core/supabase-session.js';
        
        async function initNotifications() {
            const isAuth = await requireSupabaseAuth('../auth-supabase.html');
            if (!isAuth) return;
            
            const currentUser = getCurrentSupabaseUser();
            updateSupabaseUserInterface();
            
            // Загружаем модуль уведомлений
            const { initNotificationsPage } = await import('../js/pages/notifications.js');
            initNotificationsPage();
        }
        
        initNotifications();
    </script>
    
    <!-- Инициализация бокового меню -->
    <script type="module">
        import * as sidebar from '../layout.js';
        window.sidebar = sidebar;
        sidebar.initSidebar();
    </script>
</body>
</html>
