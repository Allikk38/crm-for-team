<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Заметки - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        /* Стили остаются без изменений */
        .notes-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .notes-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .notes-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .search-box {
            position: relative;
            min-width: 250px;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            color: var(--text-primary);
        }
        
        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        .add-note-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .add-note-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .categories-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .category-chip {
            padding: 6px 16px;
            border-radius: 40px;
            background: var(--hover-bg);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        
        .category-chip.active {
            background: var(--accent);
            color: white;
        }
        
        .category-chip:hover {
            transform: translateY(-2px);
        }
        
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }
        
        .note-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        
        .note-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
        }
        
        .note-card.pinned {
            border-left: 4px solid var(--accent);
        }
        
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .note-title {
            font-weight: 600;
            font-size: 1.1rem;
            flex: 1;
            word-break: break-word;
            color: var(--text-primary);
        }
        
        .note-actions {
            display: flex;
            gap: 8px;
        }
        
        .note-action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .note-action-btn:hover {
            background: var(--hover-bg);
            color: var(--accent);
        }
        
        .note-action-btn.pinned-active {
            color: var(--accent);
        }
        
        .note-category {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            background: var(--hover-bg);
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        
        .note-content {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .note-footer {
            display: flex;
            justify-content: flex-end;
            font-size: 0.7rem;
            color: var(--text-muted);
            padding-top: 12px;
            border-top: 1px solid var(--card-border);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .note-modal-content {
            max-width: 800px;
            width: 90%;
        }
        
        .note-modal-content input,
        .note-modal-content select,
        .note-modal-content textarea {
            width: 100%;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
        }
        
        .note-modal-content textarea {
            resize: vertical;
            min-height: 200px;
        }
        
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        
        .modal-buttons button:first-child {
            background: var(--hover-bg);
            color: var(--text-primary);
        }
        
        .modal-buttons button.primary {
            background: var(--accent);
            color: white;
        }
        
        @media (max-width: 768px) {
            .notes-grid {
                grid-template-columns: 1fr;
            }
            .notes-header {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                width: 100%;
            }
        }
        /* Исправление для модального окна */
        .modal {
            display: none !important;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex !important;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: var(--border-radius-lg);
            padding: var(--spacing-xl);
            max-width: 90%;
            width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            z-index: 1001;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="notes-container">
                <div class="notes-header">
                    <h1><i class="fas fa-sticky-note"></i> Заметки</h1>
                    <div class="notes-actions">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Поиск по заметкам...">
                        </div>
                        <button class="add-note-btn" id="addNoteBtn">
                            <i class="fas fa-plus"></i> Новая заметка
                        </button>
                    </div>
                </div>
                
                <div class="categories-bar" id="categoriesBar">
                    <div class="category-chip active" data-category="all">Все</div>
                    <div class="category-chip" data-category="work">Работа</div>
                    <div class="category-chip" data-category="personal">Личное</div>
                    <div class="category-chip" data-category="ideas">Идеи</div>
                    <div class="category-chip" data-category="tasks">Задачи</div>
                </div>
                
                <div id="notesGrid" class="notes-grid">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-pulse fa-2x"></i>
                        <p>Загрузка заметок...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно -->
    <div id="noteModal" class="modal">
        <div class="modal-content note-modal-content">
            <h3 id="modalTitle">Новая заметка</h3>
            <input type="hidden" id="noteId">
            <input type="text" id="noteTitle" placeholder="Заголовок">
            <select id="noteCategory">
                <option value="work">Работа</option>
                <option value="personal">Личное</option>
                <option value="ideas">Идеи</option>
                <option value="tasks">Задачи</option>
            </select>
            <div id="editor"></div>
            <div class="modal-buttons">
                <button id="cancelNoteBtn">Отмена</button>
                <button class="primary" id="saveNoteBtn">Сохранить</button>
            </div>
        </div>
    </div>
    
    <!-- Универсальный загрузчик модулей -->
    <script type="module" src="../js/core/moduleLoader.js"></script>
    
    <!-- Инициализация страницы заметок (только один раз) -->
    <script type="module">
        import { initNotesPage } from '../js/pages/notes.js';
        import * as sidebar from '../layout.js';
        
        window.sidebar = sidebar;
        
        // Единая точка инициализации
        async function initializeApp() {
            try {
                await sidebar.initSidebar();
                await initNotesPage();
                console.log('[app] Приложение инициализировано');
            } catch (error) {
                console.error('[app] Ошибка инициализации:', error);
            }
        }
        
        // Запускаем инициализацию после загрузки DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>
</html>
