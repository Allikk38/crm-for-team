<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: app/transactions.html
    РОЛЬ: Страница списка транзакций модуля «Финансы»
    
    ОСОБЕННОСТИ:
      - Таблица транзакций с фильтрацией
      - Добавление, редактирование, удаление
      - Фильтры по дате, счёту, категории, типу
      - Поддержка URL параметров для фильтрации
      - Адаптивный дизайн (таблица / карточки)
    
    ЗАВИСИМОСТИ:
      - js/pages/transactions.js
      - js/services/finance-supabase.js
    
    ИСТОРИЯ:
      2026-04-08: Создание страницы
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Транзакции - Финансы - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        .transactions-page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .page-header h1 i {
            color: var(--accent);
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 12px 20px;
            border-radius: 40px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn:hover {
            background: rgba(108, 108, 255, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.3);
        }
        
        /* Фильтры */
        .filters-panel {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .filters-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }
        
        .filter-group {
            flex: 1;
            min-width: 180px;
        }
        
        .filter-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        
        .filter-select, .filter-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        
        .filter-select {
            cursor: pointer;
        }
        
        .date-range {
            display: flex;
            gap: 8px;
        }
        
        .date-range .filter-input {
            flex: 1;
        }
        
        .filter-actions {
            display: flex;
            gap: 8px;
        }
        
        .filter-actions .btn {
            padding: 10px 16px;
        }
        
        /* Статистика */
        .stats-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            flex: 1;
            min-width: 150px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            padding: 16px 20px;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        .stat-value.income {
            color: #4caf50;
        }
        
        .stat-value.expense {
            color: #ff6b6b;
        }
        
        /* Таблица */
        .transactions-table-wrapper {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            overflow: hidden;
        }
        
        .transactions-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .transactions-table th {
            text-align: left;
            padding: 16px 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .transactions-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .transactions-table tbody tr {
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .transactions-table tbody tr:hover {
            background: rgba(108, 108, 255, 0.05);
        }
        
        .transaction-amount {
            font-weight: 700;
        }
        
        .transaction-amount.income {
            color: #4caf50;
        }
        
        .transaction-amount.expense {
            color: #ff6b6b;
        }
        
        .transaction-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .transactions-table tbody tr:hover .transaction-actions {
            opacity: 1;
        }
        
        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .action-btn.edit:hover {
            background: rgba(108, 108, 255, 0.2);
            color: var(--accent);
        }
        
        .action-btn.delete:hover {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
        
        .category-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(108, 108, 255, 0.1);
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .account-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--hover-bg);
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        /* Карточки (мобильная версия) */
        .transactions-cards {
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        
        .transaction-card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            padding: 16px;
        }
        
        .transaction-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .transaction-card-amount {
            font-size: 1.3rem;
            font-weight: 700;
        }
        
        .transaction-card-amount.income {
            color: #4caf50;
        }
        
        .transaction-card-amount.expense {
            color: #ff6b6b;
        }
        
        .transaction-card-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .transaction-card-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .transaction-card-detail {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        
        .transaction-card-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        
        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* Модальное окно */
        .modal-content {
            max-width: 500px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .form-row {
            display: flex;
            gap: 12px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .transactions-page {
                padding: 16px;
            }
            
            .page-header h1 {
                font-size: 1.5rem;
            }
            
            .filters-row {
                flex-direction: column;
            }
            
            .filter-group {
                width: 100%;
            }
            
            .filter-actions {
                width: 100%;
            }
            
            .filter-actions .btn {
                flex: 1;
                justify-content: center;
            }
            
            .transactions-table-wrapper {
                background: transparent;
                border: none;
                overflow: visible;
            }
            
            .transactions-table {
                display: none;
            }
            
            .transactions-cards {
                display: flex;
            }
            
            .stats-summary {
                flex-direction: column;
                gap: 12px;
            }
            
            .stat-card {
                padding: 12px 16px;
            }
            
            .stat-value {
                font-size: 1.5rem;
            }
        }
        
        /* Загрузка */
        .loading-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .loading-state i {
            font-size: 24px;
            margin-bottom: 12px;
        }
        
        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Боковая панель -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <!-- Основной контент -->
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="transactions-page">
                <!-- Заголовок -->
                <div class="page-header">
                    <h1>
                        <i class="fas fa-list-ul"></i>
                        Транзакции
                    </h1>
                    <div class="header-actions">
                        <button class="btn" id="backToFinanceBtn">
                            <i class="fas fa-arrow-left"></i>
                            Назад
                        </button>
                        <button class="btn btn-primary" id="addTransactionBtn">
                            <i class="fas fa-plus"></i>
                            Добавить
                        </button>
                    </div>
                </div>
                
                <!-- Фильтры -->
                <div class="filters-panel">
                    <div class="filters-row">
                        <div class="filter-group">
                            <label>Тип</label>
                            <select class="filter-select" id="filterType">
                                <option value="all">Все</option>
                                <option value="income">Доходы</option>
                                <option value="expense">Расходы</option>
                            </select>
                        </div>
                        
                        <div class="filter-group">
                            <label>Счёт</label>
                            <select class="filter-select" id="filterAccount">
                                <option value="all">Все счета</option>
                            </select>
                        </div>
                        
                        <div class="filter-group">
                            <label>Категория</label>
                            <select class="filter-select" id="filterCategory">
                                <option value="all">Все категории</option>
                            </select>
                        </div>
                        
                        <div class="filter-group">
                            <label>Период</label>
                            <div class="date-range">
                                <input type="date" class="filter-input" id="filterDateFrom" placeholder="С">
                                <input type="date" class="filter-input" id="filterDateTo" placeholder="По">
                            </div>
                        </div>
                        
                        <div class="filter-actions">
                            <button class="btn" id="applyFiltersBtn">
                                <i class="fas fa-filter"></i>
                                Применить
                            </button>
                            <button class="btn" id="resetFiltersBtn">
                                <i class="fas fa-times"></i>
                                Сбросить
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Статистика -->
                <div class="stats-summary" id="statsSummary">
                    <div class="stat-card">
                        <div class="stat-label">Доходы</div>
                        <div class="stat-value income" id="totalIncome">0 ₽</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Расходы</div>
                        <div class="stat-value expense" id="totalExpense">0 ₽</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Баланс</div>
                        <div class="stat-value" id="balance">0 ₽</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Транзакций</div>
                        <div class="stat-value" id="transactionCount">0</div>
                    </div>
                </div>
                
                <!-- Таблица транзакций -->
                <div class="transactions-table-wrapper">
                    <table class="transactions-table" id="transactionsTable">
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Категория</th>
                                <th>Счёт</th>
                                <th>Описание</th>
                                <th>Сумма</th>
                                <th width="80"></th>
                            </tr>
                        </thead>
                        <tbody id="transactionsTableBody">
                            <tr>
                                <td colspan="6">
                                    <div class="loading-state">
                                        <i class="fas fa-spinner fa-pulse"></i>
                                        <p>Загрузка транзакций...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <!-- Карточки для мобильной версии -->
                    <div class="transactions-cards" id="transactionsCards"></div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно транзакции -->
    <div id="transactionModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3 id="modalTitle">
                <i class="fas fa-plus-circle"></i>
                Новая транзакция
            </h3>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Тип</label>
                    <select class="form-control" id="modalType">
                        <option value="expense">Расход</option>
                        <option value="income">Доход</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Сумма</label>
                    <input type="number" class="form-control" id="modalAmount" placeholder="0" min="0.01" step="0.01" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Счёт</label>
                <select class="form-control" id="modalAccount" required>
                    <option value="">Выберите счёт</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Категория</label>
                <select class="form-control" id="modalCategory" required>
                    <option value="">Выберите категорию</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Дата</label>
                <input type="date" class="form-control" id="modalDate" required>
            </div>
            
            <div class="form-group">
                <label>Комментарий</label>
                <input type="text" class="form-control" id="modalComment" placeholder="Необязательно">
            </div>
            
            <div class="modal-buttons">
                <button class="btn" id="cancelModalBtn">Отмена</button>
                <button class="btn btn-primary" id="saveTransactionBtn">Сохранить</button>
            </div>
        </div>
    </div>
    
    <!-- Универсальный загрузчик модулей -->
    <script type="module" src="../js/core/moduleLoader.js"></script>
    
    <!-- Инициализация страницы -->
    <script type="module">
        import { initTransactionsPage } from '../js/pages/transactions.js';
        initTransactionsPage();
    </script>
    
    <!-- Боковое меню -->
    <script type="module">
        import * as sidebar from '../layout.js';
        window.sidebar = sidebar;
        sidebar.initSidebar();
    </script>
</body>
</html>
