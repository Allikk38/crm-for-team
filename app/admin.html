<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: app/admin.html
    РОЛЬ: Панель администратора (оркестратор)
    
    ОСОБЕННОСТИ:
      - Только структура и контейнеры
      - Ленивая загрузка компонентов через admin.js
      - Стили вынесены в CSS
    
    ИСТОРИЯ:
      - 27.03.2026: Создание страницы
      - 10.04.2026: ПОЛНЫЙ РЕФАКТОРИНГ — разделение на компоненты
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    document.documentElement.classList.add('theme-light');
                    document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    document.documentElement.classList.add('theme-dark');
                    document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Управление - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        /* Минимальные стили для структуры */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .admin-header {
            margin-bottom: 24px;
        }
        
        .admin-header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .admin-tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
        }
        
        .tab-btn:hover {
            color: var(--text-primary);
        }
        
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        
        .tab-content {
            animation: fadeIn 0.3s ease;
        }
        
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .admin-container {
                padding: 16px;
            }
            
            .admin-tabs {
                flex-direction: column;
                border-bottom: none;
                gap: 4px;
            }
            
            .tab-btn {
                text-align: left;
                border-bottom: 1px solid var(--card-border);
                border-left: 2px solid transparent;
                margin-bottom: 0;
            }
            
            .tab-btn.active {
                border-bottom-color: var(--card-border);
                border-left-color: var(--accent);
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="admin-container">
                <div class="admin-header">
                    <h1>
                        <i class="fas fa-shield-alt"></i>
                        Управление системой
                    </h1>
                </div>
                
                <!-- Вкладки -->
                <div class="admin-tabs">
                    <button class="tab-btn active" data-tab="users">
                        <i class="fas fa-users"></i> Пользователи
                    </button>
                    <button class="tab-btn" data-tab="licenses">
                        <i class="fas fa-key"></i> Лицензии
                    </button>
                    <button class="tab-btn" data-tab="permissions">
                        <i class="fas fa-lock"></i> Права доступа
                    </button>
                    <button class="tab-btn" data-tab="stats">
                        <i class="fas fa-chart-bar"></i> Статистика
                    </button>
                </div>
                
                <!-- Контейнеры для компонентов -->
                <div id="tabUsers" class="tab-content">
                    <div class="loading-container">
                        <i class="fas fa-spinner fa-pulse fa-2x" style="color: var(--text-muted);"></i>
                    </div>
                </div>
                
                <div id="tabLicenses" class="tab-content" style="display: none;">
                    <div class="loading-container">
                        <i class="fas fa-spinner fa-pulse fa-2x" style="color: var(--text-muted);"></i>
                    </div>
                </div>
                
                <div id="tabPermissions" class="tab-content" style="display: none;">
                    <div class="loading-container">
                        <i class="fas fa-spinner fa-pulse fa-2x" style="color: var(--text-muted);"></i>
                    </div>
                </div>
                
                <div id="tabStats" class="tab-content" style="display: none;">
                    <div class="loading-container">
                        <i class="fas fa-spinner fa-pulse fa-2x" style="color: var(--text-muted);"></i>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Универсальный загрузчик модулей -->
    <script type="module" src="../js/core/moduleLoader.js"></script>
    
    <!-- Инициализация страницы -->
    <script type="module">
        import { initAdminPage } from '../js/pages/admin.js';
        import * as sidebar from '../layout.js';
        
        window.sidebar = sidebar;
        
        async function init() {
            await sidebar.initSidebar();
            await initAdminPage();
        }
        
        init();
    </script>
</body>
</html>
