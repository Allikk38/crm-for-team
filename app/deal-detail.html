<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: app/deal-detail.html
    РОЛЬ: Детальный режим просмотра сделки
    ОСОБЕННОСТИ:
      - Лестница этапов (горизонтальная и вертикальная)
      - Чек-листы для каждого этапа
      - Подсказки Спиры
      - История действий
      - Возможность завершить этап
    ИСТОРИЯ:
      - 31.03.2026: Создание файла
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Сделка - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        /* Стили для детального режима сделки */
        .deal-detail-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Хлебные крошки */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .breadcrumb a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        .breadcrumb span {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .breadcrumb i {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        /* Информационная карточка сделки */
        .deal-info-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--card-border);
        }
        
        .deal-info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .deal-title h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        
        .deal-address {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .deal-badges {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .badge-type {
            background: var(--accent);
            color: white;
        }
        
        .badge-status {
            background: var(--warning-bg);
            color: var(--warning);
        }
        
        .deal-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--card-border);
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
        }
        
        .stat-sub {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        /* Основной контент: этапы и содержимое */
        .deal-detail-main {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        
        /* Вертикальная навигация по этапам (для десктопа) */
        .stages-sidebar {
            width: 280px;
            flex-shrink: 0;
        }
        
        .stages-vertical {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            position: sticky;
            top: 20px;
        }
        
        .stage-vertical-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        
        .stage-vertical-item:hover {
            background: var(--hover-bg);
        }
        
        .stage-vertical-item.active {
            background: var(--hover-bg);
            border-left-color: var(--accent);
        }
        
        .stage-vertical-item.completed .stage-icon {
            color: #4caf50;
        }
        
        .stage-vertical-item.current .stage-icon {
            color: var(--accent);
        }
        
        .stage-icon {
            width: 32px;
            font-size: 1.1rem;
        }
        
        .stage-info {
            flex: 1;
        }
        
        .stage-name {
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .stage-status {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        /* Горизонтальная навигация (для мобильных) */
        .stages-horizontal {
            display: none;
            overflow-x: auto;
            gap: 8px;
            padding: 12px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            margin-bottom: 20px;
        }
        
        .stage-horizontal-item {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--input-bg);
            white-space: nowrap;
            font-size: 0.85rem;
        }
        
        .stage-horizontal-item.active {
            background: var(--accent);
            color: white;
        }
        
        .stage-horizontal-item.completed {
            background: #4caf50;
            color: white;
        }
        
        /* Контент активного этапа */
        .stage-content {
            flex: 1;
            min-width: 0;
        }
        
        .stage-panel {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            overflow: hidden;
        }
        
        .stage-panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .stage-panel-header h2 {
            font-size: 1.3rem;
        }
        
        .complete-stage-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .complete-stage-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .complete-stage-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stage-panel-body {
            padding: 24px;
        }
        
        /* Чек-листы */
        .checklist-section {
            margin-bottom: 24px;
        }
        
        .checklist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            cursor: pointer;
        }
        
        .checklist-title {
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checklist-count {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        .checklist-items {
            padding-left: 20px;
        }
        
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            background: var(--input-bg);
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }
        
        .checklist-item:hover {
            transform: translateX(4px);
        }
        
        .checklist-item.completed {
            opacity: 0.7;
        }
        
        .checklist-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent);
        }
        
        .checklist-text {
            flex: 1;
            font-size: 0.9rem;
        }
        
        .checklist-item.completed .checklist-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        
        .checklist-date {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        /* Подсказки Спиры */
        .spira-tip {
            background: linear-gradient(135deg, rgba(108, 108, 255, 0.1), rgba(108, 108, 255, 0.05));
            border-left: 4px solid var(--accent);
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
            display: flex;
            gap: 12px;
        }
        
        .spira-icon {
            font-size: 1.5rem;
        }
        
        .spira-text {
            flex: 1;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .spira-text strong {
            color: var(--accent);
        }
        
        /* История действий */
        .deal-history {
            margin-top: 24px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            overflow: hidden;
        }
        
        .history-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--card-border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .history-content {
            padding: 16px 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .history-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--card-border);
        }
        
        .history-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--input-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .history-detail {
            flex: 1;
        }
        
        .history-action {
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .history-time {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .stages-sidebar {
                display: none;
            }
            
            .stages-horizontal {
                display: flex;
            }
            
            .deal-stats {
                grid-template-columns: 1fr 1fr;
            }
            
            .stage-panel-header {
                flex-direction: column;
                text-align: center;
            }
            
            .checklist-items {
                padding-left: 0;
            }
        }
        
        @media (min-width: 769px) and (max-width: 1024px) {
            .stages-sidebar {
                width: 240px;
            }
        }
        
        /* Анимации */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .stage-panel {
            animation: slideIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="top-bar-actions">
                    <button id="backToListBtn" class="back-btn" style="background: none; border: none; cursor: pointer; color: var(--accent); padding: 8px 16px; border-radius: 40px;">
                        <i class="fas fa-arrow-left"></i> К списку сделок
                    </button>
                </div>
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="deal-detail-container" id="dealDetailContainer">
                <div class="loading-state" style="text-align: center; padding: 60px;">
                    <i class="fas fa-spinner fa-pulse fa-2x"></i>
                    <p>Загрузка данных сделки...</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Универсальный загрузчик модулей -->
    <script type="module" src="../js/core/moduleLoader.js"></script>
    
    <!-- Инициализация страницы детального режима -->
    <script type="module">
        import { getCurrentSupabaseUser, requireSupabaseAuth, updateSupabaseUserInterface } from '../js/core/supabase-session.js';
        
        async function initDealDetail() {
            const isAuth = await requireSupabaseAuth('../auth-supabase.html');
            if (!isAuth) return;
            
            const currentUser = getCurrentSupabaseUser();
            updateSupabaseUserInterface();
            
            // Получаем ID сделки из URL
            const urlParams = new URLSearchParams(window.location.search);
            const dealId = urlParams.get('id');
            
            if (!dealId) {
                console.error('[deal-detail] ID сделки не указан');
                window.location.href = '/app/deals.html';
                return;
            }
            
            // Загружаем модуль детального режима
            const { initDealDetailPage } = await import('../js/pages/deal-detail.js');
            initDealDetailPage(dealId);
        }
        
        initDealDetail();
    </script>
    
    <!-- Инициализация бокового меню -->
    <script type="module">
        import * as sidebar from '../layout.js';
        window.sidebar = sidebar;
        sidebar.initSidebar();
    </script>
</body>
</html>
