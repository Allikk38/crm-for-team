<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: app/dashboard.html
    РОЛЬ: Главная страница (дашборд) с динамическими виджетами
    
    ОСОБЕННОСТИ:
      - Полностью динамическая система виджетов
      - Сохранение всех существующих стилей
      - Настройка дашборда через интерфейс
    
    ИСТОРИЯ:
      - 27.03.2026: Создание supabase-версии дашборда
      - 30.03.2026: Замена статического контента на динамические виджеты
      - 30.03.2026: Перенос в папку app, исправление путей
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Дашборд - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- CSS модули (исправленные пути) -->
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/kanban.css">
    <link rel="stylesheet" href="../css/manager.css">
    <link rel="stylesheet" href="../css/calendar.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/dashboard-grid.css">
    <link rel="stylesheet" href="../css/widgets.css">
    
    <style>
        /* Все существующие стили сохранены */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .dashboard .card {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.4s ease backwards;
        }
        
        .dashboard .card:nth-child(1) { animation-delay: 0.05s; }
        .dashboard .card:nth-child(2) { animation-delay: 0.1s; }
        .dashboard .card:nth-child(3) { animation-delay: 0.15s; }
        
        .dashboard .card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.2);
        }
        
        .dashboard .card:active {
            transform: translateY(-2px) scale(0.99);
        }
        
        .dashboard .card p {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.2s ease;
        }
        
        .dashboard .card:hover p {
            transform: scale(1.05);
        }
        
        .analytics-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .analytics-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.4s ease backwards;
        }
        
        .analytics-card:nth-child(1) { animation-delay: 0.2s; }
        .analytics-card:nth-child(2) { animation-delay: 0.25s; }
        
        .analytics-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
        }
        
        .analytics-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        
        .analytics-card:hover .analytics-title {
            color: var(--accent);
        }
        
        .kpi-compact {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        .kpi-compact-item {
            text-align: center;
            transition: all 0.2s ease;
            animation: fadeInScale 0.3s ease backwards;
        }
        
        .kpi-compact-item:nth-child(1) { animation-delay: 0.3s; }
        .kpi-compact-item:nth-child(2) { animation-delay: 0.35s; }
        .kpi-compact-item:nth-child(3) { animation-delay: 0.4s; }
        .kpi-compact-item:nth-child(4) { animation-delay: 0.45s; }
        
        .kpi-compact-item:hover {
            transform: translateY(-4px);
        }
        
        .kpi-compact-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.2s ease;
        }
        
        .kpi-compact-item:hover .kpi-compact-value {
            transform: scale(1.05);
        }
        
        .kpi-compact-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .trend-up {
            color: #4caf50;
            font-size: 0.7rem;
            transition: all 0.2s ease;
        }
        
        .trend-down {
            color: #ff6b6b;
            font-size: 0.7rem;
            transition: all 0.2s ease;
        }
        
        .trend-up:hover, .trend-down:hover {
            transform: translateX(2px);
        }
        
        .chart-container {
            margin-top: 16px;
        }
        
        .chart-bars-mini {
            display: flex;
            align-items: flex-end;
            height: 100px;
            gap: 8px;
            margin-top: 12px;
        }
        
        .chart-bar-mini {
            flex: 1;
            background: linear-gradient(180deg, var(--accent), var(--accent-hover));
            border-radius: 4px 4px 0 0;
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 4px;
            cursor: pointer;
        }
        
        .chart-bar-mini:hover {
            opacity: 0.8;
            transform: scaleX(1.02);
        }
        
        .agent-ranking {
            margin-top: 12px;
        }
        
        .agent-ranking-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--card-border);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideInFromLeft 0.3s ease backwards;
        }
        
        .agent-ranking-item:nth-child(1) { animation-delay: 0.05s; }
        .agent-ranking-item:nth-child(2) { animation-delay: 0.1s; }
        .agent-ranking-item:nth-child(3) { animation-delay: 0.15s; }
        .agent-ranking-item:nth-child(4) { animation-delay: 0.2s; }
        .agent-ranking-item:nth-child(5) { animation-delay: 0.25s; }
        
        .agent-ranking-item:hover {
            transform: translateX(8px);
            background: rgba(108, 108, 255, 0.05);
            padding-left: 8px;
            border-radius: 12px;
        }
        
        .agent-ranking-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .agent-ranking-badge {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .agent-ranking-item:hover .agent-ranking-badge {
            transform: scale(1.1);
        }
        
        .agent-ranking-value {
            font-weight: 600;
            color: var(--accent);
            transition: all 0.2s ease;
        }
        
        .agent-ranking-item:hover .agent-ranking-value {
            transform: scale(1.05);
        }
        
        .progress-bar-container {
            height: 8px;
            background: var(--input-bg);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .progress-header h3 {
            font-size: 0.9rem;
        }
        
        .progress-stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 0.75rem;
        }
        
        .progress-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
        }
        
        .progress-stats span:hover {
            transform: translateX(2px);
        }
        
        .info-panel {
            animation: fadeInUp 0.4s ease 0.5s backwards;
        }
        
        .info-panel:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        
        .skeleton {
            background: linear-gradient(90deg, var(--card-border) 25%, var(--card-hover) 50%, var(--card-border) 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
            border-radius: 8px;
        }
        
        @keyframes skeletonLoading {
            0% { background-position: 200% 0;
            100% { background-position: -200% 0; }
        }
        
        @media (max-width: 768px) {
            .analytics-section {
                grid-template-columns: 1fr;
            }
            
            .dashboard .card p {
                font-size: 1.5rem;
            }
        }
        
        /* Стили для динамического контейнера */
        .dashboard-root {
            animation: fadeInUp 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Боковая панель навигации -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <!-- Основной контент -->
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <!-- Динамический контейнер для виджетов -->
            <div id="dashboardRoot" class="dashboard-root">
                <div style="display: flex; justify-content: center; align-items: center; min-height: 400px;">
                    <div class="widget-loading">
                        <div class="widget-spinner" style="width: 40px; height: 40px;"></div>
                        <span style="margin-top: 12px;">Загрузка дашборда...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- ========== УНИВЕРСАЛЬНЫЙ ЗАГРУЗЧИК МОДУЛЕЙ ========== -->
    <script type="module" src="../js/core/moduleLoader.js"></script>
    
    <!-- Инициализация дашборда -->
    <script type="module">
        import DashboardContainer from '../js/components/dashboard-container.js';
        
        window.addEventListener('load', async () => {
            console.log('[dashboard] Инициализация дашборда...');
            
            const waitForUser = (maxAttempts = 100) => {
                return new Promise((resolve) => {
                    let attempts = 0;
                    const check = () => {
                        attempts++;
                        if (window.currentSupabaseUser) {
                            resolve(true);
                        } else if (attempts >= maxAttempts) {
                            resolve(false);
                        } else {
                            setTimeout(check, 100);
                        }
                    };
                    check();
                });
            };
            
            const userLoaded = await waitForUser();
            const dashboardRoot = document.getElementById('dashboardRoot');
            
            if (!dashboardRoot) return;
            
            if (!userLoaded) {
                dashboardRoot.innerHTML = `
                    <div class="dashboard-empty" style="text-align: center; padding: 60px 20px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 64px; color: #ff6b6b;"></i>
                        <h3>Ошибка авторизации</h3>
                        <button onclick="location.href='../auth-supabase.html'" class="dashboard-btn primary" style="margin-top: 20px;">Войти</button>
                    </div>
                `;
                return;
            }
            
            try {
                const dashboard = new DashboardContainer(dashboardRoot);
                await dashboard.init();
                console.log('[dashboard] Дашборд загружен');
            } catch (error) {
                console.error('[dashboard] Ошибка:', error);
                dashboardRoot.innerHTML = `
                    <div class="dashboard-empty" style="text-align: center; padding: 60px 20px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 64px; color: #ff6b6b;"></i>
                        <h3>Ошибка загрузки</h3>
                        <button onclick="location.reload()" class="dashboard-btn" style="margin-top: 20px;">Обновить</button>
                    </div>
                `;
            }
        });
    </script>
    
    <!-- Инициализация бокового меню -->
    <script type="module">
        import * as sidebar from '../layout.js';
        window.sidebar = sidebar;
        sidebar.initSidebar();
    </script>
</body>
</html>
