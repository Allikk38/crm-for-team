<!DOCTYPE html>
<html>
<head>
    <title>Test Supabase</title>
</head>
<body>
    <h1>Тест подключения к Supabase</h1>
    <div id="status">Проверка...</div>
    
    <script type="module">
        import { supabase, checkConnection } from './js/core/supabase.js';
        
        const status = document.getElementById('status');
        
        async function test() {
            status.textContent = 'Проверка подключения...';
            
            const connected = await checkConnection();
            
            if (connected) {
                status.innerHTML = '✅ Подключение успешно!';
            } else {
                status.innerHTML = '❌ Ошибка подключения. Откройте консоль (F12) для деталей.';
            }
        }
        
        test();
    </script>
</body>
</html>
