<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 
    ============================================
    ФАЙЛ: marketplace-supabase.html
    РОЛЬ: Маркетплейс модулей и виджетов
    
    ОСОБЕННОСТИ:
      - Каталог доступных модулей
      - Покупка модулей для команды (интеграция с Supabase)
      - Управление лицензиями
      - Интеграция с системой прав (permissions.js)
      - Автоматическое обновление навигации после покупки
    
    ИСТОРИЯ:
      - 30.03.2026: Создание страницы маркетплейса
      - 30.03.2026: Переход на асинхронные операции с Supabase
      - 30.03.2026: Интеграция с license-supabase.js
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Маркетплейс - CRM для команды</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <style>
        .marketplace-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .marketplace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            animation: fadeInUp 0.4s ease;
        }
        
        .marketplace-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .marketplace-tabs {
            display: flex;
            gap: 12px;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 32px;
        }
        
        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        
        .tab-btn:hover:not(.active) {
            color: var(--text-primary);
        }
        
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .module-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 24px;
            transition: all 0.3s ease;
            animation: fadeInScale 0.3s ease backwards;
        }
        
        .module-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
        }
        
        .module-card.purchased {
            border-left: 4px solid #4caf50;
        }
        
        .module-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        
        .module-icon i {
            font-size: 24px;
            color: white;
        }
        
        .module-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .module-description {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        
        .module-features {
            list-style: none;
            margin: 16px 0;
            padding: 0;
        }
        
        .module-features li {
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .module-features i {
            font-size: 0.75rem;
        }
        
        .module-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--card-border);
        }
        
        .module-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .module-price small {
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-muted);
        }
        
        .module-btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .module-btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
        }
        
        .module-btn.secondary {
            background: var(--hover-bg);
            color: var(--text-primary);
            border: 1px solid var(--card-border);
        }
        
        .module-btn.purchased {
            background: #4caf50;
            color: white;
            cursor: default;
        }
        
        .module-btn:hover:not(.purchased) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.3);
        }
        
        .license-stats {
            background: var(--hover-bg);
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .company-info {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
            color: white;
        }
        
        .company-info h3 {
            margin-bottom: 8px;
        }
        
        .company-info p {
            opacity: 0.9;
            font-size: 0.85rem;
        }
        
        .license-list {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            overflow: hidden;
        }
        
        .license-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .license-item:last-child {
            border-bottom: none;
        }
        
        .license-info h4 {
            margin-bottom: 4px;
        }
        
        .license-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .license-users {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-badge {
            background: var(--hover-bg);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        @media (max-width: 768px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }
            .license-item {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="marketplace-container">
                <div class="marketplace-header">
                    <h1><i class="fas fa-store"></i> Маркетплейс модулей</h1>
                    <div id="companyBadge" style="background: var(--hover-bg); padding: 8px 16px; border-radius: 40px; font-size: 0.85rem;">
                        <i class="fas fa-building"></i> <span id="companyName">Моя компания</span>
                    </div>
                </div>
                
                <div class="marketplace-tabs">
                    <button class="tab-btn active" data-tab="catalog">📦 Каталог модулей</button>
                    <button class="tab-btn" data-tab="licenses">🔑 Мои лицензии</button>
                    <button class="tab-btn" data-tab="users">👥 Назначение прав</button>
                </div>
                
                <!-- Вкладка: Каталог модулей -->
                <div id="tabCatalog" class="tab-content">
                    <div class="modules-grid" id="modulesGrid">
                        <div class="loading-state" style="text-align: center; padding: 60px;">
                            <i class="fas fa-spinner fa-pulse"></i>
                            <p>Загрузка модулей...</p>
                        </div>
                    </div>
                </div>
                
                <!-- Вкладка: Мои лицензии -->
                <div id="tabLicenses" class="tab-content" style="display: none;">
                    <div class="company-info">
                        <h3><i class="fas fa-crown"></i> Лицензии компании</h3>
                        <p>Управляйте модулями, приобретенными для вашей команды</p>
                    </div>
                    <div id="licensesList" class="license-list">
                        <div class="empty-state">
                            <i class="fas fa-shopping-cart"></i>
                            <p>Нет приобретенных модулей</p>
                            <button onclick="document.querySelector('[data-tab=\"catalog\"]').click()" style="margin-top: 12px; padding: 8px 20px; background: var(--accent); border: none; border-radius: 40px; color: white; cursor: pointer;">
                                Перейти в каталог
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Вкладка: Назначение прав -->
                <div id="tabUsers" class="tab-content" style="display: none;">
                    <div class="company-info">
                        <h3><i class="fas fa-users"></i> Назначение прав пользователям</h3>
                        <p>Выберите, кому из сотрудников доступны купленные модули</p>
                    </div>
                    <div id="usersAssignments" class="license-list">
                        <div class="empty-state">
                            <i class="fas fa-users"></i>
                            <p>Загрузка пользователей...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module">
        /**
         * ============================================
         * МАРКЕТПЛЕЙС - ОСНОВНАЯ ЛОГИКА
         * ============================================
         */
        
        import { getCurrentSupabaseUser, requireSupabaseAuth, updateSupabaseUserInterface } from './js/core/supabase-session.js';
        import { 
            getModulesCatalog, 
            purchaseModuleForTeam, 
            getCompanyLicenses, 
            assignModuleToUser,
            revokeModuleFromUser,
            getAllAssignments,
            getUserModules
        } from './js/services/license-supabase.js';
        
        let currentUser = null;
        let isAdmin = false;
        let licenses = [];
        let assignments = {};
        
        // Каталог модулей (фиксированный, из конфигурации)
        const MODULES_CATALOG = Object.entries(getModulesCatalog()).map(([id, data]) => ({
            id,
            name: data.name,
            icon: id === 'real_estate' ? 'fa-building' : 
                  id === 'finance' ? 'fa-coins' :
                  id === 'education' ? 'fa-graduation-cap' :
                  id === 'health' ? 'fa-heartbeat' : 'fa-rocket',
            description: data.description || 'Расширение функционала',
            price: data.price,
            period: 'мес',
            licenseType: 'team',
            features: data.features || ['Расширенные возможности'],
            isFree: data.price === 0
        }));
        
        /**
         * Загрузка данных о лицензиях из Supabase
         */
        async function loadData() {
            licenses = await getCompanyLicenses();
            assignments = await getAllAssignments();
            console.log('[marketplace] Данные загружены, лицензий:', licenses.length);
        }
        
        /**
         * Проверка, куплен ли модуль
         */
        function isModulePurchased(moduleId) {
            return licenses.some(l => l.module_id === moduleId);
        }
        
        /**
         * Получение информации о лицензии модуля
         */
        function getModuleLicense(moduleId) {
            return licenses.find(l => l.module_id === moduleId);
        }
        
        /**
         * Обработка покупки модуля
         */
        async function handlePurchaseModule(moduleId) {
            const module = MODULES_CATALOG.find(m => m.id === moduleId);
            if (!module) return;
            
            if (module.isFree) {
                alert('Базовый модуль уже доступен бесплатно');
                return;
            }
            
            if (isModulePurchased(moduleId)) {
                alert('Модуль уже приобретен');
                return;
            }
            
            const success = await purchaseModuleForTeam(moduleId, 10);
            if (success) {
                await loadData();
                await renderCatalog();
                await renderLicenses();
                await renderUsersAssignments();
                
                // Обновляем навигацию после покупки
                if (window.sidebar?.renderNavigation) {
                    window.sidebar.renderNavigation();
                }
                
                alert(`✅ Модуль "${module.name}" приобретен для команды!`);
            } else {
                alert('❌ Ошибка при покупке модуля');
            }
        }
        
        /**
         * Обработка назначения модуля пользователю
         */
        async function handleAssignModule(moduleId, userId, userName) {
            const success = await assignModuleToUser(moduleId, userId);
            if (success) {
                await loadData();
                await renderUsersAssignments();
                await renderLicenses();
                alert(`✅ Модуль назначен пользователю ${userName}`);
            } else {
                alert('❌ Ошибка при назначении модуля');
            }
        }
        
        /**
         * Обработка отзыва модуля у пользователя
         */
        async function handleRemoveAssignment(userId, moduleId) {
            const success = await revokeModuleFromUser(moduleId, userId);
            if (success) {
                await loadData();
                await renderUsersAssignments();
                await renderLicenses();
                alert('✅ Доступ к модулю отозван');
            } else {
                alert('❌ Ошибка при отзыве');
            }
        }
        
        /**
         * Рендер каталога модулей
         */
        async function renderCatalog() {
            const container = document.getElementById('modulesGrid');
            if (!container) return;
            
            await loadData();
            
            if (MODULES_CATALOG.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет доступных модулей</div>';
                return;
            }
            
            container.innerHTML = MODULES_CATALOG.map((module, index) => {
                const purchased = isModulePurchased(module.id);
                const license = getModuleLicense(module.id);
                const priceDisplay = module.price === 0 ? 'Бесплатно' : `${module.price} ₽`;
                
                let buttonHtml = '';
                if (module.isFree) {
                    buttonHtml = `<button class="module-btn purchased" disabled><i class="fas fa-check"></i> Бесплатный</button>`;
                } else if (purchased) {
                    buttonHtml = `<button class="module-btn purchased" disabled><i class="fas fa-check"></i> Приобретен</button>`;
                } else {
                    buttonHtml = `<button class="module-btn primary" onclick="window.purchaseModule('${module.id}')"><i class="fas fa-shopping-cart"></i> Купить ${priceDisplay}/${module.period}</button>`;
                }
                
                let licenseInfo = '';
                if (purchased && license) {
                    licenseInfo = `<div class="license-stats">
                        <i class="fas fa-check-circle"></i> Лицензия активна
                    </div>`;
                }
                
                return `
                    <div class="module-card ${purchased ? 'purchased' : ''}" style="animation-delay: ${index * 0.05}s">
                        <div class="module-icon">
                            <i class="fas ${module.icon}"></i>
                        </div>
                        <div class="module-name">${module.name}</div>
                        <div class="module-description">${module.description}</div>
                        <ul class="module-features">
                            ${module.features.map(f => `<li><i class="fas fa-check-circle" style="color: #4caf50;"></i> ${f}</li>`).join('')}
                        </ul>
                        ${licenseInfo}
                        <div class="module-footer">
                            <div class="module-price">${priceDisplay}${module.price > 0 ? `<small>/${module.period}</small>` : ''}</div>
                            ${buttonHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        /**
         * Рендер списка лицензий
         */
        async function renderLicenses() {
            const container = document.getElementById('licensesList');
            if (!container) return;
            
            await loadData();
            
            if (licenses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-shopping-cart"></i>
                        <p>Нет приобретенных модулей</p>
                        <button onclick="document.querySelector('[data-tab=\"catalog\"]').click()" style="margin-top: 12px; padding: 8px 20px; background: var(--accent); border: none; border-radius: 40px; color: white; cursor: pointer;">
                            Перейти в каталог
                        </button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = licenses.map(license => {
                const module = MODULES_CATALOG.find(m => m.id === license.module_id);
                return `
                    <div class="license-item">
                        <div class="license-info">
                            <h4><i class="fas ${module?.icon || 'fa-puzzle-piece'}"></i> ${module?.name || license.module_id}</h4>
                            <p>Приобретен: ${license.created_at?.split('T')[0] || new Date().toLocaleDateString()}</p>
                        </div>
                        <div class="license-users">
                            <span class="user-badge"><i class="fas fa-check-circle"></i> Активен</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        /**
         * Рендер назначений прав пользователям
         */
        async function renderUsersAssignments() {
            const container = document.getElementById('usersAssignments');
            if (!container) return;
            
            await loadData();
            
            const userModules = await getUserModules(currentUser.id);
            
            if (userModules.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <p>Нет назначенных модулей</p>
                        <button class="module-btn primary" onclick="document.querySelector('[data-tab=\"catalog\"]').click()" style="margin-top: 12px;">
                            Сначала купите модули
                        </button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="license-list">
                    <div class="license-item">
                        <div class="license-info">
                            <h4><i class="fas fa-user"></i> ${currentUser.name}</h4>
                            <p>Роль: ${currentUser.role === 'admin' ? 'Администратор' : currentUser.role === 'manager' ? 'Менеджер' : 'Агент'}</p>
                        </div>
                        <div class="license-users">
                            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                ${userModules.map(m => `
                                    <span class="user-badge" style="background: var(--accent); color: white;">
                                        ${m.name}
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Глобальные функции для вызова из HTML
        window.purchaseModule = handlePurchaseModule;
        window.assignModuleToUser = handleAssignModule;
        window.removeAssignment = handleRemoveAssignment;
        
        window.openAssignModal = (moduleId, moduleName) => {
            const userId = prompt(`Введите ID пользователя для назначения модуля "${moduleName}"\n(текущий пользователь: ${currentUser?.id})`);
            if (userId && userId.trim()) {
                handleAssignModule(moduleId, userId.trim(), userId.trim());
            }
        };
        
        window.openAssignUserModal = (userId, userName) => {
            const availableModules = licenses.filter(l => !assignments[userId]?.some(a => a.moduleId === l.moduleId));
            if (availableModules.length === 0) {
                alert('Нет доступных модулей для назначения');
                return;
            }
            const moduleOptions = availableModules.map((m, i) => `${i + 1}. ${MODULES_CATALOG.find(c => c.id === m.module_id)?.name || m.module_id}`).join('\n');
            const choice = prompt(`Выберите модуль для ${userName}:\n${moduleOptions}\n\nВведите номер модуля:`);
            if (choice) {
                const index = parseInt(choice) - 1;
                if (availableModules[index]) {
                    handleAssignModule(availableModules[index].module_id, userId, userName);
                } else {
                    alert('Неверный выбор');
                }
            }
        };
        
        // Переключение вкладок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const tabName = btn.dataset.tab;
                document.getElementById('tabCatalog').style.display = tabName === 'catalog' ? 'block' : 'none';
                document.getElementById('tabLicenses').style.display = tabName === 'licenses' ? 'block' : 'none';
                document.getElementById('tabUsers').style.display = tabName === 'users' ? 'block' : 'none';
                
                if (tabName === 'licenses') await renderLicenses();
                if (tabName === 'users') await renderUsersAssignments();
            });
        });
        
        /**
         * Инициализация страницы
         */
        async function init() {
            console.log('[marketplace] Инициализация...');
            
            const isAuth = await requireSupabaseAuth('auth-supabase.html');
            if (!isAuth) return;
            
            currentUser = getCurrentSupabaseUser();
            updateSupabaseUserInterface();
            isAdmin = currentUser?.role === 'admin';
            
            await renderCatalog();
            
            const sidebar = document.getElementById('sidebar');
            if (sidebar && localStorage.getItem('sidebar_collapsed') === 'true') {
                sidebar.classList.add('collapsed');
            }
            
            console.log('[marketplace] Страница загружена');
        }
        
        init();
    </script>
    <script type="module">
        import * as sidebar from './layout.js';
        window.sidebar = sidebar;
        sidebar.initSidebar();
    </script>
</body>
</html>
