<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0a0a1a, #050510);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            max-width: 480px;
            width: 100%;
            background: rgba(15, 15, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 48px 40px;
            border: 1px solid rgba(108, 108, 255, 0.3);
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 24px;
            color: #6c6cff;
        }
        
        h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #b0b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 32px;
            font-size: 0.9rem;
        }
        
        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(108, 108, 255, 0.3);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', monospace;
            transition: all 0.2s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #6c6cff;
            background: rgba(108, 108, 255, 0.1);
        }
        
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .login-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: linear-gradient(135deg, #6c6cff, #4c4cff);
            color: white;
            padding: 14px 24px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(108, 108, 255, 0.4);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .info-text {
            margin-top: 24px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .error-message {
            background: rgba(255, 80, 80, 0.2);
            border: 1px solid rgba(255, 80, 80, 0.3);
            border-radius: 16px;
            padding: 12px;
            margin-top: 16px;
            color: #ff8080;
            font-size: 0.85rem;
            display: none;
        }
        
        .loading {
            display: none;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .loading i {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .github-hint {
            background: rgba(108, 108, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-align: left;
        }
        
        .github-hint i {
            margin-right: 6px;
            color: #6c6cff;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-chart-line"></i>
        </div>
        <h1>CRM для команды</h1>
        <div class="subtitle">Управление проектами и задачами</div>
        
        <div class="input-group">
            <label><i class="fab fa-github"></i> GitHub username</label>
            <input type="text" id="githubUsername" placeholder="например: allikk38" autocomplete="off">
        </div>
        
        <button id="loginBtn" class="login-btn">
            <i class="fas fa-sign-in-alt"></i> Войти
        </button>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-pulse"></i> Проверяем пользователя...
        </div>
        
        <div class="github-hint">
            <i class="fas fa-info-circle"></i> Введите ваш GitHub username. При первом входе вы будете автоматически зарегистрированы с ролью <strong>agent</strong>. Администратор сможет изменить роль позже.
        </div>
        
        <div class="info-text">
            <i class="fas fa-shield-alt"></i> Безопасный вход через проверку GitHub профиля
        </div>
    </div>
    
    <script src="core.js"></script>
    <script>
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('githubUsername');
        const errorDiv = document.getElementById('errorMessage');
        const loadingDiv = document.getElementById('loading');
        
        // Проверка существующей сессии
        const session = localStorage.getItem('crm_session');
        if (session) {
            try {
                const user = JSON.parse(session);
                if (user && user.github_username) {
                    window.location.href = 'index.html';
                }
            } catch(e) {}
        }
        
        async function verifyAndLogin() {
            const username = usernameInput.value.trim().toLowerCase();
            
            if (!username) {
                showError('Введите GitHub username');
                return;
            }
            
            // Показываем загрузку
            loginBtn.disabled = true;
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            
            try {
                // Проверяем существование пользователя на GitHub
                const githubResponse = await fetch(`https://api.github.com/users/${username}`);
                
                if (!githubResponse.ok) {
                    if (githubResponse.status === 404) {
                        showError(`Пользователь "${username}" не найден на GitHub. Проверьте правильность написания.`);
                    } else {
                        showError('Ошибка при проверке GitHub. Попробуйте позже.');
                    }
                    return;
                }
                
                const githubData = await githubResponse.json();
                
                // Пользователь существует — загружаем или создаём в users.csv
                const loginResult = await registerOrLoginUser(username, githubData.name || username);
                
                if (loginResult.success) {
                    // Сохраняем сессию
                    localStorage.setItem('crm_session', JSON.stringify(loginResult.user));
                    // Перенаправляем на дашборд
                    window.location.href = 'index.html';
                } else {
                    showError(loginResult.error || 'Ошибка при входе');
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showError('Ошибка соединения. Проверьте интернет и попробуйте снова.');
            } finally {
                loginBtn.disabled = false;
                loadingDiv.style.display = 'none';
            }
        }
        
        async function registerOrLoginUser(username, fullName) {
            try {
                // Загружаем текущих пользователей
                let users = await loadCSV('data/users.csv');
                
                // Ищем существующего
                let existingUser = users.find(u => u.github_username === username);
                
                if (existingUser) {
                    // Пользователь уже есть
                    return {
                        success: true,
                        user: {
                            github_username: existingUser.github_username,
                            name: existingUser.name,
                            role: existingUser.role,
                            email: existingUser.email || ''
                        }
                    };
                } else {
                    // Создаём нового пользователя с ролью agent
                    const newUser = {
                        github_username: username,
                        name: fullName,
                        role: 'agent',
                        email: '',
                        created_at: new Date().toISOString().split('T')[0]
                    };
                    
                    // Добавляем в массив
                    users.push(newUser);
                    
                    // Сохраняем в GitHub (запрашиваем токен у администратора)
                    const saved = await saveCSVToGitHub('data/users.csv', users, `Добавлен новый пользователь: ${username}`);
                    
                    if (saved) {
                        return {
                            success: true,
                            user: {
                                github_username: newUser.github_username,
                                name: newUser.name,
                                role: newUser.role,
                                email: ''
                            }
                        };
                    } else {
                        // Если не удалось сохранить, но пользователь GitHub валидный — пускаем с временной сессией
                        // (администратор потом добавит вручную)
                        return {
                            success: true,
                            user: {
                                github_username: username,
                                name: fullName,
                                role: 'agent',
                                email: '',
                                temp: true
                            }
                        };
                    }
                }
            } catch (error) {
                console.error('Register error:', error);
                return {
                    success: false,
                    error: 'Ошибка при регистрации пользователя'
                };
            }
        }
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        // Обработчики событий
        loginBtn.addEventListener('click', verifyAndLogin);
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyAndLogin();
        });
        
        // Фокус на поле ввода
        usernameInput.focus();
    </script>
</body>
</html>
