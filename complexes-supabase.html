<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: complexes-supabase.html
    РОЛЬ: Управление объектами недвижимости (ЖК) с Supabase
    ОСОБЕННОСТИ:
      - Карточки объектов с фильтрацией и сортировкой
      - Прогресс выполнения задач по объекту
      - Публичные/приватные объекты
      - Быстрое добавление через панель
      - Модальные окна для просмотра и редактирования
    ЗАВИСИМОСТИ:
      - CSS: base.css, theme.css, components.css, dashboard.css, modal.css, animations.css
      - JS: js/pages/complexes.js, layout.js
      - Таблицы: complexes, profiles, tasks
    ИСТОРИЯ:
      - 27.03.2026: Создание supabase-версии
      - 27.03.2026: Рефакторинг — логика вынесена в js/pages/complexes.js
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Объекты недвижимости - CRM для команды (Supabase)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <style>
        .complexes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
            animation: fadeInUp 0.4s ease;
        }
        
        .complexes-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .complexes-filters input,
        .complexes-filters select {
            padding: 8px 16px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            color: var(--text-primary);
        }
        
        .sort-buttons {
            display: flex;
            gap: 8px;
        }
        
        .sort-btn {
            background: rgba(108, 108, 255, 0.15);
            border: 1px solid var(--card-border);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 0.8rem;
        }
        
        .sort-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .sort-btn:hover {
            background: rgba(108, 108, 255, 0.3);
        }
        
        .my-objects-toggle {
            background: rgba(108, 108, 255, 0.15);
            border: 1px solid var(--card-border);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .my-objects-toggle.active {
            background: var(--accent);
        }
        
        .complexes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }
        
        .complex-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        
        .complex-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.25);
        }
        
        .complex-card-header {
            display: flex;
            gap: 16px;
            padding: 20px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .complex-card-image {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }
        
        .complex-card-info {
            flex: 1;
        }
        
        .complex-card-info h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        
        .complex-address {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        
        .complex-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        
        .status-active { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .status-in_progress { background: rgba(255, 193, 68, 0.2); color: #ffc107; }
        .status-archived { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
        
        .private-badge {
            display: inline-block;
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 8px;
        }
        
        .public-badge {
            display: inline-block;
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 8px;
        }
        
        .complex-card-body {
            padding: 16px 20px;
        }
        
        .complex-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .complex-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            background: var(--input-bg);
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .complex-progress {
            margin-top: 12px;
        }
        
        .progress-bar-small {
            height: 4px;
            background: var(--input-bg);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 4px;
        }
        
        .progress-fill-small {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .complex-card-footer {
            padding: 12px 20px 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-top: 1px solid var(--card-border);
        }
        
        .complex-btn {
            flex: 1;
            padding: 8px 12px;
            background: rgba(108, 108, 255, 0.15);
            border: none;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .complex-btn:hover {
            background: rgba(108, 108, 255, 0.3);
        }
        
        .add-complex-btn-header {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .add-complex-btn-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .complex-modal-content {
            max-width: 700px;
        }
        
        .complex-detail-row {
            display: flex;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .complex-detail-label {
            width: 120px;
            font-weight: 600;
            color: var(--accent);
        }
        
        .complex-detail-value {
            flex: 1;
        }
        
        .tasks-list {
            margin-top: 16px;
        }
        
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--card-border);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .quick-add-panel {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid var(--card-border);
            display: none;
        }
        
        .quick-add-panel.active {
            display: block;
        }
        
        .quick-add-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        
        .quick-add-form input,
        .quick-add-form select {
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
        }
        
        .public-checkbox-wrapper {
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .help-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        @media (max-width: 768px) {
            .complexes-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="top-bar-actions">
                    <button id="addComplexBtn" class="add-complex-btn-header">
                        <i class="fas fa-plus"></i> Новый объект
                    </button>
                </div>
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div id="quickAddPanel" class="quick-add-panel">
                <h4><i class="fas fa-bolt"></i> Быстрое добавление объекта</h4>
                <div class="quick-add-form">
                    <input type="text" id="quickTitle" placeholder="Название ЖК">
                    <input type="text" id="quickAddress" placeholder="Адрес">
                    <select id="quickAssignee"><option value="">Ответственный агент</option></select>
                    <input type="text" id="quickPriceFrom" placeholder="Цена от">
                    <input type="text" id="quickPriceTo" placeholder="Цена до">
                    <button id="quickSaveBtn" class="add-complex-btn-header">Сохранить</button>
                </div>
            </div>
            
            <div class="complexes-header">
                <div class="complexes-filters">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск по названию или адресу">
                    <select id="statusFilter">
                        <option value="all">Все статусы</option>
                        <option value="active">Активен</option>
                        <option value="in_progress">В работе</option>
                        <option value="archived">Архив</option>
                    </select>
                    <select id="agentFilter"><option value="all">Все агенты</option></select>
                    <button id="myObjectsToggle" class="my-objects-toggle"><i class="fas fa-user"></i> Мои объекты</button>
                </div>
                <div class="sort-buttons">
                    <button class="sort-btn" data-sort="name"><i class="fas fa-sort-alpha-down"></i> По названию</button>
                    <button class="sort-btn" data-sort="price"><i class="fas fa-sort-amount-down"></i> По цене</button>
                    <button class="sort-btn" data-sort="date"><i class="fas fa-calendar"></i> По дате</button>
                </div>
            </div>
            
            <div id="complexesGrid" class="complexes-grid">
                <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i><p>Загрузка объектов...</p></div>
            </div>
        </main>
    </div>
    
    <div id="complexModal" class="modal">
        <div class="modal-content complex-modal-content">
            <h3 id="complexModalTitle"><i class="fas fa-building"></i> Карточка объекта</h3>
            <div id="complexModalBody"></div>
            <div class="modal-buttons">
                <button onclick="window.closeComplexModal()">Закрыть</button>
                <button id="editComplexBtn" class="primary" style="display: none;">Редактировать</button>
            </div>
        </div>
    </div>
    
    <div id="complexFormModal" class="modal">
        <div class="modal-content">
            <h3 id="complexFormTitle">Новый объект</h3>
            <input type="hidden" id="complexId">
            <input type="text" id="complexTitle" placeholder="Название ЖК" required>
            <input type="text" id="complexAddress" placeholder="Адрес" required>
            <input type="text" id="complexDeveloper" placeholder="Застройщик">
            <div style="display: flex; gap: 12px;">
                <input type="number" id="complexPriceFrom" placeholder="Цена от" style="flex: 1">
                <input type="number" id="complexPriceTo" placeholder="Цена до" style="flex: 1">
            </div>
            <select id="complexStatus">
                <option value="active">Активен</option>
                <option value="in_progress">В работе</option>
                <option value="archived">Архив</option>
            </select>
            <select id="complexAssignee"><option value="">Ответственный агент</option></select>
            <input type="text" id="complexCoordinates" placeholder="Координаты (lat,lng)">
            <textarea id="complexDescription" placeholder="Описание объекта" rows="4"></textarea>
            <div class="public-checkbox-wrapper">
                <label><input type="checkbox" id="complexPublic" checked> <i class="fas fa-globe"></i> Публичный объект</label>
            </div>
            <div class="modal-buttons">
                <button onclick="window.closeComplexFormModal()">Отмена</button>
                <button class="primary" onclick="window.saveComplex()">Сохранить</button>
            </div>
        </div>
    </div>
    
    <!-- ========== ПОДКЛЮЧЕНИЕ МОДУЛЕЙ ========== -->
    <script type="module">
        // Инициализация страницы объектов
        import { initComplexesPage } from './js/pages/complexes.js';
        
        // Загружаем пользователя
        import { checkSupabaseSession } from './js/core/supabase-session.js';
        await checkSupabaseSession();
        
        console.log('[complexes] Пользователь загружен:', window.currentSupabaseUser?.name);
        
        // Инициализируем страницу
        initComplexesPage().catch(err => {
            console.error('[complexes] Ошибка инициализации:', err);
        });
    </script>
    
    <!-- Инициализация бокового меню -->
    <script type="module">
        import * as sidebar from './layout.js';
        window.sidebar = sidebar;
        sidebar.initSidebar();
    </script>
</body>
</html>
