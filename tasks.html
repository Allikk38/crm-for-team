<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задачи - CRM для команды</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Дополнительные стили для доски задач */
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .kanban-column {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            min-height: 500px;
        }
        
        .column-header {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .task-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: move;
            transition: all 0.3s;
            border-left: 3px solid;
        }
        
        .task-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-2px);
        }
        
        .task-card.dragging {
            opacity: 0.5;
        }
        
        .task-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .task-description {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 8px;
            word-break: break-word;
        }
        
        .task-meta {
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
        
        .task-priority {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        
        .priority-high { background: rgba(255, 68, 68, 0.3); color: #ff6b6b; }
        .priority-medium { background: rgba(255, 193, 68, 0.3); color: #ffc107; }
        .priority-low { background: rgba(76, 175, 80, 0.3); color: #4caf50; }
        
        .task-assignee {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .add-task-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px dashed rgba(255, 255, 255, 0.3);
            padding: 10px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .add-task-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1e1a3a, #2a235a);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
        }
        
        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-family: inherit;
        }
        
        .modal-content textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .modal-buttons button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s;
        }
        
        .modal-buttons button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .modal-buttons button.primary {
            background: #4caf50;
        }
        
        .delete-task {
            background: rgba(255, 68, 68, 0.3);
            color: #ff6b6b;
            border: none;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        
        .delete-task:hover {
            background: rgba(255, 68, 68, 0.5);
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        @media (max-width: 768px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Доска задач</h1>
            <div class="user-info">
                <span id="userName">Загрузка...</span>
                <select id="userSelect" style="display: none;">
                    <option value="">Выберите пользователя</option>
                </select>
            </div>
        </header>
        
        <div class="nav-buttons">
            <a href="index.html" class="nav-btn">🏠 Дашборд</a>
            <button id="addTaskBtn" class="nav-btn" data-role="admin,manager,agent">➕ Новая задача</button>
        </div>
        
        <div class="kanban-board">
            <div class="kanban-column" data-status="todo">
                <div class="column-header">
                    <span>📝 To Do</span>
                    <span id="todoCount">0</span>
                </div>
                <div id="todoTasks" class="tasks-container"></div>
                <button class="add-task-btn" data-status="todo">+ Добавить задачу</button>
            </div>
            
            <div class="kanban-column" data-status="in_progress">
                <div class="column-header">
                    <span>🔄 В работе</span>
                    <span id="progressCount">0</span>
                </div>
                <div id="progressTasks" class="tasks-container"></div>
                <button class="add-task-btn" data-status="in_progress">+ Добавить задачу</button>
            </div>
            
            <div class="kanban-column" data-status="done">
                <div class="column-header">
                    <span>✅ Готово</span>
                    <span id="doneCount">0</span>
                </div>
                <div id="doneTasks" class="tasks-container"></div>
                <button class="add-task-btn" data-status="done">+ Добавить задачу</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно для создания/редактирования задачи -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Создать задачу</h3>
            <input type="hidden" id="taskId">
            <input type="text" id="taskTitle" placeholder="Название задачи" required>
            <textarea id="taskDescription" placeholder="Описание задачи"></textarea>
            <select id="taskAssignee">
                <option value="">Назначить исполнителя</option>
            </select>
            <select id="taskPriority">
                <option value="low">Низкий приоритет</option>
                <option value="medium">Средний приоритет</option>
                <option value="high">Высокий приоритет</option>
            </select>
            <input type="date" id="taskDueDate">
            <select id="taskStatus">
                <option value="todo">To Do</option>
                <option value="in_progress">В работе</option>
                <option value="done">Готово</option>
            </select>
            <div class="modal-buttons">
                <button onclick="closeModal()">Отмена</button>
                <button class="primary" onclick="saveTask()">Сохранить</button>
            </div>
        </div>
    </div>
    
    <script src="core.js"></script>
    <script src="auth.js"></script>
    <script src="tasks.js"></script>
</body>
</html>
