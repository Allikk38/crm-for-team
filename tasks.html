<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: tasks.html
    РОЛЬ: Доска задач (Kanban) с боковой панелью
    СВЯЗИ:
      - CSS: base.css, theme.css, components.css, kanban.css, modal.css, responsive.css, animations.css
      - JS: js/core/*, js/utils/*, js/ui/*, layout.js, notifications.js, tasks.js
      - Данные: data/tasks.csv, data/users.csv, data/complexes.csv, data/comments.csv
    МЕХАНИКА:
      1. Боковая панель с навигацией (можно сворачивать)
      2. Навигация генерируется централизованно из layout.js
      3. Кликабельный профиль в правом верхнем углу
      4. Kanban-доска с тремя статусами
      5. Модальное окно задачи с комментариями и приватностью
      6. Push-уведомления
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {
                console.warn('Theme initialization error:', e);
            }
        })();
    </script>
    
    <title>Доска задач - CRM для команды</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <style>
        /* Анимация для Kanban колонок */
        .kanban-column {
            animation: fadeInUp 0.4s ease backwards;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .kanban-column:nth-child(1) { animation-delay: 0.05s; }
        .kanban-column:nth-child(2) { animation-delay: 0.1s; }
        .kanban-column:nth-child(3) { animation-delay: 0.15s; }
        
        .kanban-column:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
        }
        
        .column-header {
            transition: all 0.2s ease;
        }
        
        .kanban-column:hover .column-header {
            background: rgba(108, 108, 255, 0.1);
        }
        
        /* Анимация для карточек задач */
        .task-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInScale 0.3s ease backwards;
            position: relative;
            overflow: hidden;
        }
        
        .task-card:nth-child(1) { animation-delay: 0.02s; }
        .task-card:nth-child(2) { animation-delay: 0.04s; }
        .task-card:nth-child(3) { animation-delay: 0.06s; }
        
        .task-card:hover {
            transform: translateX(6px) translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border-color: var(--accent);
        }
        
        .task-card:active {
            transform: translateX(3px) translateY(-1px) scale(0.99);
        }
        
        /* Анимация для drag-and-drop */
        .task-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
            cursor: grabbing;
        }
        
        .drag-over {
            background: rgba(108, 108, 255, 0.1);
            border: 2px dashed var(--accent);
            transition: all 0.2s ease;
        }
        
        /* Анимация для кнопок */
        .add-task-btn-header {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }
        
        .add-task-btn-header::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }
        
        .add-task-btn-header:active::before {
            width: 200px;
            height: 200px;
        }
        
        .add-task-btn-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .add-task-btn {
            transition: all 0.2s ease;
        }
        
        .add-task-btn:hover {
            transform: translateY(-2px);
            background: rgba(108, 108, 255, 0.3);
        }
        
        /* Анимация для комментариев */
        .comment-item {
            transition: all 0.2s ease;
            animation: fadeInScale 0.3s ease backwards;
        }
        
        .comment-item:hover {
            transform: translateX(4px);
            background: rgba(108, 108, 255, 0.1);
        }
        
        /* Анимация для счетчиков */
        .column-header span:last-child {
            transition: all 0.2s ease;
        }
        
        .kanban-column:hover .column-header span:last-child {
            transform: scale(1.1);
            background: rgba(108, 108, 255, 0.3);
        }
        
        /* Анимация для бейджа уведомлений */
        #notificationBadge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1s ease;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        /* Анимация для кнопки уведомлений */
        #notificationBtn {
            transition: all 0.2s ease;
            position: relative;
        }
        
        #notificationBtn:hover {
            transform: translateY(-2px);
            background: rgba(108, 108, 255, 0.25) !important;
        }
        
        /* Анимация для приватного бейджа */
        .private-badge {
            display: inline-block;
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 8px;
            transition: all 0.2s ease;
        }
        
        .private-badge:hover {
            transform: scale(1.05);
        }
        
        /* Анимация для комментариев */
        .comments-section {
            animation: fadeInUp 0.3s ease;
        }
        
        .add-comment textarea {
            transition: all 0.2s ease;
        }
        
        .add-comment textarea:focus {
            outline: none;
            border-color: var(--accent);
            transform: scale(1.02);
        }
        
        /* Скелетон загрузки */
        .skeleton-task {
            background: linear-gradient(90deg, var(--card-border) 25%, var(--card-hover) 50%, var(--card-border) 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
            height: 100px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        
        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Анимация удаления карточки */
        .task-removing {
            animation: fadeOutScale 0.2s ease forwards;
        }
        
        @keyframes fadeOutScale {
            from {
                opacity: 1;
                transform: scale(1);
            }
            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }
        
        /* Анимация добавленной карточки */
        .task-added {
            animation: fadeInScale 0.3s ease;
        }
        
        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        @media (max-width: 768px) {
            .kanban-column:hover {
                transform: translateY(-2px);
            }
            
            .task-card:hover {
                transform: translateX(3px) translateY(-1px);
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            
            <!-- Навигация генерируется централизованно из layout.js -->
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- контейнер для динамической генерации навигации -->
            </nav>
            
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <!-- Кнопка выхода добавляется автоматически из layout.js -->
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="top-bar-actions">
                    <button id="addTaskBtn" class="add-task-btn-header">
                        <i class="fas fa-plus"></i> Новая задача
                    </button>
                    <div class="notification-btn-wrapper">
                        <a href="notifications.html" class="nav-btn" id="notificationBtn" style="background: rgba(108, 108, 255, 0.12); padding: 10px 16px;">
                            <i class="fas fa-bell"></i>
                        </a>
                        <span id="notificationBadge" style="display: none;"></span>
                    </div>
                </div>
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="kanban-board">
                <div class="kanban-column" data-status="todo">
                    <div class="column-header">
                        <span><i class="fas fa-circle"></i> To Do</span>
                        <span id="todoCount">0</span>
                    </div>
                    <div id="todoTasks" class="tasks-container">
                        <!-- Скелетон загрузки -->
                        <div class="skeleton-task"></div>
                        <div class="skeleton-task"></div>
                    </div>
                    <button class="add-task-btn" data-status="todo"><i class="fas fa-plus"></i> Добавить задачу</button>
                </div>
                
                <div class="kanban-column" data-status="in_progress">
                    <div class="column-header">
                        <span><i class="fas fa-spinner fa-pulse"></i> В работе</span>
                        <span id="progressCount">0</span>
                    </div>
                    <div id="progressTasks" class="tasks-container">
                        <div class="skeleton-task"></div>
                    </div>
                    <button class="add-task-btn" data-status="in_progress"><i class="fas fa-plus"></i> Добавить задачу</button>
                </div>
                
                <div class="kanban-column" data-status="done">
                    <div class="column-header">
                        <span><i class="fas fa-check-circle"></i> Готово</span>
                        <span id="doneCount">0</span>
                    </div>
                    <div id="doneTasks" class="tasks-container">
                        <div class="skeleton-task"></div>
                    </div>
                    <button class="add-task-btn" data-status="done"><i class="fas fa-plus"></i> Добавить задачу</button>
                </div>
            </div>
        </main>
    </div>
    
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"><i class="fas fa-tasks"></i> Создать задачу</h3>
            <input type="hidden" id="taskId">
            <input type="text" id="taskTitle" placeholder="Название задачи" required>
            <textarea id="taskDescription" placeholder="Описание задачи"></textarea>
            <select id="taskAssignee">
                <option value="">Назначить исполнителя</option>
            </select>
            <select id="taskComplex">
                <option value="">Привязать к объекту</option>
            </select>
            <select id="taskPriority">
                <option value="low">Низкий приоритет</option>
                <option value="medium" selected>Средний приоритет</option>
                <option value="high">Высокий приоритет</option>
            </select>
            <input type="date" id="taskDueDate">
            <select id="taskStatus">
                <option value="todo">To Do</option>
                <option value="in_progress">В работе</option>
                <option value="done">Готово</option>
            </select>
            
            <div class="private-checkbox-wrapper" id="privateCheckboxGroup">
                <label>
                    <input type="checkbox" id="taskPrivate">
                    <i class="fas fa-lock"></i> Приватная задача (видна только исполнителю и менеджерам)
                </label>
            </div>
            
            <div class="comments-section">
                <div class="comments-header">
                    <i class="fas fa-comments"></i> Комментарии (<span id="commentsCount">0</span>)
                </div>
                <div id="commentsList" class="comments-list">
                    <div class="comment-empty">Нет комментариев</div>
                </div>
                <div class="add-comment">
                    <textarea id="newComment" placeholder="Написать комментарий... (используйте @username для упоминания)" rows="2"></textarea>
                    <button class="primary" onclick="addComment()" style="margin-top: 8px; width: 100%;"><i class="fas fa-paper-plane"></i> Отправить</button>
                </div>
            </div>
            
            <div class="modal-buttons">
                <button onclick="closeModal()"><i class="fas fa-times"></i> Отмена</button>
                <button class="primary" onclick="saveTask()"><i class="fas fa-save"></i> Сохранить</button>
            </div>
        </div>
    </div>
    
    <!-- 1. Утилиты (не зависят ни от чего) -->
    <script src="js/utils/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    
    <!-- 2. Ядро (зависит от утилит) -->
    <script src="js/core/api.js"></script>
    <script src="js/core/auth.js"></script>
    
    <!-- 3. UI компоненты (зависят от ядра) -->
    <script src="js/ui/theme.js"></script>
    <script src="js/ui/animations.js"></script>
    <script src="js/ui/mobile.js"></script>
    <script src="js/ui/onboarding.js"></script>
    <script src="layout.js"></script>
    <script src="notifications.js"></script>
    
    <!-- 4. Модули страниц (зависят от всего) -->
    <script src="tasks.js"></script>
    
    <script>
        function updateUserProfile() {
            var user = auth.getCurrentUser();
            if (!user) return;
            
            var userNameSpan = document.getElementById('userName');
            var userRoleSpan = document.getElementById('userRole');
            var userAvatar = document.getElementById('userAvatar');
            
            if (userNameSpan) userNameSpan.textContent = user.name;
            if (userRoleSpan) {
                var roleLabel = '';
                if (user.role === 'admin') roleLabel = 'Администратор';
                else if (user.role === 'manager') roleLabel = 'Менеджер';
                else if (user.role === 'agent') roleLabel = 'Агент';
                else roleLabel = 'Наблюдатель';
                userRoleSpan.textContent = roleLabel;
            }
            if (userAvatar) {
                var initials = user.name.split(' ').map(function(n) { return n[0]; }).join('').toUpperCase();
                userAvatar.innerHTML = initials || '<i class="fas fa-user"></i>';
            }
        }
        
        function updateNotificationBadge() {
            var notifications = JSON.parse(localStorage.getItem('crm_notifications_center') || '[]');
            var unread = 0;
            for (var i = 0; i < notifications.length; i++) {
                if (!notifications[i].read) unread++;
            }
            var badge = document.getElementById('notificationBadge');
            if (badge) {
                if (unread > 0) {
                    badge.textContent = unread > 99 ? '99+' : unread;
                    badge.style.display = 'flex';
                    badge.style.animation = 'pulse 0.5s ease';
                    setTimeout(() => {
                        if (badge) badge.style.animation = '';
                    }, 500);
                } else {
                    badge.style.display = 'none';
                }
            }
        }
        
        // Функции для анимаций (будут использоваться в tasks.js)
        window.animateTaskRemove = function(taskElement, callback) {
            taskElement.classList.add('task-removing');
            setTimeout(() => {
                if (callback) callback();
            }, 200);
        };
        
        window.animateTaskAdd = function(taskElement) {
            taskElement.classList.add('task-added');
            setTimeout(() => {
                taskElement.classList.remove('task-added');
            }, 300);
        };
        
        window.addDragOverAnimation = function(columnElement) {
            columnElement.classList.add('drag-over');
            setTimeout(() => {
                columnElement.classList.remove('drag-over');
            }, 200);
        };
        
        if (window.notifications && window.notifications.requestPermission) {
            window.notifications.requestPermission();
        }
        
        updateNotificationBadge();
        setTimeout(updateUserProfile, 500);
        
        window.addEventListener('storage', function(e) {
            if (e.key === 'crm_notifications_center') updateNotificationBadge();
        });
        
        if (window.sidebar) window.sidebar.initSidebar();
    </script>
</body>
</html>
