<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- Применяем тему до рендеринга страницы (без мерцания) -->
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {
                console.warn('Theme initialization error:', e);
            }
        })();
    </script>
    
    <title>Панель менеджера | CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1><i class="fas fa-chart-line"></i> Панель менеджера</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">Загрузка...</span>
                    <select id="userSelect" style="display: none;">
                        <option value="">Выберите пользователя</option>
                    </select>
                </div>
            </div>
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Дашборд</a>
                <a href="tasks.html" class="nav-btn"><i class="fas fa-tasks"></i> Доска задач</a>
                <a href="complexes.html" class="nav-btn"><i class="fas fa-building"></i> Объекты</a>
                <a href="calendar.html" class="nav-btn"><i class="fas fa-calendar-alt"></i> Календарь</a>
                <a href="profile.html" class="nav-btn"><i class="fas fa-user-circle"></i> Профиль</a>
            </div>

        </header>

        <main>
            <!-- KPI Карточки -->
            <div class="kpi-grid" id="kpiGrid">
                <div class="kpi-card">
                    <div class="kpi-label"><i class="fas fa-list"></i> Всего задач</div>
                    <div class="kpi-value" id="totalTasks">0</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label"><i class="fas fa-exclamation-triangle"></i> Просрочено</div>
                    <div class="kpi-value" id="overdueTasks">0</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label"><i class="fas fa-calendar-check"></i> Закрыто за неделю</div>
                    <div class="kpi-value" id="closedWeek">0</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label"><i class="fas fa-play"></i> В работе сейчас</div>
                    <div class="kpi-value" id="inProgress">0</div>
                </div>
            </div>

            <!-- Нагрузка по агентам -->
            <div class="agent-list">
                <div class="section-title">
                    <i class="fas fa-users"></i> Загрузка команды
                </div>
                <div id="agentList"></div>
            </div>

            <!-- Просроченные задачи -->
            <div class="overdue-list">
                <div class="section-title">
                    <i class="fas fa-clock"></i> Просроченные задачи
                </div>
                <div id="overdueTasksList"></div>
            </div>

            <!-- График активности -->
            <div class="activity-chart">
                <div class="section-title">
                    <i class="fas fa-chart-line"></i> Закрытые задачи по дням
                </div>
                <div class="chart-bars" id="activityChart"></div>
            </div>
        </main>
    </div>

    <script src="core.js"></script>
    <script src="auth.js"></script>
    <script src="theme.js"></script>
    <script src="manager.js"></script>
</body>
</html>
