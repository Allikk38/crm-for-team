<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Панель менеджера | CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Дополнительные стили для дашборда менеджера */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .kpi-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .kpi-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .kpi-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }
        
        .kpi-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .kpi-trend {
            font-size: 0.7rem;
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .trend-up { color: #4caf50; }
        .trend-down { color: #ff6b6b; }
        
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .agent-list {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 32px;
        }
        
        .agent-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .agent-item:last-child {
            border-bottom: none;
        }
        
        .agent-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        
        .agent-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6c6cff, #4c4cff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        
        .agent-name {
            font-weight: 500;
        }
        
        .agent-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .progress-bar-container {
            width: 150px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #6c6cff, #a0a0ff);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .overdue-list {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
        }
        
        .overdue-task {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .overdue-task:last-child {
            border-bottom: none;
        }
        
        .overdue-title {
            font-weight: 500;
        }
        
        .overdue-badge {
            background: rgba(255, 68, 68, 0.2);
            color: #ff6b6b;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.7rem;
        }
        
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
        }
        
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .activity-chart {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-top: 32px;
        }
        
        .chart-bars {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 150px;
            margin-top: 20px;
        }
        
        .chart-bar {
            flex: 1;
            margin: 0 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .bar {
            width: 100%;
            background: linear-gradient(180deg, #6c6cff, #4c4cff);
            border-radius: 4px 4px 0 0;
            transition: height 0.5s ease;
            min-height: 4px;
        }
        
        .bar-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
        }
        
        @media (max-width: 1024px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .agent-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            
            .agent-stats {
                width: 100%;
                justify-content: space-between;
            }
            
            .kpi-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1>📊 Панель менеджера</h1>
                <div class="user-info">
                    <span id="userName">Загрузка...</span>
                    <select id="userSelect" style="display: none;">
                        <option value="">Выберите пользователя</option>
                    </select>
                </div>
            </div>
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn">🏠 Общий дашборд</a>
                <a href="tasks.html" class="nav-btn">📋 Доска задач</a>
            </div>
        </header>

        <main>
            <!-- KPI Карточки -->
            <div class="kpi-grid" id="kpiGrid">
                <div class="kpi-card">
                    <div class="kpi-label">📋 Всего задач</div>
                    <div class="kpi-value" id="totalTasks">0</div>
                    <div class="kpi-trend" id="totalTrend">—</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">⚠️ Просрочено</div>
                    <div class="kpi-value" id="overdueTasks">0</div>
                    <div class="kpi-trend trend-up" id="overdueTrend">—</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">✅ Закрыто за неделю</div>
                    <div class="kpi-value" id="closedWeek">0</div>
                    <div class="kpi-trend" id="closedTrend">—</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">🔄 В работе сейчас</div>
                    <div class="kpi-value" id="inProgress">0</div>
                    <div class="kpi-trend">активных задач</div>
                </div>
            </div>

            <!-- Нагрузка по агентам -->
            <div class="agent-list">
                <div class="section-title">
                    👥 Загрузка команды
                </div>
                <div id="agentList"></div>
            </div>

            <!-- Просроченные задачи -->
            <div class="overdue-list">
                <div class="section-title">
                    ⚠️ Просроченные задачи
                </div>
                <div id="overdueTasksList"></div>
            </div>

            <!-- График активности -->
            <div class="activity-chart">
                <div class="section-title">
                    📈 Закрытые задачи по дням
                </div>
                <div class="chart-bars" id="activityChart"></div>
            </div>
        </main>
    </div>

    <script src="core.js"></script>
    <script src="auth.js"></script>
    <script src="manager.js"></script>
</body>
</html>
