<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Панель менеджера | CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1><i class="fas fa-chart-line"></i> Панель менеджера</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">Загрузка...</span>
                    <select id="userSelect" style="display: none;">
                        <option value="">Выберите пользователя</option>
                    </select>
                </div>
            </div>
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Общий дашборд</a>
                <a href="tasks.html" class="nav-btn"><i class="fas fa-tasks"></i> Доска задач</a>
            </div>
        </header>

        <main>
            <!-- KPI Карточки -->
            <div class="kpi-grid" id="kpiGrid">
                <div class="kpi-card">
                    <div class="kpi-label"><i class="fas fa-list"></i> Всего задач</div>
                    <div class="kpi-value" id="totalTasks">0</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label"><i class="fas fa-exclamation-triangle"></i> Просрочено</div>
                    <div class="kpi-value" id="overdueTasks">0</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label"><i class="fas fa-calendar-check"></i> Закрыто за неделю</div>
                    <div class="kpi-value" id="closedWeek">0</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label"><i class="fas fa-play"></i> В работе сейчас</div>
                    <div class="kpi-value" id="inProgress">0</div>
                </div>
            </div>

            <!-- Нагрузка по агентам -->
            <div class="agent-list">
                <div class="section-title">
                    <i class="fas fa-users"></i> Загрузка команды
                </div>
                <div id="agentList"></div>
            </div>

            <!-- Просроченные задачи -->
            <div class="overdue-list">
                <div class="section-title">
                    <i class="fas fa-clock"></i> Просроченные задачи
                </div>
                <div id="overdueTasksList"></div>
            </div>

            <!-- График активности -->
            <div class="activity-chart">
                <div class="section-title">
                    <i class="fas fa-chart-line"></i> Закрытые задачи по дням
                </div>
                <div class="chart-bars" id="activityChart"></div>
            </div>
        </main>
    </div>

    <script src="core.js"></script>
    <script src="auth.js"></script>
    <script src="theme.js"></script>
    <script src="manager.js"></script>
</body>
</html>
