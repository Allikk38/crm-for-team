<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: notifications-supabase.html
    РОЛЬ: Центр уведомлений (Supabase версия)
    ОСОБЕННОСТИ:
      - Просмотр всех уведомлений
      - Отметка прочитанных/непрочитанных
      - Удаление уведомлений
      - Переход к связанным объектам (задачи, сделки)
      - Автоматическое обновление счетчика
    ЗАВИСИМОСТИ:
      - CSS: base.css, theme.css, components.css, modal.css, animations.css
      - JS: js/core/supabase.js, js/core/supabase-session.js, 
             js/services/notifications-supabase.js, js/ui/animations.js, layout.js
      - Таблица: notifications
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Уведомления - CRM для команды (Supabase)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <style>
        .notifications-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
            animation: fadeInUp 0.4s ease;
        }
        
        .notifications-header h2 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .notifications-header h2 .badge {
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
        }
        
        .mark-all-read, .clear-all {
            background: rgba(108, 108, 255, 0.15);
            border: 1px solid var(--card-border);
            padding: 10px 20px;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.85rem;
        }
        
        .mark-all-read:hover, .clear-all:hover {
            background: rgba(108, 108, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .clear-all {
            background: rgba(255, 107, 107, 0.15);
        }
        
        .clear-all:hover {
            background: rgba(255, 107, 107, 0.3);
        }
        
        .notification-item {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid var(--card-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            animation: fadeInScale 0.3s ease backwards;
            position: relative;
        }
        
        .notification-item:hover {
            transform: translateX(8px) translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        .notification-item.unread {
            border-left: 3px solid var(--accent);
            background: rgba(108, 108, 255, 0.05);
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .notification-type {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .notification-type.task_assigned { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .notification-type.deadline { background: rgba(255, 193, 68, 0.2); color: #ffc107; }
        .notification-type.overdue { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .notification-type.mention { background: rgba(108, 108, 255, 0.2); color: #6c6cff; }
        .notification-type.deal_status { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
        
        .notification-date {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .notification-message {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 12px;
        }
        
        .notification-actions {
            display: flex;
            gap: 12px;
        }
        
        .notification-actions button {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        
        .notification-actions button:hover {
            background: rgba(108, 108, 255, 0.15);
        }
        
        .notification-actions .delete-btn {
            color: #ff6b6b;
        }
        
        .notification-actions .delete-btn:hover {
            background: rgba(255, 107, 107, 0.15);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .notification-removing {
            animation: fadeOutScale 0.2s ease forwards;
        }
        
        @keyframes fadeOutScale {
            from {
                opacity: 1;
                transform: scale(1);
            }
            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }
        
        @media (max-width: 768px) {
            .notifications-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .mark-all-read, .clear-all {
                text-align: center;
            }
            
            .notification-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="top-bar-actions">
                    <!-- Здесь могут быть дополнительные кнопки -->
                </div>
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="notifications-container">
                <div class="notifications-header">
                    <h2>
                        <i class="fas fa-bell"></i> Уведомления
                        <span id="unreadBadge" class="badge" style="display: none;">0</span>
                    </h2>
                    <div style="display: flex; gap: 12px;">
                        <button id="markAllReadBtn" class="mark-all-read">
                            <i class="fas fa-check-double"></i> Отметить все
                        </button>
                        <button id="clearAllBtn" class="clear-all">
                            <i class="fas fa-trash"></i> Очистить всё
                        </button>
                    </div>
                </div>
                <div id="notificationsList">
                    <div class="loading-state">
                        <i class="fas fa-spinner fa-pulse"></i>
                        <p>Загрузка уведомлений...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Подключаем утилиты и компоненты -->
    <script src="js/utils/helpers.js"></script>
    <script src="js/ui/animations.js"></script>
    
    <script type="module">
        import { supabase } from './js/core/supabase.js';
        import { 
            getCurrentSupabaseUser, 
            requireSupabaseAuth, 
            updateSupabaseUserInterface 
        } from './js/core/supabase-session.js';
        
        import { 
            getNotifications, 
            getUnreadCount, 
            markAsRead, 
            markAllAsRead, 
            deleteNotification,
            deleteAllNotifications
        } from './js/services/notifications-supabase.js';
        
        let notifications = [];
        let currentUser = null;
        
        const TYPE_ICONS = {
            task_assigned: '📋',
            deadline: '⏰',
            overdue: '⚠️',
            mention: '💬',
            deal_status: '🤝'
        };
        
        const TYPE_LABELS = {
            task_assigned: 'Новая задача',
            deadline: 'Дедлайн',
            overdue: 'Просрочка',
            mention: 'Упоминание',
            deal_status: 'Статус сделки'
        };
        
        console.log('[notifications-supabase] Модуль загружен');
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (date >= today) {
                return 'Сегодня, ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else if (date >= yesterday) {
                return 'Вчера, ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
        }
        
        function getRedirectUrl(notification) {
            if (notification.task_id) {
                return `tasks-supabase.html?task=${notification.task_id}`;
            }
            if (notification.deal_id) {
                return `deals-supabase.html?deal=${notification.deal_id}`;
            }
            if (notification.complex_id) {
                return `complexes-supabase.html?complex=${notification.complex_id}`;
            }
            return null;
        }
        
        async function handleNotificationClick(notification) {
            if (!notification.read) {
                await markAsRead(notification.id);
                notification.read = true;
                updateUnreadBadge();
                const element = document.querySelector(`.notification-item[data-id="${notification.id}"]`);
                if (element) {
                    element.classList.remove('unread');
                }
            }
            
            const url = getRedirectUrl(notification);
            if (url) {
                window.location.href = url;
            }
        }
        
        async function handleMarkAsRead(notificationId, event) {
            event.stopPropagation();
            const success = await markAsRead(notificationId);
            if (success) {
                const notification = notifications.find(n => n.id === notificationId);
                if (notification) {
                    notification.read = true;
                    const element = document.querySelector(`.notification-item[data-id="${notificationId}"]`);
                    if (element) {
                        element.classList.remove('unread');
                    }
                    updateUnreadBadge();
                    if (window.showToast) {
                        window.showToast('success', 'Отмечено прочитанным');
                    }
                }
            }
        }
        
        async function handleDeleteNotification(notificationId, event) {
            event.stopPropagation();
            
            const element = document.querySelector(`.notification-item[data-id="${notificationId}"]`);
            if (element) {
                element.classList.add('notification-removing');
            }
            
            setTimeout(async () => {
                const success = await deleteNotification(notificationId);
                if (success) {
                    notifications = notifications.filter(n => n.id !== notificationId);
                    renderNotifications();
                    updateUnreadBadge();
                    if (window.showToast) {
                        window.showToast('success', 'Уведомление удалено');
                    }
                }
            }, 200);
        }
        
        async function handleMarkAllRead() {
            const success = await markAllAsRead();
            if (success) {
                notifications.forEach(n => { n.read = true; });
                renderNotifications();
                updateUnreadBadge();
                if (window.showToast) {
                    window.showToast('success', 'Все уведомления отмечены прочитанными');
                }
            }
        }
        
        async function handleClearAll() {
            if (!confirm('Удалить все уведомления? Это действие нельзя отменить.')) return;
            
            const success = await deleteAllNotifications();
            if (success) {
                notifications = [];
                renderNotifications();
                updateUnreadBadge();
                if (window.showToast) {
                    window.showToast('success', 'Все уведомления удалены');
                }
            }
        }
        
        function updateUnreadBadge() {
            const unreadCount = notifications.filter(n => !n.read).length;
            const badge = document.getElementById('unreadBadge');
            if (badge) {
                if (unreadCount > 0) {
                    badge.textContent = unreadCount;
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
            }
        }
        
        function renderNotifications() {
            const container = document.getElementById('notificationsList');
            if (!container) return;
            
            if (notifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bell-slash"></i>
                        <p>Нет уведомлений</p>
                        <p style="font-size: 0.8rem; margin-top: 8px;">Когда появятся новые уведомления, они будут отображаться здесь</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            for (const n of notifications) {
                const unreadClass = n.read ? '' : 'unread';
                const typeClass = `notification-type ${n.type}`;
                const typeIcon = TYPE_ICONS[n.type] || '🔔';
                const typeLabel = TYPE_LABELS[n.type] || n.type;
                
                html += `
                    <div class="notification-item ${unreadClass}" data-id="${n.id}" onclick="window.handleNotificationClick('${n.id}')">
                        <div class="notification-header">
                            <span class="${typeClass}">
                                ${typeIcon} ${typeLabel}
                            </span>
                            <span class="notification-date">
                                <i class="far fa-clock"></i> ${formatDate(n.created_at)}
                            </span>
                        </div>
                        <div class="notification-title">${escapeHtml(n.title)}</div>
                        <div class="notification-message">${escapeHtml(n.message)}</div>
                        <div class="notification-actions">
                            ${!n.read ? `<button onclick="window.handleMarkAsRead('${n.id}', event)"><i class="fas fa-check"></i> Прочитано</button>` : ''}
                            <button class="delete-btn" onclick="window.handleDeleteNotification('${n.id}', event)"><i class="fas fa-trash"></i> Удалить</button>
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Глобальные функции для onclick
        window.handleNotificationClick = async (id) => {
            const notification = notifications.find(n => n.id === id);
            if (notification) {
                await handleNotificationClick(notification);
            }
        };
        
        window.handleMarkAsRead = async (id, event) => {
            await handleMarkAsRead(id, event);
        };
        
        window.handleDeleteNotification = async (id, event) => {
            await handleDeleteNotification(id, event);
        };
        
        async function loadNotifications() {
            notifications = await getNotifications();
            console.log(`[notifications-supabase] Загружено ${notifications.length} уведомлений`);
            renderNotifications();
            updateUnreadBadge();
        }
        
        async function init() {
            console.log('[notifications-supabase] Инициализация...');
            
            const isAuth = await requireSupabaseAuth('auth-supabase.html');
            if (!isAuth) return;
            
            currentUser = getCurrentSupabaseUser();
            updateSupabaseUserInterface();
            
            await loadNotifications();
            
            document.getElementById('markAllReadBtn')?.addEventListener('click', handleMarkAllRead);
            document.getElementById('clearAllBtn')?.addEventListener('click', handleClearAll);
            
            const sidebar = document.getElementById('sidebar');
            if (sidebar && localStorage.getItem('sidebar_collapsed') === 'true') {
                sidebar.classList.add('collapsed');
            }
            
            if (window.CRM?.ui?.animations) {
                console.log('[notifications-supabase] Анимации инициализированы');
            }
            
            console.log('[notifications-supabase] Инициализация завершена');
        }
        
        init();
    </script>
    <script src="layout.js"></script>
</body>
</html>
