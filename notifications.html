<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: notifications.html
    РОЛЬ: Центр уведомлений
    СВЯЗИ:
      - CSS: base.css, theme.css, components.css, responsive.css, animations.css
      - JS: js/core/*, js/utils/*, js/ui/*, layout.js, notifications.js
      - Данные: localStorage (crm_notifications_center)
    МЕХАНИКА:
      1. Боковая панель с навигацией (можно сворачивать)
      2. Навигация генерируется централизованно из layout.js
      3. Кликабельный профиль в правом верхнем углу
      4. Отображение списка уведомлений с анимациями
      5. Маркировка прочитанных/непрочитанных
      6. Кнопка "Отметить все прочитанными"
      7. Переход к задаче по клику на уведомление
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {
                console.warn('Theme initialization error:', e);
            }
        })();
    </script>
    
    <title>Уведомления - CRM для команды</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <style>
        .notifications-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
            animation: fadeInUp 0.4s ease;
        }
        
        .notifications-header h2 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .mark-all-read {
            background: rgba(108, 108, 255, 0.15);
            border: 1px solid var(--card-border);
            padding: 10px 20px;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .mark-all-read::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(108, 108, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }
        
        .mark-all-read:active::before {
            width: 200px;
            height: 200px;
        }
        
        .mark-all-read:hover {
            background: rgba(108, 108, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .notification-item {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid var(--card-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            animation: fadeInScale 0.3s ease backwards;
            position: relative;
            overflow: hidden;
        }
        
        .notification-item:nth-child(1) { animation-delay: 0.03s; }
        .notification-item:nth-child(2) { animation-delay: 0.06s; }
        .notification-item:nth-child(3) { animation-delay: 0.09s; }
        .notification-item:nth-child(4) { animation-delay: 0.12s; }
        .notification-item:nth-child(5) { animation-delay: 0.15s; }
        
        .notification-item:hover {
            transform: translateX(8px) translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        .notification-item:active {
            transform: translateX(4px) translateY(-1px) scale(0.99);
        }
        
        .notification-item.unread {
            border-left: 3px solid var(--accent);
            background: rgba(108, 108, 255, 0.08);
            position: relative;
        }
        
        .notification-item.unread::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(108, 108, 255, 0.05), transparent);
            animation: shimmerNotification 2s infinite;
            pointer-events: none;
        }
        
        @keyframes shimmerNotification {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
            100% { transform: translateX(100%); }
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .notification-type {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        
        .notification-type:hover {
            transform: scale(1.05);
        }
        
        .notification-type.task_assigned { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .notification-type.deadline { background: rgba(255, 193, 68, 0.2); color: #ffc107; }
        .notification-type.overdue { 
            background: rgba(255, 107, 107, 0.2); 
            color: #ff6b6b;
            animation: pulseWarning 2s infinite;
        }
        
        @keyframes pulseWarning {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }
        
        .notification-type.mention { background: rgba(108, 108, 255, 0.2); color: #6c6cff; }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
            transition: color 0.2s ease;
        }
        
        .notification-item:hover .notification-title {
            color: var(--accent);
        }
        
        .notification-message {
            font-size: 0.85rem;
            opacity: 0.8;
            transition: opacity 0.2s ease;
        }
        
        .notification-item:hover .notification-message {
            opacity: 1;
        }
        
        .notification-date {
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }
        
        .notification-item:hover .notification-date {
            transform: translateX(-2px);
            color: var(--accent);
        }
        
        .notification-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        
        .notification-actions button {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 4px 8px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .notification-actions button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(108, 108, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }
        
        .notification-actions button:active::before {
            width: 100px;
            height: 100px;
        }
        
        .notification-actions button:hover {
            background: rgba(108, 108, 255, 0.15);
            transform: translateY(-2px);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            animation: fadeInUp 0.4s ease;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
            transition: all 0.3s ease;
        }
        
        .empty-state:hover i {
            transform: scale(1.1);
            opacity: 0.8;
        }
        
        /* Анимация удаления уведомления */
        .notification-removing {
            animation: fadeOutScale 0.2s ease forwards;
        }
        
        /* Счетчик уведомлений в заголовке */
        .notifications-header h2 .badge {
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            animation: pulse 1s ease;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        @media (max-width: 768px) {
            .notifications-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .mark-all-read {
                text-align: center;
            }
            
            .notification-item:hover {
                transform: translateX(4px) translateY(-1px);
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Боковая панель навигации -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            
            <!-- Навигация генерируется централизованно из layout.js -->
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- контейнер для динамической генерации навигации -->
            </nav>
            
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <!-- Кнопка выхода добавляется автоматически из layout.js -->
            </div>
        </aside>
        
        <!-- Основной контент -->
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="notifications-container">
                <div class="notifications-header">
                    <h2>
                        <i class="fas fa-bell"></i> Уведомления
                        <span id="unreadCount" class="badge" style="display: none;">0</span>
                    </h2>
                    <button class="mark-all-read" onclick="markAllRead()">
                        <i class="fas fa-check-double"></i> Отметить все прочитанными
                    </button>
                </div>
                <div id="notificationsList">
                    <div class="skeleton" style="height: 100px; margin-bottom: 12px;"></div>
                    <div class="skeleton" style="height: 100px; margin-bottom: 12px;"></div>
                    <div class="skeleton" style="height: 100px; margin-bottom: 12px;"></div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 1. Утилиты (не зависят ни от чего) -->
    <script src="js/utils/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    
    <!-- 2. Ядро (зависит от утилит) -->
    <script src="js/core/api.js"></script>
    <script src="js/core/auth.js"></script>
    
    <!-- 3. UI компоненты (зависят от ядра) -->
    <script src="js/ui/theme.js"></script>
    <script src="js/ui/animations.js"></script>
    <script src="js/ui/mobile.js"></script>
    <script src="js/ui/onboarding.js"></script>
    <script src="layout.js"></script>
    <script src="notifications.js"></script>
    
    <script>
        // Скелетон стили
        const style = document.createElement('style');
        style.textContent = `
            .skeleton {
                background: linear-gradient(90deg, var(--card-border) 25%, var(--card-hover) 50%, var(--card-border) 75%);
                background-size: 200% 100%;
                animation: skeletonLoading 1.5s infinite;
                border-radius: 20px;
            }
            
            @keyframes skeletonLoading {
                0% { background-position: 200% 0; }
                100% { background-position: -200% 0; }
            }
        `;
        document.head.appendChild(style);
        
        let currentNotifications = [];
        
        function updateUnreadBadge() {
            const unreadCount = currentNotifications.filter(n => !n.read).length;
            const badge = document.getElementById('unreadCount');
            if (badge) {
                if (unreadCount > 0) {
                    badge.textContent = unreadCount;
                    badge.style.display = 'inline-block';
                    badge.style.animation = 'pulse 0.5s ease';
                    setTimeout(() => {
                        if (badge) badge.style.animation = '';
                    }, 500);
                } else {
                    badge.style.display = 'none';
                }
            }
        }
        
        function renderNotifications() {
            var notifications = JSON.parse(localStorage.getItem('crm_notifications_center') || '[]');
            currentNotifications = notifications;
            var container = document.getElementById('notificationsList');
            
            if (!container) return;
            
            updateUnreadBadge();
            
            if (notifications.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><p>Нет уведомлений</p><p style="font-size: 0.8rem; margin-top: 8px;">Когда появятся новые уведомления, они будут отображаться здесь</p></div>';
                return;
            }
            
            var html = '';
            for (var i = 0; i < notifications.length; i++) {
                var n = notifications[i];
                var unreadClass = n.read ? '' : 'unread';
                var typeClass = 'notification-type ' + n.type;
                var typeLabel = '';
                if (n.type === 'task_assigned') typeLabel = '📋 Новая задача';
                else if (n.type === 'deadline') typeLabel = '⏰ Дедлайн';
                else if (n.type === 'overdue') typeLabel = '⚠️ Просрочка';
                else if (n.type === 'mention') typeLabel = '💬 Упоминание';
                
                var date = new Date(n.created_at);
                var now = new Date();
                var dateStr;
                if (date.toDateString() === now.toDateString()) {
                    dateStr = 'Сегодня, ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } else if (date > new Date(now - 86400000)) {
                    dateStr = 'Вчера, ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } else {
                    dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
                
                html += '<div class="notification-item ' + unreadClass + '" data-id="' + n.id + '" onclick="openNotification(' + n.id + ', \'' + (n.task_id || '') + '\')">' +
                    '<div class="notification-header">' +
                        '<span class="' + typeClass + '">' + typeLabel + '</span>' +
                        '<span class="notification-date"><i class="far fa-clock"></i> ' + dateStr + '</span>' +
                    '</div>' +
                    '<div class="notification-title">' + window.escapeHtml(n.title) + '</div>' +
                    '<div class="notification-message">' + window.escapeHtml(n.message) + '</div>' +
                    '<div class="notification-actions">' +
                        '<button onclick="event.stopPropagation(); markAsRead(' + n.id + ')"><i class="fas fa-check"></i> Отметить прочитанным</button>' +
                        (n.task_id ? '<button onclick="event.stopPropagation(); goToTask(' + n.task_id + ')"><i class="fas fa-arrow-right"></i> Перейти к задаче</button>' : '') +
                    '</div>' +
                '</div>';
            }
            
            container.innerHTML = html;
            
            // Добавляем анимацию для новых элементов
            const items = container.querySelectorAll('.notification-item');
            items.forEach((item, index) => {
                item.style.animation = `fadeInScale 0.3s ease ${index * 0.03}s backwards`;
            });
        }
        
        function markAsRead(id) {
            var notifications = JSON.parse(localStorage.getItem('crm_notifications_center') || '[]');
            var notification = null;
            for (var i = 0; i < notifications.length; i++) {
                if (notifications[i].id === id) {
                    notifications[i].read = true;
                    notification = notifications[i];
                    break;
                }
            }
            localStorage.setItem('crm_notifications_center', JSON.stringify(notifications));
            
            // Анимация удаления подсветки
            const element = document.querySelector(`.notification-item[data-id="${id}"]`);
            if (element) {
                element.classList.remove('unread');
                if (window.animations) {
                    window.animations.showToast('Уведомление отмечено прочитанным', 'success');
                }
            }
            
            renderNotifications();
            if (window.notifications) window.notifications.updateBadge();
        }
        
        function markAllRead() {
            const btn = document.querySelector('.mark-all-read');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Отмечаем...';
            btn.disabled = true;
            
            setTimeout(() => {
                var notifications = JSON.parse(localStorage.getItem('crm_notifications_center') || '[]');
                for (var i = 0; i < notifications.length; i++) {
                    notifications[i].read = true;
                }
                localStorage.setItem('crm_notifications_center', JSON.stringify(notifications));
                
                renderNotifications();
                if (window.notifications) window.notifications.updateBadge();
                
                btn.innerHTML = '<i class="fas fa-check"></i> Готово!';
                
                if (window.animations) {
                    window.animations.showToast('Все уведомления отмечены прочитанными', 'success');
                }
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 1500);
            }, 300);
        }
        
        function openNotification(id, taskId) {
            markAsRead(id);
            if (taskId) {
                if (window.animations) {
                    window.animations.showToast('Переход к задаче...', 'info');
                }
                setTimeout(() => {
                    window.location.href = 'tasks.html?task=' + taskId;
                }, 200);
            }
        }
        
        function goToTask(taskId) {
            if (window.animations) {
                window.animations.showToast('Переход к задаче...', 'info');
            }
            setTimeout(() => {
                window.location.href = 'tasks.html?task=' + taskId;
            }, 100);
        }
        
        // Обновление информации о пользователе
        function updateUserProfile() {
            var user = window.auth.getCurrentUser();
            if (!user) return;
            
            var userNameSpan = document.getElementById('userName');
            var userRoleSpan = document.getElementById('userRole');
            var userAvatar = document.getElementById('userAvatar');
            
            if (userNameSpan) {
                userNameSpan.textContent = user.name;
            }
            
            if (userRoleSpan) {
                var roleLabel = '';
                if (user.role === 'admin') roleLabel = 'Администратор';
                else if (user.role === 'manager') roleLabel = 'Менеджер';
                else if (user.role === 'agent') roleLabel = 'Агент';
                else roleLabel = 'Наблюдатель';
                userRoleSpan.textContent = roleLabel;
            }
            
            if (userAvatar) {
                var initials = user.name.split(' ').map(function(n) { return n[0]; }).join('').toUpperCase();
                userAvatar.innerHTML = initials || '<i class="fas fa-user"></i>';
            }
        }
        
        async function init() {
            await window.auth.initAuth();
            
            var currentUser = window.auth.getCurrentUser();
            if (currentUser) {
                updateUserProfile();
            }
            
            renderNotifications();
            if (window.theme) window.theme.initTheme();
            if (window.sidebar) window.sidebar.initSidebar();
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
