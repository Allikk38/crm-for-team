<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: tasks-supabase.html
    РОЛЬ: Доска задач (Kanban) с Supabase
    
    ОСОБЕННОСТИ:
      - Kanban-доска с 3 статусами (pending, in_progress, completed)
      - Drag-and-drop для изменения статуса
      - Создание/редактирование задач
      - Комментарии к задачам
      - Приватные задачи
      - Привязка к объектам недвижимости
    
    ЗАВИСИМОСТИ:
      - CSS: base.css, theme.css, components.css, kanban.css, modal.css, animations.css
      - JS: js/utils/helpers.js, js/components/kanban.js, js/ui/animations.js, js/pages/tasks.js, layout.js
      - Таблицы: tasks, profiles, complexes, comments
    
    ИСТОРИЯ:
      - 27.03.2026: Создание supabase-версии задач
      - 27.03.2026: Рефакторинг — логика вынесена в js/pages/tasks.js
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Доска задач - CRM для команды (Supabase)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <style>
        /* Стили (без изменений) */
        .kanban-column {
            animation: fadeInUp 0.4s ease backwards;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .kanban-column:nth-child(1) { animation-delay: 0.05s; }
        .kanban-column:nth-child(2) { animation-delay: 0.1s; }
        .kanban-column:nth-child(3) { animation-delay: 0.15s; }
        
        .task-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInScale 0.3s ease backwards;
            position: relative;
            overflow: hidden;
        }
        
        .task-card:hover {
            transform: translateX(6px) translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border-color: var(--accent);
        }
        
        .task-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
            cursor: grabbing;
        }
        
        .drag-over {
            background: rgba(108, 108, 255, 0.1);
            border: 2px dashed var(--accent);
            transition: all 0.2s ease;
        }
        
        .private-badge {
            display: inline-block;
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 8px;
        }
        
        .comment-item {
            transition: all 0.2s ease;
            animation: fadeInScale 0.3s ease backwards;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            background: var(--input-bg);
        }
        .comment-item:hover {
            transform: translateX(4px);
            background: rgba(108, 108, 255, 0.1);
        }
        
        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.75rem;
        }
        
        .comment-author {
            font-weight: 600;
            color: var(--accent);
        }
        
        .comment-date {
            color: var(--text-muted);
            font-size: 0.65rem;
        }
        
        .comment-text {
            font-size: 0.85rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .delete-comment {
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .delete-comment:hover {
            color: #ff6b6b;
            transform: scale(1.1);
        }
        
        .add-task-btn-header {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .add-task-btn-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .skeleton-task {
            background: linear-gradient(90deg, var(--card-border) 25%, var(--card-hover) 50%, var(--card-border) 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
            height: 100px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        
        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .comments-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--card-border);
        }
        
        .comments-header {
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .comments-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        
        .comment-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            font-size: 0.85rem;
        }
        
        .add-comment textarea {
            width: 100%;
            padding: 10px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            resize: vertical;
        }
        
        @media (max-width: 768px) {
            .task-card:hover {
                transform: translateX(3px) translateY(-1px);
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="top-bar-actions">
                    <button id="addTaskBtn" class="add-task-btn-header">
                        <i class="fas fa-plus"></i> Новая задача
                    </button>
                </div>
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="kanban-board" id="kanbanBoard">
                <div class="kanban-column" data-status="pending">
                    <div class="column-header">
                        <span><i class="fas fa-circle"></i> To Do</span>
                        <span id="todoCount">0</span>
                    </div>
                    <div id="todoTasks" class="tasks-container"></div>
                    <button class="add-task-btn" data-status="pending"><i class="fas fa-plus"></i> Добавить задачу</button>
                </div>
                
                <div class="kanban-column" data-status="in_progress">
                    <div class="column-header">
                        <span><i class="fas fa-spinner fa-pulse"></i> В работе</span>
                        <span id="progressCount">0</span>
                    </div>
                    <div id="progressTasks" class="tasks-container"></div>
                    <button class="add-task-btn" data-status="in_progress"><i class="fas fa-plus"></i> Добавить задачу</button>
                </div>
                
                <div class="kanban-column" data-status="completed">
                    <div class="column-header">
                        <span><i class="fas fa-check-circle"></i> Готово</span>
                        <span id="doneCount">0</span>
                    </div>
                    <div id="doneTasks" class="tasks-container"></div>
                    <button class="add-task-btn" data-status="completed"><i class="fas fa-plus"></i> Добавить задачу</button>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно задачи -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"><i class="fas fa-tasks"></i> Создать задачу</h3>
            <input type="hidden" id="taskId">
            <input type="text" id="taskTitle" placeholder="Название задачи" required>
            <textarea id="taskDescription" placeholder="Описание задачи"></textarea>
            <select id="taskAssignee">
                <option value="">Назначить исполнителя</option>
            </select>
            <select id="taskComplex">
                <option value="">Привязать к объекту</option>
            </select>
            <select id="taskPriority">
                <option value="low">Низкий приоритет</option>
                <option value="medium" selected>Средний приоритет</option>
                <option value="high">Высокий приоритет</option>
            </select>
            <input type="date" id="taskDueDate">
            <select id="taskStatus">
                <option value="pending">To Do</option>
                <option value="in_progress">В работе</option>
                <option value="completed">Готово</option>
            </select>
            
            <div class="private-checkbox-wrapper" id="privateCheckboxGroup">
                <label>
                    <input type="checkbox" id="taskPrivate">
                    <i class="fas fa-lock"></i> Приватная задача
                </label>
            </div>
            
            <div class="comments-section">
                <div class="comments-header">
                    <i class="fas fa-comments"></i> Комментарии (<span id="commentsCount">0</span>)
                </div>
                <div id="commentsList" class="comments-list">
                    <div class="comment-empty">Нет комментариев</div>
                </div>
                <div class="add-comment">
                    <textarea id="newComment" placeholder="Написать комментарий..." rows="2"></textarea>
                    <button class="primary" onclick="window.addComment()" style="margin-top: 8px; width: 100%;"><i class="fas fa-paper-plane"></i> Отправить</button>
                </div>
            </div>
            
            <div class="modal-buttons">
                <button onclick="window.closeModal()"><i class="fas fa-times"></i> Отмена</button>
                <button class="primary" onclick="window.saveTask()"><i class="fas fa-save"></i> Сохранить</button>
            </div>
        </div>
    </div>
    
    <!-- ========== ПОДКЛЮЧАЕМ ЗАВИСИМОСТИ ========== -->
    <!-- Подключаем утилиты и компоненты (ОБЯЗАТЕЛЬНО ДО импорта модуля) -->
    <script src="js/utils/helpers.js"></script>
    <script src="js/components/kanban.js"></script>
    <script src="js/ui/animations.js"></script>

    <!-- Подключаем модуль страницы (логика вынесена) -->
    <script type="module">
        import { initTasksPage } from './js/pages/tasks.js';
        initTasksPage();
    </script>
    <script src="layout.js"></script>
</body>
</html>
