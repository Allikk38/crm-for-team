<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Supabase Tasks</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f0f0f0; padding: 10px; overflow: auto; }
        button { margin: 5px; padding: 8px 12px; cursor: pointer; }
        input, textarea { width: 100%; margin: 5px 0; padding: 8px; }
        .card { border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Тест работы с задачами через Supabase</h1>
    
    <div id="auth-status" class="error">Проверка авторизации...</div>
    
    <hr>
    
    <h3>Создать задачу</h3>
    <input type="text" id="task-title" placeholder="Название задачи">
    <textarea id="task-desc" placeholder="Описание" rows="2"></textarea>
    <input type="date" id="task-deadline">
    <select id="task-status">
        <option value="pending">В ожидании</option>
        <option value="in_progress">В работе</option>
        <option value="completed">Выполнено</option>
    </select>
    <button onclick="testCreateTask()">Создать задачу</button>
    
    <hr>
    
    <h3>Все задачи</h3>
    <button onclick="testGetTasks()">Загрузить задачи</button>
    <div id="tasks-list"></div>
    
    <hr>
    
    <h3>Просроченные задачи</h3>
    <button onclick="testGetOverdue()">Показать просроченные</button>
    <div id="overdue-list"></div>

    <script type="module">
        import { supabase } from './js/core/supabase.js';
        import { getTasks, createTask, updateTaskStatus, getOverdueTasks, getTodayTasks } from './js/services/tasks-supabase.js';
        
        const authStatus = document.getElementById('auth-status');
        
        // Проверяем авторизацию
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                authStatus.innerHTML = `<span class="success">✅ Авторизован: ${user.email}</span>`;
                return true;
            } else {
                authStatus.innerHTML = '<span class="error">❌ Не авторизован. Сначала войдите через auth.html</span>';
                return false;
            }
        }
        
        window.testGetTasks = async function() {
            const tasks = await getTasks();
            const container = document.getElementById('tasks-list');
            
            if (tasks.length === 0) {
                container.innerHTML = '<p>Нет задач</p>';
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="card">
                    <strong>${escapeHtml(task.title)}</strong><br>
                    Статус: ${task.status}<br>
                    Дедлайн: ${task.deadline || 'нет'}<br>
                    ID: ${task.id}
                </div>
            `).join('');
        };
        
        window.testCreateTask = async function() {
            const title = document.getElementById('task-title').value;
            if (!title) {
                alert('Введите название задачи');
                return;
            }
            
            const task = await createTask({
                title: title,
                description: document.getElementById('task-desc').value,
                due_date: document.getElementById('task-deadline').value,
                status: document.getElementById('task-status').value
            });
            
            if (task) {
                alert('✅ Задача создана! ID: ' + task.id);
                document.getElementById('task-title').value = '';
                document.getElementById('task-desc').value = '';
                document.getElementById('task-deadline').value = '';
                window.testGetTasks();
            } else {
                alert('❌ Ошибка создания задачи');
            }
        };
        
        window.testGetOverdue = async function() {
            const tasks = await getOverdueTasks();
            const container = document.getElementById('overdue-list');
            
            if (tasks.length === 0) {
                container.innerHTML = '<p>Нет просроченных задач</p>';
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="card">
                    <strong>${escapeHtml(task.title)}</strong><br>
                    Дедлайн: ${task.deadline}
                </div>
            `).join('');
        };
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        checkAuth();
    </script>
</body>
</html>
