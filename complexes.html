<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {
                console.warn('Theme initialization error:', e);
            }
        })();
    </script>
    
    <title>Объекты недвижимости - CRM для команды</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <style>
        .complexes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .complexes-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .complexes-filters input,
        .complexes-filters select {
            padding: 8px 16px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            color: var(--text-primary);
        }
        
        .complexes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }
        
        .complex-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .complex-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }
        
        .complex-card-header {
            padding: 20px 20px 12px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .complex-card-header h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        
        .complex-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .status-active { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .status-in_progress { background: rgba(255, 193, 68, 0.2); color: #ffc107; }
        .status-archived { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
        
        .complex-card-body {
            padding: 16px 20px;
        }
        
        .complex-info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        
        .complex-info-row i {
            width: 20px;
            color: var(--accent);
        }
        
        .complex-price {
            font-weight: 700;
            color: var(--accent);
            margin-top: 12px;
            font-size: 1.1rem;
        }
        
        .complex-card-footer {
            padding: 12px 20px 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--card-border);
        }
        
        .complex-btn {
            flex: 1;
            padding: 8px;
            background: rgba(108, 108, 255, 0.15);
            border: none;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        
        .complex-btn:hover {
            background: rgba(108, 108, 255, 0.3);
        }
        
        .complex-modal-content {
            max-width: 700px;
        }
        
        .complex-detail-row {
            display: flex;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .complex-detail-label {
            width: 120px;
            font-weight: 600;
            color: var(--accent);
        }
        
        .complex-detail-value {
            flex: 1;
        }
        
        .tasks-list {
            margin-top: 16px;
        }
        
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--card-border);
        }
        
        .add-complex-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .loading-state i {
            font-size: 2rem;
            margin-bottom: 16px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .complexes-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1><i class="fas fa-building"></i> Объекты недвижимости</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">Загрузка...</span>
                </div>
            </div>
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Дашборд</a>
                <a href="tasks.html" class="nav-btn"><i class="fas fa-tasks"></i> Доска задач</a>
                <a href="calendar.html" class="nav-btn"><i class="fas fa-calendar-alt"></i> Календарь</a>
                <a href="manager.html" class="nav-btn" data-role="admin,manager"><i class="fas fa-chart-simple"></i> Панель менеджера</a>
                <button id="addComplexBtn" class="nav-btn" data-role="admin,manager"><i class="fas fa-plus"></i> Добавить объект</button>
            </div>
        </header>
        
        <div class="complexes-header">
            <div class="complexes-filters">
                <input type="text" id="searchInput" placeholder="Поиск по названию или адресу">
                <select id="statusFilter">
                    <option value="all">Все статусы</option>
                    <option value="active">Активен</option>
                    <option value="in_progress">В работе</option>
                    <option value="archived">Архив</option>
                </select>
                <select id="agentFilter">
                    <option value="all">Все агенты</option>
                </select>
            </div>
        </div>
        
        <div id="complexesGrid" class="complexes-grid">
            <div class="loading-state">
                <i class="fas fa-spinner fa-pulse"></i>
                <p>Загрузка объектов...</p>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно для объекта -->
    <div id="complexModal" class="modal">
        <div class="modal-content complex-modal-content">
            <h3 id="complexModalTitle"><i class="fas fa-building"></i> Карточка объекта</h3>
            <div id="complexModalBody"></div>
            <div class="modal-buttons">
                <button onclick="closeComplexModal()"><i class="fas fa-times"></i> Закрыть</button>
                <button id="editComplexBtn" class="primary" style="display: none;"><i class="fas fa-edit"></i> Редактировать</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно для редактирования/создания -->
    <div id="complexFormModal" class="modal">
        <div class="modal-content">
            <h3 id="complexFormTitle"><i class="fas fa-edit"></i> Объект</h3>
            <input type="hidden" id="complexId">
            <input type="text" id="complexTitle" placeholder="Название ЖК" required>
            <input type="text" id="complexAddress" placeholder="Адрес" required>
            <input type="text" id="complexDeveloper" placeholder="Застройщик">
            <div style="display: flex; gap: 12px;">
                <input type="number" id="complexPriceFrom" placeholder="Цена от" style="flex: 1">
                <input type="number" id="complexPriceTo" placeholder="Цена до" style="flex: 1">
            </div>
            <select id="complexStatus">
                <option value="active">Активен</option>
                <option value="in_progress">В работе</option>
                <option value="archived">Архив</option>
            </select>
            <select id="complexAssignee">
                <option value="">Ответственный агент</option>
            </select>
            <input type="text" id="complexCoordinates" placeholder="Координаты (lat,lng) - опционально">
            <textarea id="complexDescription" placeholder="Описание объекта" rows="4"></textarea>
            <div class="modal-buttons">
                <button onclick="closeComplexFormModal()">Отмена</button>
                <button class="primary" onclick="saveComplex()">Сохранить</button>
            </div>
        </div>
    </div>
    
    <script src="core.js"></script>
    <script src="auth.js"></script>
    <script src="theme.js"></script>
    <script src="complexes.js"></script>
</body>
</html>
