<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: admin.html
    РОЛЬ: Панель администратора для управления пользователями
    СВЯЗИ:
      - CSS: base.css, theme.css, components.css, modal.css, responsive.css, animations.css
      - JS: js/core/*, js/utils/*, js/ui/*, layout.js, notifications.js
      - Данные: data/users.csv
    МЕХАНИКА:
      1. Боковая панель с навигацией (генерируется централизованно из layout.js)
      2. Список всех пользователей с анимациями
      3. Создание нового пользователя (с анимацией)
      4. Сброс пин-кода (с анимацией)
      5. Изменение роли пользователя
      6. Удаление пользователя (с подтверждением и анимацией)
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Управление пользователями - CRM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .add-user-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .add-user-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .add-user-btn:active {
            transform: translateY(0px) scale(0.98);
        }
        
        .users-table {
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            animation: fadeInUp 0.4s ease;
        }
        
        .users-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .users-table th,
        .users-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }
        
        .users-table th {
            background: rgba(108, 108, 255, 0.1);
            font-weight: 600;
        }
        
        .users-table tbody tr {
            transition: all 0.2s ease;
            animation: slideInFromLeft 0.25s ease backwards;
        }
        
        .users-table tbody tr:hover {
            background: rgba(108, 108, 255, 0.05);
            transform: scale(1.01);
        }
        
        /* Стейггеринг для строк таблицы */
        .users-table tbody tr:nth-child(1) { animation-delay: 0.03s; }
        .users-table tbody tr:nth-child(2) { animation-delay: 0.06s; }
        .users-table tbody tr:nth-child(3) { animation-delay: 0.09s; }
        .users-table tbody tr:nth-child(4) { animation-delay: 0.12s; }
        .users-table tbody tr:nth-child(5) { animation-delay: 0.15s; }
        .users-table tbody tr:nth-child(6) { animation-delay: 0.18s; }
        .users-table tbody tr:nth-child(7) { animation-delay: 0.21s; }
        .users-table tbody tr:nth-child(8) { animation-delay: 0.24s; }
        .users-table tbody tr:nth-child(9) { animation-delay: 0.27s; }
        .users-table tbody tr:nth-child(10) { animation-delay: 0.30s; }
        
        /* Подсветка новой строки */
        @keyframes highlightRow {
            0% {
                background: rgba(108, 108, 255, 0.4);
            }
            100% {
                background: transparent;
            }
        }
        
        .table-row-highlight {
            animation: highlightRow 1s ease;
        }
        
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .role-badge:hover {
            transform: scale(1.05);
        }
        
        .role-admin { background: rgba(108, 108, 255, 0.2); color: #6c6cff; }
        .role-manager { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .role-agent { background: rgba(255, 193, 68, 0.2); color: #ffc107; }
        .role-viewer { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
        
        .action-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            margin: 0 4px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        
        .action-btn:hover {
            background: rgba(108, 108, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .action-btn:active {
            transform: translateY(0px) scale(0.95);
        }
        
        .action-btn.danger {
            color: #ff6b6b;
        }
        
        .action-btn.danger:hover {
            background: rgba(255, 107, 107, 0.2);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .pin-code {
            font-family: monospace;
            font-size: 0.85rem;
        }
        
        /* Анимация для удаляемой строки */
        .row-removing {
            animation: fadeOutScale 0.2s ease forwards;
        }
        
        @keyframes fadeOutScale {
            from {
                opacity: 1;
                transform: scale(1);
            }
            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }
        
        /* Анимация для модальных окон */
        .modal {
            animation: fadeInScale 0.25s ease;
        }
        
        /* Скелетон загрузки */
        .skeleton-row {
            background: linear-gradient(90deg, var(--card-border) 25%, var(--card-hover) 50%, var(--card-border) 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
            height: 50px;
            border-radius: 8px;
            margin: 8px 0;
        }
        
        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Боковая панель навигации -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            
            <!-- Навигация генерируется централизованно из layout.js -->
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- контейнер для динамической генерации навигации -->
            </nav>
            
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <!-- Кнопка выхода добавляется автоматически из layout.js -->
            </div>
        </aside>
        
        <!-- Основной контент -->
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="admin-header fade-in-up">
                <h2><i class="fas fa-users-cog"></i> Управление пользователями</h2>
                <button class="add-user-btn" id="addUserBtn">
                    <i class="fas fa-plus"></i> Добавить пользователя
                </button>
            </div>
            
            <div class="users-table" id="usersTable">
                <div class="skeleton-row" style="margin: 16px;"></div>
                <div class="skeleton-row" style="margin: 16px;"></div>
                <div class="skeleton-row" style="margin: 16px;"></div>
                <div class="skeleton-row" style="margin: 16px;"></div>
                <div class="skeleton-row" style="margin: 16px;"></div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно добавления пользователя -->
    <div id="addUserModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3><i class="fas fa-user-plus"></i> Добавить пользователя</h3>
            <input type="text" id="newUsername" placeholder="Логин (github_username)" required>
            <input type="text" id="newName" placeholder="Полное имя" required>
            <select id="newRole">
                <option value="agent">Агент</option>
                <option value="manager">Менеджер</option>
                <option value="viewer">Наблюдатель</option>
                <option value="admin">Администратор</option>
            </select>
            <input type="email" id="newEmail" placeholder="Email">
            <div class="modal-buttons">
                <button onclick="closeAddUserModal()">Отмена</button>
                <button class="primary" id="confirmAddUserBtn">Создать</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно сброса пин-кода -->
    <div id="resetPinModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3><i class="fas fa-key"></i> Сброс пин-кода</h3>
            <p>Вы уверены, что хотите сбросить пин-код пользователя <strong id="resetUserName"></strong>?</p>
            <p style="font-size: 0.85rem; color: var(--text-muted);">Новый пин-код будет сгенерирован автоматически.</p>
            <input type="hidden" id="resetUserId">
            <div class="modal-buttons">
                <button onclick="closeResetPinModal()">Отмена</button>
                <button class="primary" id="confirmResetPinBtn">Сбросить</button>
            </div>
        </div>
    </div>
    
    <!-- 1. Утилиты (не зависят ни от чего) -->
    <script src="js/utils/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    
    <!-- 2. Ядро (зависит от утилит) -->
    <script src="js/core/api.js"></script>
    <script src="js/core/auth.js"></script>
    
    <!-- 3. UI компоненты (зависят от ядра) -->
    <script src="js/ui/theme.js"></script>
    <script src="js/ui/animations.js"></script>
    <script src="js/ui/mobile.js"></script>
    <script src="js/ui/onboarding.js"></script>
    <script src="layout.js"></script>
    <script src="notifications.js"></script>
        
    <!-- 4. Логика страницы -->
    <script>
        let currentUsersList = [];
        
        async function loadUsersList() {
            const users = await window.auth.getUsers();
            currentUsersList = users;
            renderUsersTable(users);
        }
        
        function renderUsersTable(users) {
            const tbody = document.getElementById('usersTable');
            if (!tbody) return;
            
            if (!users || users.length === 0) {
                tbody.innerHTML = '<div class="empty-state"><i class="fas fa-users-slash"></i><p>Нет пользователей</p></div>';
                return;
            }
            
            let html = '<table><thead><tr>' +
                '<th>Логин</th>' +
                '<th>Имя</th>' +
                '<th>Роль</th>' +
                '<th>Email</th>' +
                '<th>Пин-код</th>' +
                '<th>Дата регистрации</th>' +
                '<th>Действия</th>' +
                '</tr></thead><tbody>';
            
            for (let i = 0; i < users.length; i++) {
                const user = users[i];
                let roleClass = '';
                let roleLabel = '';
                
                if (user.role === 'admin') {
                    roleClass = 'role-admin';
                    roleLabel = 'Администратор';
                } else if (user.role === 'manager') {
                    roleClass = 'role-manager';
                    roleLabel = 'Менеджер';
                } else if (user.role === 'agent') {
                    roleClass = 'role-agent';
                    roleLabel = 'Агент';
                } else {
                    roleClass = 'role-viewer';
                    roleLabel = 'Наблюдатель';
                }
                
                html += '<tr data-username="' + escapeHtml(user.github_username) + '">' +
                    '<td>' + escapeHtml(user.github_username) + '</td>' +
                    '<td>' + escapeHtml(user.name) + '</td>' +
                    '<td><span class="role-badge ' + roleClass + '">' + roleLabel + '</span></td>' +
                    '<td>' + escapeHtml(user.email || '—') + '</td>' +
                    '<td class="pin-code">••••</td>' +
                    '<td>' + escapeHtml(user.created_at || '—') + '</td>' +
                    '<td>' +
                        '<button class="action-btn" onclick="openResetPinModal(\'' + escapeHtml(user.github_username) + '\', \'' + escapeHtml(user.name) + '\')" title="Сбросить пин-код"><i class="fas fa-key"></i></button>' +
                        '<button class="action-btn danger" onclick="deleteUser(\'' + escapeHtml(user.github_username) + '\')" title="Удалить пользователя"><i class="fas fa-trash"></i></button>' +
                    '</td>' +
                '</tr>';
            }
            
            html += '</tbody></table>';
            tbody.innerHTML = html;
            
            // Добавляем анимацию появления строк
            const rows = tbody.querySelectorAll('tbody tr');
            rows.forEach((row, index) => {
                row.style.animation = `slideInFromLeft 0.25s ease ${index * 0.03}s backwards`;
            });
        }
        
        async function addUser() {
            const username = document.getElementById('newUsername').value.trim();
            const name = document.getElementById('newName').value.trim();
            const role = document.getElementById('newRole').value;
            const email = document.getElementById('newEmail').value.trim();
            
            if (!username || !name) {
                if (window.animations) {
                    window.animations.showToast('Заполните логин и имя', 'warning');
                } else {
                    alert('Заполните логин и имя');
                }
                return;
            }
            
            const result = await window.auth.createUser(username, name, role, email);
            
            if (result.success) {
                if (window.animations) {
                    window.animations.showToast('Пользователь создан! Пин-код: ' + result.tempPin, 'success', 4000);
                } else {
                    alert('Пользователь создан!\nВременный пин-код: ' + result.tempPin + '\nСообщите его пользователю.');
                }
                closeAddUserModal();
                await loadUsersList();
                
                // Подсвечиваем новую строку
                setTimeout(() => {
                    const newRow = document.querySelector(`tr[data-username="${username}"]`);
                    if (newRow) {
                        newRow.classList.add('table-row-highlight');
                        setTimeout(() => newRow.classList.remove('table-row-highlight'), 1000);
                    }
                }, 100);
            } else {
                if (window.animations) {
                    window.animations.showToast('Ошибка: ' + result.error, 'error');
                } else {
                    alert('Ошибка: ' + result.error);
                }
            }
        }
        
        function openResetPinModal(username, name) {
            document.getElementById('resetUserId').value = username;
            document.getElementById('resetUserName').textContent = name;
            const modal = document.getElementById('resetPinModal');
            modal.style.display = 'flex';
            modal.classList.add('fade-in-scale');
        }
        
        async function resetPin() {
            const username = document.getElementById('resetUserId').value;
            const result = await window.auth.resetPin(username);
            
            if (result.success) {
                if (window.animations) {
                    window.animations.showToast('Пин-код сброшен! Новый пин-код: ' + result.newPin, 'success', 4000);
                } else {
                    alert('Пин-код сброшен!\nНовый пин-код: ' + result.newPin);
                }
                closeResetPinModal();
                loadUsersList();
            } else {
                if (window.animations) {
                    window.animations.showToast('Ошибка: ' + result.error, 'error');
                } else {
                    alert('Ошибка: ' + result.error);
                }
            }
        }
        
        async function deleteUser(username) {
            // Используем кастомное подтверждение с анимацией
            const confirmed = confirm('Вы уверены, что хотите удалить пользователя ' + username + '? Это действие необратимо.');
            if (!confirmed) return;
            
            const currentUser = window.auth.getCurrentUser();
            if (currentUser.github_username === username) {
                if (window.animations) {
                    window.animations.showToast('Нельзя удалить самого себя', 'warning');
                } else {
                    alert('Нельзя удалить самого себя');
                }
                return;
            }
            
            const row = document.querySelector(`tr[data-username="${username}"]`);
            
            // Анимация удаления
            if (row && window.animations) {
                row.classList.add('row-removing');
                await new Promise(resolve => setTimeout(resolve, 200));
            }
            
            const users = await window.auth.getUsers();
            const filteredUsers = users.filter(u => u.github_username !== username);
            const saved = await window.saveCSVToGitHub('data/users.csv', filteredUsers, 'Delete user ' + username);
            
            if (saved) {
                if (window.animations) {
                    window.animations.showToast('Пользователь удалён', 'success');
                } else {
                    alert('Пользователь удалён');
                }
                loadUsersList();
            } else {
                if (window.animations) {
                    window.animations.showToast('Ошибка удаления', 'error');
                } else {
                    alert('Ошибка удаления');
                }
            }
        }
        
        function closeAddUserModal() {
            const modal = document.getElementById('addUserModal');
            if (window.animations) {
                modal.classList.add('modal-closing');
                setTimeout(() => {
                    modal.style.display = 'none';
                    modal.classList.remove('modal-closing');
                }, 200);
            } else {
                modal.style.display = 'none';
            }
            document.getElementById('newUsername').value = '';
            document.getElementById('newName').value = '';
            document.getElementById('newEmail').value = '';
        }
        
        function closeResetPinModal() {
            const modal = document.getElementById('resetPinModal');
            if (window.animations) {
                modal.classList.add('modal-closing');
                setTimeout(() => {
                    modal.style.display = 'none';
                    modal.classList.remove('modal-closing');
                }, 200);
            } else {
                modal.style.display = 'none';
            }
        }
        
        function updateUserProfile() {
            const user = window.auth.getCurrentUser();
            if (!user) return;
            
            const userNameSpan = document.getElementById('userName');
            const userRoleSpan = document.getElementById('userRole');
            const userAvatar = document.getElementById('userAvatar');
            
            if (userNameSpan) userNameSpan.textContent = user.name;
            if (userRoleSpan) {
                let roleLabel = '';
                if (user.role === 'admin') roleLabel = 'Администратор';
                else if (user.role === 'manager') roleLabel = 'Менеджер';
                else if (user.role === 'agent') roleLabel = 'Агент';
                else roleLabel = 'Наблюдатель';
                userRoleSpan.textContent = roleLabel;
            }
            if (userAvatar) {
                const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
                userAvatar.innerHTML = initials || '<i class="fas fa-user"></i>';
            }
        }
        
        async function init() {
            await window.auth.initAuth();
            
            const user = window.auth.getCurrentUser();
            if (!user || user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            
            updateUserProfile();
            await loadUsersList();
            
            if (window.theme) window.theme.initTheme();
            if (window.sidebar) window.sidebar.initSidebar();
        }
        
        // Добавляем обработчики событий
        document.addEventListener('DOMContentLoaded', () => {
            const addUserBtn = document.getElementById('addUserBtn');
            const confirmAddUserBtn = document.getElementById('confirmAddUserBtn');
            const confirmResetPinBtn = document.getElementById('confirmResetPinBtn');
            
            if (addUserBtn) addUserBtn.addEventListener('click', () => {
                const modal = document.getElementById('addUserModal');
                modal.style.display = 'flex';
                modal.classList.add('fade-in-scale');
            });
            
            if (confirmAddUserBtn) confirmAddUserBtn.addEventListener('click', addUser);
            if (confirmResetPinBtn) confirmResetPinBtn.addEventListener('click', resetPin);
            
            window.onclick = function(event) {
                const addModal = document.getElementById('addUserModal');
                const resetModal = document.getElementById('resetPinModal');
                if (event.target === addModal) closeAddUserModal();
                if (event.target === resetModal) closeResetPinModal();
            };
            
            init();
        });
    </script>
</body>
</html>
