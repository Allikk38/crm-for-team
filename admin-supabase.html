<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: admin-supabase.html
    РОЛЬ: Панель администратора для управления пользователями (Supabase версия)
    
    ОСОБЕННОСТИ:
      - Список всех пользователей с анимациями
      - Создание нового пользователя
      - Сброс пин-кода
      - Изменение роли пользователя
      - Удаление пользователя
      - Только для администраторов
    
    ЗАВИСИМОСТИ:
      - CSS: base.css, theme.css, components.css, modal.css, responsive.css, animations.css
      - JS: js/pages/admin.js, layout.js
    
    ИСТОРИЯ:
      - 27.03.2026: Создание supabase-версии панели администратора
      - 27.03.2026: Рефакторинг — логика вынесена в js/pages/admin.js
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Управление пользователями - CRM (Supabase)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .add-user-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .add-user-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .users-table {
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            overflow-x: auto;
            animation: fadeInUp 0.4s ease;
        }
        
        .users-table table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }
        
        .users-table th,
        .users-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }
        
        .users-table th {
            background: rgba(108, 108, 255, 0.1);
            font-weight: 600;
        }
        
        .users-table tbody tr {
            transition: all 0.2s ease;
        }
        
        .users-table tbody tr:hover {
            background: rgba(108, 108, 255, 0.05);
        }
        
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .role-badge:hover {
            transform: scale(1.05);
        }
        
        .role-admin { background: rgba(108, 108, 255, 0.2); color: #6c6cff; }
        .role-manager { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .role-agent { background: rgba(255, 193, 68, 0.2); color: #ffc107; }
        .role-viewer { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
        
        .action-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            margin: 0 4px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        
        .action-btn:hover {
            background: rgba(108, 108, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .action-btn.danger {
            color: #ff6b6b;
        }
        
        .action-btn.danger:hover {
            background: rgba(255, 107, 107, 0.2);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .skeleton-row {
            background: linear-gradient(90deg, var(--card-border) 25%, var(--card-hover) 50%, var(--card-border) 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
            height: 50px;
            border-radius: 8px;
            margin: 8px;
        }
        
        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        @keyframes highlightRow {
            0% { background: rgba(108, 108, 255, 0.4); }
            100% { background: transparent; }
        }
        
        .table-row-highlight {
            animation: highlightRow 1s ease;
        }
        
        .row-removing {
            animation: fadeOutScale 0.2s ease forwards;
        }
        
        @keyframes fadeOutScale {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }
        
        .role-select {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 4px 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.75rem;
        }
        
        .role-select:hover {
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="admin-header">
                <h2><i class="fas fa-users-cog"></i> Управление пользователями</h2>
                <button class="add-user-btn" id="addUserBtn">
                    <i class="fas fa-plus"></i> Добавить пользователя
                </button>
            </div>
            
            <div class="users-table" id="usersTable">
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно добавления пользователя -->
    <div id="addUserModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3><i class="fas fa-user-plus"></i> Добавить пользователя</h3>
            <input type="text" id="newUsername" placeholder="Логин (github_username)" required>
            <input type="text" id="newName" placeholder="Полное имя" required>
            <select id="newRole">
                <option value="agent">Агент</option>
                <option value="manager">Менеджер</option>
                <option value="viewer">Наблюдатель</option>
                <option value="admin">Администратор</option>
            </select>
            <input type="email" id="newEmail" placeholder="Email">
            <div class="modal-buttons">
                <button onclick="window.closeAddUserModal()">Отмена</button>
                <button class="primary" id="confirmAddUserBtn">Создать</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно сброса пин-кода -->
    <div id="resetPinModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3><i class="fas fa-key"></i> Сброс пин-кода</h3>
            <p>Вы уверены, что хотите сбросить пин-код пользователя <strong id="resetUserName"></strong>?</p>
            <p style="font-size: 0.85rem; color: var(--text-muted);">Новый пин-код будет сгенерирован автоматически.</p>
            <input type="hidden" id="resetUserId">
            <div class="modal-buttons">
                <button onclick="window.closeResetPinModal()">Отмена</button>
                <button class="primary" id="confirmResetPinBtn">Сбросить</button>
            </div>
        </div>
    </div>
    
    <!-- ========== УНИВЕРСАЛЬНЫЙ ЗАГРУЗЧИК МОДУЛЕЙ ========== -->
    <script type="module" src="js/core/moduleLoader.js"></script>
    
    <!-- Инициализация бокового меню -->
    <script type="module">
        import * as sidebar from './layout.js';
        window.sidebar = sidebar;
        sidebar.initSidebar();
    </script>
</body>
</html>
