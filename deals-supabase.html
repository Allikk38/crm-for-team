<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: deals-supabase.html
    РОЛЬ: Управление заявками (сделки) с Supabase
    
    ОСОБЕННОСТИ:
      - Kanban-доска с 6 статусами
      - Drag-and-drop для изменения статуса
      - Фильтрация по поиску, типу, агенту
      - Интеграция с объектами и контрагентами
    
    ЗАВИСИМОСТИ:
      - CSS: base.css, theme.css, components.css, kanban.css, modal.css, animations.css
      - JS: js/pages/deals.js, layout.js
      - Таблицы: deals, complexes, counterparties, profiles
    
    ИСТОРИЯ:
      - 27.03.2026: Создание supabase-версии
      - 27.03.2026: Исправлены вызовы функций для window.sidebar
      - 27.03.2026: Рефакторинг — логика вынесена в js/pages/deals.js
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Заявки - CRM для команды (Supabase)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <style>
        .deals-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
            animation: fadeInUp 0.4s ease;
        }
        
        .deals-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .deals-filters input,
        .deals-filters select {
            padding: 8px 16px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            color: var(--text-primary);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .add-deal-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .add-deal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .kanban-board-deals {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 16px;
            min-height: calc(100vh - 200px);
        }
        
        .deal-column {
            min-width: 320px;
            width: 320px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 200px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .deal-column:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }
        
        .deal-column-header {
            padding: 16px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            border-radius: 24px 24px 0 0;
        }
        
        .deal-column-header .count {
            background: rgba(108, 108, 255, 0.2);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        
        .deals-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            min-height: 200px;
        }
        
        .deal-card {
            background: var(--input-bg);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: grab;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 3px solid var(--accent);
            user-select: none;
        }
        
        .deal-card:active {
            cursor: grabbing;
        }
        
        .deal-card:hover {
            transform: translateX(6px) translateY(-2px);
            background: rgba(108, 108, 255, 0.15);
        }
        
        .deal-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
            cursor: grabbing;
        }
        
        .deal-title {
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .deal-number {
            color: var(--accent);
            font-size: 0.7rem;
        }
        
        .deal-participants {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .deal-price {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        .deal-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--text-muted);
        }
        
        .deal-type {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.6rem;
        }
        
        .type-primary { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .type-secondary { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
        .type-exchange { background: rgba(255, 152, 0, 0.2); color: #ff9800; }
        .type-urgent { background: rgba(244, 67, 54, 0.2); color: #f44336; }
        
        .empty-deals {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
        }
        
        .drag-over {
            background: rgba(108, 108, 255, 0.2);
            border: 2px dashed var(--accent);
            transition: all 0.2s ease;
        }
        
        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .deal-modal-content {
            max-width: 700px;
        }
        
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .form-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
        }
        
        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 12px;
            }
            .deal-column {
                min-width: 280px;
                width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <button class="logout-btn" onclick="window.sidebar?.logout()" style="margin-top: 12px; width: 100%; padding: 10px; background: rgba(255, 107, 107, 0.2); border: none; border-radius: 12px; color: #ff6b6b; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="top-bar-actions">
                    <button id="addDealBtn" class="add-deal-btn">
                        <i class="fas fa-plus"></i> Новая заявка
                    </button>
                </div>
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="deals-header">
                <div class="deals-filters">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск по №, объекту, участникам">
                    <select id="typeFilter">
                        <option value="all">Все типы</option>
                        <option value="primary">🏗️ Первичка</option>
                        <option value="secondary">🏠 Вторичка</option>
                        <option value="exchange">🔄 Альтернатива</option>
                        <option value="urgent">⚡ Срочный выкуп</option>
                    </select>
                    <select id="agentFilter">
                        <option value="all">Все агенты</option>
                    </select>
                </div>
            </div>
            
            <div class="kanban-board-deals" id="kanbanBoard">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-pulse"></i>
                    <p>Загрузка заявок...</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно заявки -->
    <div id="dealModal" class="modal">
        <div class="modal-content deal-modal-content">
            <h3 id="modalTitle"><i class="fas fa-handshake"></i> Создать заявку</h3>
            <input type="hidden" id="dealId">
            
            <div class="form-row">
                <div class="input-group">
                    <label><i class="fas fa-building"></i> Объект</label>
                    <select id="dealComplex">
                        <option value="">Выберите объект</option>
                    </select>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-hashtag"></i> Квартира</label>
                    <input type="text" id="dealApartment" placeholder="Например: 45">
                </div>
            </div>
            
            <div class="form-row">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Продавец</label>
                    <select id="dealSeller">
                        <option value="">Выберите продавца</option>
                    </select>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Покупатель</label>
                    <select id="dealBuyer">
                        <option value="">Выберите покупателя</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="input-group">
                    <label><i class="fas fa-tag"></i> Тип сделки</label>
                    <select id="dealType">
                        <option value="primary">Первичка</option>
                        <option value="secondary">Вторичка</option>
                        <option value="exchange">Альтернатива</option>
                        <option value="urgent">Срочный выкуп</option>
                    </select>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-user-tie"></i> Агент</label>
                    <select id="dealAgent">
                        <option value="">Выберите агента</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="input-group">
                    <label><i class="fas fa-ruble-sign"></i> Начальная цена</label>
                    <input type="number" id="dealPriceInitial" placeholder="8000000">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-chart-line"></i> Текущая цена</label>
                    <input type="number" id="dealPriceCurrent" placeholder="7800000">
                </div>
            </div>
            
            <div class="form-row">
                <div class="input-group">
                    <label><i class="fas fa-percent"></i> Комиссия (%)</label>
                    <input type="number" id="dealCommission" value="3" step="0.5">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-calendar"></i> Дедлайн</label>
                    <input type="date" id="dealDeadline">
                </div>
            </div>
            
            <div class="form-row">
                <div class="input-group">
                    <label><i class="fas fa-bank"></i> Банк</label>
                    <input type="text" id="dealBank" placeholder="Сбербанк">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-check-circle"></i> Ипотека одобрена</label>
                    <select id="dealMortgageApproved">
                        <option value="false">Нет</option>
                        <option value="true">Да</option>
                    </select>
                </div>
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-sticky-note"></i> Примечания</label>
                <textarea id="dealNotes" rows="3" placeholder="Особенности..."></textarea>
            </div>
            
            <div class="modal-buttons">
                <button onclick="window.closeDealModal()">Отмена</button>
                <button class="primary" onclick="window.saveDeal()">Сохранить</button>
            </div>
        </div>
    </div>
    
    <!-- Подключаем утилиты и компоненты -->
    <script src="js/utils/helpers.js"></script>
    <script src="js/components/kanban.js"></script>
    <script src="js/ui/animations.js"></script>

    <!-- Подключаем модуль страницы (логика вынесена) -->
    <script type="module">
        import { initDealsPage } from './js/pages/deals.js';
        initDealsPage();
    </script>
    <script src="layout.js"></script>
</body>
</html>
