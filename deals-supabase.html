<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    
    <title>Заявки - CRM для команды (Supabase)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <style>
        /* Стили страницы (оставляем без изменений) */
        .deals-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
            animation: fadeInUp 0.4s ease;
        }
        
        .deals-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .deals-filters input,
        .deals-filters select {
            padding: 8px 16px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            color: var(--text-primary);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .add-deal-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .add-deal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .kanban-board-deals {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 16px;
            min-height: calc(100vh - 200px);
        }
        
        .deal-column {
            min-width: 320px;
            width: 320px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 200px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .deal-column:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }
        
        .deal-column-header {
            padding: 16px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            border-radius: 24px 24px 0 0;
        }
        
        .deal-column-header .count {
            background: rgba(108, 108, 255, 0.2);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        
        .deals-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            min-height: 200px;
        }
        
        .deal-card {
            background: var(--input-bg);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 3px solid var(--accent);
        }
        
        .deal-card:hover {
            transform: translateX(6px) translateY(-2px);
            background: rgba(108, 108, 255, 0.15);
        }
        
        .deal-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
            cursor: grabbing;
        }
        
        .deal-title {
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .deal-number {
            color: var(--accent);
            font-size: 0.7rem;
        }
        
        .deal-participants {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .deal-price {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        .deal-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--text-muted);
        }
        
        .deal-type {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.6rem;
        }
        
        .type-primary { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .type-secondary { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
        .type-exchange { background: rgba(255, 152, 0, 0.2); color: #ff9800; }
        .type-urgent { background: rgba(244, 67, 54, 0.2); color: #f44336; }
        
        .empty-deals {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
        }
        
        .drag-over {
            background: rgba(108, 108, 255, 0.2);
            border: 2px dashed var(--accent);
            transition: all 0.2s ease;
        }
        
        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .deal-modal-content {
            max-width: 700px;
        }
        
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .form-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
        }
        
        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .small-btn {
            background: rgba(108, 108, 255, 0.15);
            border: 1px solid var(--card-border);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 4px;
        }
        
        .small-btn:hover {
            background: rgba(108, 108, 255, 0.3);
        }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 12px;
            }
            .deal-column {
                min-width: 280px;
                width: 280px;
            }
        }
    </style>
</head>

    <!-- Подключаем утилиты и компоненты -->
    <script src="js/utils/helpers.js"></script>
    <script src="js/components/kanban.js"></script>
    
    <script type="module">
        /**
         * ============================================
         * МОДУЛЬ: deals-supabase.html
         * РОЛЬ: Управление заявками (сделки) с канбан-доской
         * ВЕРСИЯ: 2.0 - с использованием компонентов
         * ============================================
         */
        
        import { supabase } from './js/core/supabase.js';
        import { 
            getCurrentSupabaseUser, 
            requireSupabaseAuth, 
            updateSupabaseUserInterface, 
            logoutFromSupabase 
        } from './js/core/supabase-session.js';
        
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let dealsData = [];          // Все сделки пользователя
        let complexesData = [];      // Объекты недвижимости
        let counterpartiesData = []; // Контрагенты (продавцы/покупатели)
        let usersData = [];          // Пользователи системы
        let currentUser = null;      // Текущий пользователь
        
        // Статусы сделок для канбан-доски
        const DEAL_STATUSES = [
            { id: 'new', name: 'Новая', icon: 'N', color: '#9e9e9e' },
            { id: 'showing', name: 'Показ', icon: 'V', color: '#2196f3' },
            { id: 'negotiation', name: 'Торг', icon: 'R', color: '#ffc107' },
            { id: 'documents', name: 'Документы', icon: 'P', color: '#ff9800' },
            { id: 'closed', name: 'Закрыта', icon: 'C', color: '#4caf50' },
            { id: 'cancelled', name: 'Отказ', icon: 'X', color: '#9e9e9e' }
        ];
        
        console.log('[deals-supabase] Модуль загружен');
        
        // ========== ЗАГРУЗКА ДАННЫХ ИЗ SUPABASE ==========
        
        /**
         * Загрузка объектов недвижимости
         */
        async function loadComplexes() {
            const { data, error } = await supabase.from('complexes').select('*');
            if (!error && data) {
                complexesData = data;
                console.log(`[deals-supabase] Загружено ${complexesData.length} объектов`);
            } else {
                console.error('[deals-supabase] Ошибка загрузки объектов:', error);
            }
        }
        
        /**
         * Загрузка контрагентов (продавцы и покупатели)
         */
        async function loadCounterparties() {
            const { data, error } = await supabase.from('counterparties').select('*');
            if (!error && data) {
                counterpartiesData = data;
                console.log(`[deals-supabase] Загружено ${counterpartiesData.length} контрагентов`);
            } else {
                console.error('[deals-supabase] Ошибка загрузки контрагентов:', error);
            }
        }
        
        /**
         * Загрузка пользователей системы
         */
        async function loadUsers() {
            const { data, error } = await supabase.from('profiles').select('*');
            if (!error && data) {
                usersData = data;
                console.log(`[deals-supabase] Загружено ${usersData.length} пользователей`);
                updateAgentSelects();
                updateAgentFilter();
            } else {
                console.error('[deals-supabase] Ошибка загрузки пользователей:', error);
            }
        }
        
        /**
         * Загрузка сделок текущего пользователя
         */
        async function loadDeals() {
            const { data, error } = await supabase
                .from('deals')
                .select('*')
                .eq('user_id', currentUser?.id);
            if (!error && data) {
                dealsData = data;
                console.log(`[deals-supabase] Загружено ${dealsData.length} сделок`);
                renderKanban();
            } else {
                console.error('[deals-supabase] Ошибка загрузки сделок:', error);
                dealsData = [];
            }
        }
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        
        /**
         * Получение названия объекта по ID
         */
        function getComplexName(complexId) {
            const complex = complexesData.find(c => c.id == complexId);
            return complex ? complex.name : '—';
        }
        
        /**
         * Получение имени контрагента по ID
         */
        function getCounterpartyName(id) {
            const cp = counterpartiesData.find(c => c.id == id);
            return cp ? cp.name : '—';
        }
        
        /**
         * Обновление селекта объектов в модальном окне
         */
        function updateComplexSelect() {
            const select = document.getElementById('dealComplex');
            if (!select) return;
            select.innerHTML = '<option value="">Выберите объект</option>';
            for (const c of complexesData) {
                select.innerHTML += `<option value="${c.id}">${window.escapeHtml(c.name)} (${window.escapeHtml(c.address || '')})</option>`;
            }
        }
        
        /**
         * Обновление селектов продавцов и покупателей
         */
        function updateCounterpartySelects() {
            const sellerSelect = document.getElementById('dealSeller');
            const buyerSelect = document.getElementById('dealBuyer');
            
            if (sellerSelect) {
                sellerSelect.innerHTML = '<option value="">Выберите продавца</option>';
                for (const c of counterpartiesData) {
                    if (c.type === 'seller') {
                        sellerSelect.innerHTML += `<option value="${c.id}">${window.escapeHtml(c.name)}</option>`;
                    }
                }
            }
            
            if (buyerSelect) {
                buyerSelect.innerHTML = '<option value="">Выберите покупателя</option>';
                for (const c of counterpartiesData) {
                    if (c.type === 'buyer') {
                        buyerSelect.innerHTML += `<option value="${c.id}">${window.escapeHtml(c.name)}</option>`;
                    }
                }
            }
        }
        
        /**
         * Обновление селекта агентов
         */
        function updateAgentSelects() {
            const agentSelect = document.getElementById('dealAgent');
            if (!agentSelect) return;
            agentSelect.innerHTML = '<option value="">Выберите агента</option>';
            for (const u of usersData) {
                if (u.role === 'agent' || u.role === 'manager') {
                    agentSelect.innerHTML += `<option value="${u.github_username}">${window.escapeHtml(u.name)}</option>`;
                }
            }
            if (currentUser) {
                agentSelect.value = currentUser.github_username;
            }
        }
        
        /**
         * Обновление фильтра по агентам
         */
        function updateAgentFilter() {
            const filterSelect = document.getElementById('agentFilter');
            if (!filterSelect) return;
            filterSelect.innerHTML = '<option value="all">Все агенты</option>';
            for (const u of usersData) {
                if (u.role === 'agent' || u.role === 'manager') {
                    filterSelect.innerHTML += `<option value="${u.github_username}">${window.escapeHtml(u.name)}</option>`;
                }
            }
        }
        
        // ========== CRUD ОПЕРАЦИИ ==========
        
        /**
         * Обновление статуса сделки (вызывается при drag-and-drop)
         */
        async function updateDealStatus(dealId, newStatus) {
            const deal = dealsData.find(d => d.id == dealId);
            if (!deal || deal.status === newStatus) return;
            
            console.log(`[deals-supabase] Изменение статуса сделки ${dealId}: ${deal.status} → ${newStatus}`);
            
            const { error } = await supabase
                .from('deals')
                .update({ status: newStatus, updated_at: new Date().toISOString() })
                .eq('id', dealId);
            
            if (!error) {
                await loadDeals();
                if (window.showToast) {
                    window.showToast('success', `Статус заявки изменён на "${DEAL_STATUSES.find(s => s.id === newStatus)?.name || newStatus}"`);
                }
            } else {
                console.error('[deals-supabase] Ошибка обновления статуса:', error);
            }
        }
        
        /**
         * Удаление сделки
         */
        window.deleteDeal = async function(dealId) {
            const deal = dealsData.find(d => d.id == dealId);
            if (!deal) return;
            
            if (confirm(`Удалить заявку N${deal.id}?`)) {
                console.log(`[deals-supabase] Удаление сделки ${dealId}`);
                const { error } = await supabase.from('deals').delete().eq('id', dealId);
                if (!error) {
                    await loadDeals();
                    if (window.showToast) {
                        window.showToast('success', 'Заявка удалена');
                    }
                } else {
                    console.error('[deals-supabase] Ошибка удаления:', error);
                }
            }
        };
        
        // ========== РЕНДЕРИНГ КАНБАН-ДОСКИ ==========
        
        /**
         * Создание карточки сделки с данными
         */
        function createDealCardWithData(deal) {
            // Проверяем права на редактирование
            const canEdit = currentUser?.role === 'admin' || 
                           currentUser?.role === 'manager' || 
                           deal.agent_id === currentUser?.github_username;
            
            // Подготавливаем данные для компонента
            const dealWithNames = {
                ...deal,
                complex_name: getComplexName(deal.complex_id),
                seller_name: getCounterpartyName(deal.seller_id),
                buyer_name: getCounterpartyName(deal.buyer_id),
                price_current: deal.price_current || deal.price_initial,
                deadline: deal.deadline
            };
            
            // Создаем карточку через компонент
            const card = window.CRM.Kanban.createDealCard(dealWithNames, { canEdit });
            card.setAttribute('data-deal-id', deal.id);
            
            // Добавляем обработчик клика для редактирования
            card.addEventListener('click', (e) => {
                if (!e.target.classList.contains('delete-deal') && 
                    !e.target.closest('.delete-deal')) {
                    openDealModal(deal.id);
                }
            });
            
            // Добавляем обработчик удаления
            const deleteBtn = card.querySelector('.delete-deal');
            if (deleteBtn) {
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    window.deleteDeal(deal.id);
                };
            }
            
            return card;
        }
        
        /**
         * Рендеринг всей канбан-доски
         */
        function renderKanban() {
            const board = document.getElementById('kanbanBoard');
            if (!board) return;
            
            // Получаем значения фильтров
            const searchText = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const typeFilter = document.getElementById('typeFilter')?.value || 'all';
            const agentFilter = document.getElementById('agentFilter')?.value || 'all';
            
            // Фильтрация сделок
            let filteredDeals = dealsData.filter(deal => {
                const matchSearch = searchText === '' ||
                    deal.id.toString().includes(searchText) ||
                    getComplexName(deal.complex_id).toLowerCase().includes(searchText) ||
                    getCounterpartyName(deal.seller_id).toLowerCase().includes(searchText) ||
                    getCounterpartyName(deal.buyer_id).toLowerCase().includes(searchText);
                const matchType = typeFilter === 'all' || deal.type === typeFilter;
                const matchAgent = agentFilter === 'all' || deal.agent_id === agentFilter;
                return matchSearch && matchType && matchAgent;
            });
            
            // Группируем по статусам
            const dealsByStatus = {};
            for (const s of DEAL_STATUSES) dealsByStatus[s.id] = [];
            for (const deal of filteredDeals) {
                if (dealsByStatus[deal.status]) {
                    dealsByStatus[deal.status].push(deal);
                } else {
                    dealsByStatus['new'].push(deal);
                }
            }
            
            // Рендерим колонки
            let html = '';
            for (const status of DEAL_STATUSES) {
                const statusDeals = dealsByStatus[status.id] || [];
                html += `
                    <div class="deal-column" data-status="${status.id}">
                        <div class="deal-column-header" style="border-top: 3px solid ${status.color};">
                            <span><span class="status-icon">${status.icon}</span> ${status.name}</span>
                            <span class="count">${statusDeals.length}</span>
                        </div>
                        <div class="deals-container" data-status="${status.id}" id="container-${status.id}"></div>
                    </div>
                `;
            }
            board.innerHTML = html;
            
            // Заполняем контейнеры карточками
            for (const status of DEAL_STATUSES) {
                const container = document.getElementById(`container-${status.id}`);
                if (container) {
                    const statusDeals = dealsByStatus[status.id] || [];
                    for (const deal of statusDeals) {
                        container.appendChild(createDealCardWithData(deal));
                    }
                    if (statusDeals.length === 0) {
                        container.innerHTML = '<div class="empty-deals"><i class="fas fa-inbox"></i><p>Нет заявок</p></div>';
                    }
                }
            }
            
            // Настраиваем drag-and-drop
            setupDragAndDrop();
        }
        
        /**
         * Настройка drag-and-drop для колонок канбан-доски
         */
        function setupDragAndDrop() {
            const containers = document.querySelectorAll('.deals-container');
            console.log(`[deals-supabase] Настройка drag-and-drop для ${containers.length} контейнеров`);
            
            containers.forEach(container => {
                // Удаляем старые обработчики, чтобы избежать дублирования
                const newContainer = container.cloneNode(true);
                container.parentNode.replaceChild(newContainer, container);
                
                newContainer.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    newContainer.classList.add('drag-over');
                });
                
                newContainer.addEventListener('dragleave', () => {
                    newContainer.classList.remove('drag-over');
                });
                
                newContainer.addEventListener('drop', async (e) => {
                    e.preventDefault();
                    newContainer.classList.remove('drag-over');
                    
                    const dealId = e.dataTransfer.getData('text/plain');
                    const newStatus = newContainer.getAttribute('data-status');
                    
                    console.log(`[deals-supabase] Drop: сделка ${dealId} → статус ${newStatus}`);
                    
                    if (dealId && newStatus) {
                        await updateDealStatus(dealId, newStatus);
                    }
                });
            });
        }
        
        // ========== МОДАЛЬНОЕ ОКНО ==========
        
        /**
         * Открытие модального окна для создания/редактирования сделки
         */
        async function openDealModal(dealId = null) {
            const modal = document.getElementById('dealModal');
            const modalTitle = document.getElementById('modalTitle');
            
            // Загружаем данные для селектов
            await loadComplexes();
            await loadCounterparties();
            await loadUsers();
            updateComplexSelect();
            updateCounterpartySelects();
            
            if (dealId) {
                // Редактирование существующей сделки
                modalTitle.textContent = 'Редактировать заявку';
                const deal = dealsData.find(d => d.id == dealId);
                if (deal) {
                    document.getElementById('dealId').value = deal.id;
                    document.getElementById('dealComplex').value = deal.complex_id || '';
                    document.getElementById('dealApartment').value = deal.apartment || '';
                    document.getElementById('dealSeller').value = deal.seller_id || '';
                    document.getElementById('dealBuyer').value = deal.buyer_id || '';
                    document.getElementById('dealType').value = deal.type;
                    document.getElementById('dealAgent').value = deal.agent_id || '';
                    document.getElementById('dealPriceInitial').value = deal.price_initial;
                    document.getElementById('dealPriceCurrent').value = deal.price_current;
                    document.getElementById('dealCommission').value = deal.commission;
                    document.getElementById('dealDeadline').value = deal.deadline || '';
                    document.getElementById('dealBank').value = deal.bank || '';
                    document.getElementById('dealMortgageApproved').value = deal.mortgage_approved ? 'true' : 'false';
                    document.getElementById('dealNotes').value = deal.notes || '';
                }
            } else {
                // Создание новой сделки
                modalTitle.textContent = 'Создать заявку';
                document.getElementById('dealId').value = '';
                document.getElementById('dealComplex').value = '';
                document.getElementById('dealApartment').value = '';
                document.getElementById('dealSeller').value = '';
                document.getElementById('dealBuyer').value = '';
                document.getElementById('dealType').value = 'secondary';
                document.getElementById('dealAgent').value = currentUser?.github_username || '';
                document.getElementById('dealPriceInitial').value = '';
                document.getElementById('dealPriceCurrent').value = '';
                document.getElementById('dealCommission').value = '3';
                document.getElementById('dealDeadline').value = '';
                document.getElementById('dealBank').value = '';
                document.getElementById('dealMortgageApproved').value = 'false';
                document.getElementById('dealNotes').value = '';
            }
            
            modal.classList.add('active');
        }
        
        /**
         * Закрытие модального окна
         */
        window.closeDealModal = function() {
            document.getElementById('dealModal').classList.remove('active');
        };
        
        /**
         * Сохранение сделки (создание или обновление)
         */
        window.saveDeal = async function() {
            const dealId = document.getElementById('dealId').value;
            const dealData = {
                complex_id: document.getElementById('dealComplex').value || null,
                apartment: document.getElementById('dealApartment').value,
                seller_id: document.getElementById('dealSeller').value || null,
                buyer_id: document.getElementById('dealBuyer').value || null,
                type: document.getElementById('dealType').value,
                agent_id: document.getElementById('dealAgent').value,
                price_initial: parseInt(document.getElementById('dealPriceInitial').value) || 0,
                price_current: parseInt(document.getElementById('dealPriceCurrent').value) || 0,
                commission: parseFloat(document.getElementById('dealCommission').value) || 3,
                deadline: document.getElementById('dealDeadline').value || null,
                bank: document.getElementById('dealBank').value || null,
                mortgage_approved: document.getElementById('dealMortgageApproved').value === 'true',
                notes: document.getElementById('dealNotes').value || null,
                status: 'new'
            };
            
            console.log(`[deals-supabase] Сохранение сделки: ${dealId ? 'обновление' : 'создание'}`, dealData);
            
            let error;
            if (dealId) {
                const result = await supabase
                    .from('deals')
                    .update({ ...dealData, updated_at: new Date().toISOString() })
                    .eq('id', dealId);
                error = result.error;
            } else {
                const result = await supabase
                    .from('deals')
                    .insert([{ ...dealData, user_id: currentUser?.id }]);
                error = result.error;
            }
            
            if (!error) {
                closeDealModal();
                await loadDeals();
                if (window.showToast) {
                    window.showToast('success', dealId ? 'Заявка обновлена' : 'Заявка создана');
                }
            } else {
                console.error('[deals-supabase] Ошибка сохранения:', error);
                alert('Ошибка сохранения');
            }
        };
        
        // ========== ГЛОБАЛЬНЫЕ ФУНКЦИИ ДЛЯ HTML ==========
        
        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        };
        
        window.goToProfile = function() {
            window.location.href = 'profile-supabase.html';
        };
        
        window.handleLogout = async function() {
            if (confirm('Выйти?')) await logoutFromSupabase();
        };
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        
        async function init() {
            console.log('[deals-supabase] Инициализация...');
            
            const isAuth = await requireSupabaseAuth('auth-supabase.html');
            if (!isAuth) return;
            
            currentUser = getCurrentSupabaseUser();
            updateSupabaseUserInterface();
            
            await loadComplexes();
            await loadCounterparties();
            await loadUsers();
            await loadDeals();
            
            // Обработчики событий
            document.getElementById('addDealBtn').addEventListener('click', () => openDealModal());
            document.getElementById('searchInput').addEventListener('input', () => renderKanban());
            document.getElementById('typeFilter').addEventListener('change', () => renderKanban());
            document.getElementById('agentFilter').addEventListener('change', () => renderKanban());
            
            // Восстанавливаем состояние сайдбара
            const sidebar = document.getElementById('sidebar');
            if (sidebar && localStorage.getItem('sidebar_collapsed') === 'true') {
                sidebar.classList.add('collapsed');
            }
            
            console.log('[deals-supabase] Инициализация завершена');
        }
        
        init();
    </script>
    <script src="layout.js"></script>
</body>
</html>
