<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 
    ============================================
    ФАЙЛ: auth-supabase.html
    РОЛЬ: Страница авторизации (вход/регистрация) через Supabase
    
    ОСОБЕННОСТИ:
      - Вход по email и паролю
      - Регистрация нового пользователя
      - Автоматическое создание профиля в таблице profiles
      - Перенаправление на дашборд после успешного входа
    
    ЗАВИСИМОСТИ:
      - CSS: (встроенные стили)
      - JS: js/pages/auth.js
    
    ИСТОРИЯ:
      - 27.03.2026: Создание supabase-версии страницы входа
      - 27.03.2026: Рефакторинг — логика вынесена в js/pages/auth.js
    ============================================
    -->
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .switch-mode {
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
        }
        
        .switch-mode:hover {
            text-decoration: underline;
        }
        
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }
        
        .error {
            background: #fee;
            color: #c33;
        }
        
        .success {
            background: #efe;
            color: #3c6;
        }
        
        .info {
            background: #e3f2fd;
            color: #1976d2;
            margin-bottom: 20px;
        }
        
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #eee;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #999;
            text-decoration: none;
            font-size: 12px;
        }
        
        .back-link a:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 CRM</h1>
        
        <div id="message" class="message info">
            Используйте тестовые данные:<br>
            Email: test@crm.com<br>
            Пароль: test123456
        </div>
        
        <div id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com" value="test@crm.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="••••••" value="test123456">
            </div>
            <button onclick="window.handleLogin()">Войти</button>
            <div class="switch-mode" onclick="window.showRegister()">Нет аккаунта? Зарегистрироваться</div>
        </div>
        
        <div id="register-form" style="display: none;">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="reg-name" placeholder="Ваше имя">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="reg-password" placeholder="минимум 6 символов">
            </div>
            <button onclick="window.handleRegister()">Зарегистрироваться</button>
            <div class="switch-mode" onclick="window.showLogin()">Уже есть аккаунт? Войти</div>
        </div>
        
        <hr>
        
        <div class="back-link">
            <a href="auth.html">← Использовать старую систему входа (CSV)</a>
        </div>
    </div>

    <!-- Подключаем модуль страницы (логика вынесена) -->
    <script type="module">
        import { initAuthPage } from './js/pages/auth.js';
        initAuthPage();
    </script>
</body>
</html>
