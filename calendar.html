<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- Применяем тему до рендеринга страницы (без мерцания) -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('crm_theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.add('theme-light');
                document.body.classList.add('theme-light');
            } else if (savedTheme === 'dark') {
                document.documentElement.classList.add('theme-dark');
                document.body.classList.add('theme-dark');
            }
        })();
    </script>
    
    <title>Календарь задач - CRM для команды</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- CSS модули -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1><i class="fas fa-calendar-alt"></i> Календарь задач</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">Загрузка...</span>
                </div>
            </div>
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Дашборд</a>
                <a href="tasks.html" class="nav-btn"><i class="fas fa-tasks"></i> Доска задач</a>
                <a href="complexes.html" class="nav-btn"><i class="fas fa-building"></i> Объекты</a>
                <a href="manager.html" class="nav-btn" data-role="admin,manager"><i class="fas fa-chart-simple"></i> Панель менеджера</a>
                <a href="profile.html" class="nav-btn"><i class="fas fa-user-circle"></i> Профиль</a>
            </div>
        </header>
        
        <div class="calendar-container">
            <div class="calendar-header">
                <div class="current-month">
                    <i class="fas fa-calendar-week"></i> <span id="currentMonth">Март 2026</span>
                </div>
                <div class="calendar-nav">
                    <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                    <button id="todayBtn"><i class="fas fa-calendar-day"></i> Сегодня</button>
                    <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="calendar-weekdays">
                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
            </div>
            <div id="calendarDays" class="calendar-days"></div>
        </div>
        
        <div class="info-panel-calendar">
            <i class="fas fa-info-circle"></i> 
            <strong>Drag & Drop:</strong> Перетащите задачу из календаря на другую дату для изменения дедлайна. 
            Нажмите <i class="fas fa-trash-alt"></i> рядом с задачей, чтобы удалить дедлайн.
        </div>
    </div>
    
    <script src="core.js"></script>
    <script src="auth.js"></script>
    <script src="theme.js"></script>
    <script src="calendar.js"></script>
</body>
</html>
