<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь задач - CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .calendar-container {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid var(--card-border);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .calendar-nav {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .calendar-nav button {
            background: rgba(108, 108, 255, 0.15);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .calendar-nav button:hover {
            background: rgba(108, 108, 255, 0.3);
        }
        .current-month {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--card-border);
        }
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .calendar-day {
            min-height: 100px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
        body.theme-light .calendar-day {
            background: rgba(0, 0, 0, 0.03);
        }
        .calendar-day:hover {
            background: var(--card-hover);
            transform: translateY(-2px);
        }
        .calendar-day.today {
            border: 2px solid var(--accent);
        }
        .day-number {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .day-tasks {
            font-size: 0.7rem;
        }
        .day-task {
            background: rgba(108, 108, 255, 0.2);
            border-radius: 8px;
            padding: 4px 6px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .day-task.high { border-left: 2px solid #ff6b6b; }
        .day-task.medium { border-left: 2px solid #ffc107; }
        .day-task.low { border-left: 2px solid #4caf50; }
        .calendar-day.empty {
            opacity: 0.4;
            cursor: default;
        }
        .calendar-day.empty:hover {
            transform: none;
            background: rgba(0, 0, 0, 0.2);
        }
        @media (max-width: 768px) {
            .calendar-day {
                min-height: 70px;
                font-size: 0.7rem;
            }
            .day-task {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1><i class="fas fa-calendar-alt"></i> Календарь задач</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">Загрузка...</span>
                </div>
            </div>
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Дашборд</a>
                <a href="tasks.html" class="nav-btn"><i class="fas fa-tasks"></i> Доска задач</a>
                <a href="manager.html" class="nav-btn" data-role="admin,manager"><i class="fas fa-chart-simple"></i> Панель менеджера</a>
            </div>
        </header>
        
        <div class="calendar-container">
            <div class="calendar-header">
                <h2><i class="fas fa-calendar-week"></i> <span id="currentMonth">Март 2026</span></h2>
                <div class="calendar-nav">
                    <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                    <button id="todayBtn">Сегодня</button>
                    <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="calendar-weekdays">
                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
            </div>
            <div id="calendarDays" class="calendar-days"></div>
        </div>
    </div>
    
    <script src="core.js"></script>
    <script src="auth.js"></script>
    <script src="theme.js"></script>
    <script src="calendar.js"></script>
</body>
</html>
